<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xabarlarim - DTM Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { 
            background: #0f2027; 
            background: linear-gradient(to bottom, #2c5364, #203a43, #0f2027);
            color: white; min-height: 100vh; padding-top: 80px; 
        }

        /* HEADER */
        .header {
            position: fixed; top: 0; width: 100%; background: rgba(26, 42, 51, 0.95);
            backdrop-filter: blur(10px); padding: 15px 20px; 
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 1000;
        }
        .back-btn { 
            cursor: pointer; font-size: 22px; text-decoration: none; color: white;
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%;
        }

        /* CONTAINER */
        .container { padding: 15px; max-width: 500px; margin: 0 auto; }
        
        /* MESSAGE CARD */
        .message-card {
            background: rgba(255, 255, 255, 0.08); border-radius: 20px;
            padding: 18px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1);
            animation: slideUp 0.4s ease-out forwards;
        }
        .message-card.private { border-left: 5px solid #00d2ff; }
        .message-card.public { border-left: 5px solid #ffd700; }

        .msg-badge {
            font-size: 10px; font-weight: 600; text-transform: uppercase;
            padding: 4px 10px; border-radius: 20px; display: inline-block; margin-bottom: 10px;
        }
        .badge-private { background: rgba(0, 210, 255, 0.2); color: #00d2ff; }
        .badge-public { background: rgba(255, 215, 0, 0.2); color: #ffd700; }

        .msg-title { font-weight: 600; font-size: 17px; margin-bottom: 6px; color: #fff; }
        .msg-body { font-size: 14px; opacity: 0.85; line-height: 1.6; white-space: pre-wrap; }
        .msg-time { font-size: 11px; opacity: 0.4; margin-top: 15px; text-align: right; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .empty-state { text-align: center; margin-top: 100px; opacity: 0.5; }
        .error-msg { color: #ff4b2b; text-align: center; padding: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <a href="home.html" class="back-btn">⬅</a>
        <h2 style="font-size: 18px;">Bildirishnomalar</h2>
        <div style="width: 40px;"></div>
    </div>

    <div class="container" id="messages-container">
        <div class="empty-state">Xabarlar yuklanmoqda...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
            authDomain: "quiz-app-3692d.firebaseapp.com",
            projectId: "quiz-app-3692d",
            storageBucket: "quiz-app-3692d.firebasestorage.app",
            messagingSenderId: "526836020845",
            appId: "1:526836020845:android:3ea991380c104c75e8b164"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                listenToMessages(user.uid);
            } else {
                window.location.replace("index.html");
            }
        });

        function listenToMessages(uid) {
            const msgCollection = collection(db, "messages");

            // REAL-TIME SNAPSHOT: Index talab qilmaydi
            onSnapshot(msgCollection, (snapshot) => {
                const container = document.getElementById('messages-container');
                container.innerHTML = "";

                let messagesList = [];

                snapshot.forEach((doc) => {
                    const data = doc.data();
                    // Faqat shaxsiy (uid) yoki hammaga (all) tegishli xabarlarni olish
                    if (data.userId === uid || data.userId === "all") {
                        messagesList.push({ id: doc.id, ...data });
                    }
                });

                // JavaScript orqali vaqti bo'yicha tartiblash (Eng yangisi yuqorida)
                messagesList.sort((a, b) => {
                    const timeA = a.createdAt?.seconds || 0;
                    const timeB = b.createdAt?.seconds || 0;
                    return timeB - timeA;
                });

                if (messagesList.length === 0) {
                    container.innerHTML = '<div class="empty-state">📭 Xabarlar yo‘q</div>';
                    return;
                }

                messagesList.forEach((data) => {
                    const date = data.createdAt?.toDate().toLocaleString('uz-UZ', { 
                        hour: '2-digit', minute: '2-digit', day: 'numeric', month: 'short' 
                    }) || "Hozir";
                    
                    const isPublic = data.userId === "all";
                    const card = document.createElement('div');
                    card.className = `message-card ${isPublic ? 'public' : 'private'}`;
                    
                    card.innerHTML = `
                        <span class="msg-badge ${isPublic ? 'badge-public' : 'badge-private'}">
                            ${isPublic ? '📢 Hammaga' : '📩 Shaxsiy'}
                        </span>
                        <div class="msg-title">${data.title}</div>
                        <div class="msg-body">${data.text}</div>
                        <div class="msg-time">${date}</div>
                    `;
                    container.appendChild(card);
                });
            }, (error) => {
                console.error("Xato:", error);
                document.getElementById('messages-container').innerHTML = 
                    `<div class="error-msg">Xatolik yuz berdi: ${error.message}</div>`;
            });
        }
    </script>
</body>
</html>
