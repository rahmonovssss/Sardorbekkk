<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Imtihon - Dr. Rahmonov</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #0f2027; color: white; padding: 15px; min-height: 100vh; user-select: none; }

        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(26, 42, 51, 0.95); padding: 12px 18px; border-radius: 18px;
            position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(15px);
            border-bottom: 2px solid #ffd700; margin-bottom: 20px;
        }
        .timer { color: #ffd700; font-size: 18px; font-weight: 700; }
        .exit-btn { background: rgba(255, 75, 43, 0.1); color: #ff4b2b; border: 1px solid #ff4b2b; padding: 5px 12px; border-radius: 8px; cursor: pointer; }

        .container { max-width: 600px; margin: 0 auto; }

        /* --- DASHBOARD (FANLARNI TANLASH) --- */
        #subject-dashboard { display: none; }
        .dashboard-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 20px; }
        .subject-status-card {
            background: #1a2a33; padding: 20px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.3s;
        }
        .subject-status-card.completed { opacity: 0.6; border-color: #00ff00; pointer-events: none; }
        .subject-status-card.active { border-color: #ffd700; background: rgba(255,215,0,0.05); }
        .subject-name { font-weight: 600; font-size: 15px; }
        .subject-info { font-size: 12px; color: #aaa; }
        .status-badge { padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: bold; }
        .badge-wait { background: #444; color: #ccc; }
        .badge-done { background: #00ff00; color: #000; }

        /* --- QUIZ BOX --- */
        #quiz-box { display: none; background: #1a2a33; padding: 25px; border-radius: 25px; border: 1px solid rgba(255,215,0,0.1); }
        .option { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; cursor: pointer; margin-bottom: 12px; }
        .option.selected { background: #ffd700; color: #000; font-weight: bold; border-color: #ffd700; }
        
        .btn-main { width: 100%; padding: 18px; border-radius: 15px; border: none; background: #ffd700; color: #000; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-main:disabled { opacity: 0.3; }

        /* --- SELECTION --- */
        .sub-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); padding: 15px; border-radius: 12px; cursor: pointer; text-align: center; }
        .sub-card.selected { border-color: #ffd700; background: rgba(255,215,0,0.1); color: #ffd700; }
    </style>
</head>
<body>

    <div class="top-bar" id="top-nav" style="display:none;">
        <button class="exit-btn" onclick="location.href='home.html'">Tugatish</button>
        <div class="timer" id="timer-display">180:00</div>
    </div>

    <div class="container">
        <div id="selection-box">
            <h2 style="color:#ffd700; margin-bottom: 10px;">Blok fanlarni tanlang</h2>
            <p style="font-size: 13px; opacity: 0.7; margin-bottom: 20px;">2 ta asosiy fanni tanlang:</p>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;" id="main-subjects-list"></div>
            <button class="btn-main" id="start-btn" onclick="startImtihon()" disabled style="margin-top:25px;">IMTIHONNI BOSHLASH</button>
        </div>

        <div id="subject-dashboard">
            <h3 style="color:#ffd700; margin-bottom: 5px;">Fanlar ro'yxati</h3>
            <p style="font-size: 12px; opacity: 0.7;">Xohlagan fanni tanlab ishlashingiz mumkin:</p>
            <div class="dashboard-grid" id="dashboard-items"></div>
            <button class="btn-main" id="final-submit-btn" style="display:none; background:#00ff00;" onclick="submitAll()">IMTIHONNI YAKUNLASH</button>
        </div>

        <div id="quiz-box">
            <div id="quiz-header" style="display:flex; justify-content:space-between; margin-bottom:15px; font-size:12px; color:#ffd700;">
                <span id="current-subject-name"></span>
                <span id="q-counter"></span>
            </div>
            <div id="q-text" style="font-size:17px; margin-bottom:20px; min-height:60px;"></div>
            <div id="options-container"></div>
            <button class="btn-main" id="next-btn" onclick="nextQuestion()" disabled>KEYINGI SAVOL</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
            authDomain: "quiz-app-3692d.firebaseapp.com",
            projectId: "quiz-app-3692d",
            storageBucket: "quiz-app-3692d.firebasestorage.app",
            messagingSenderId: "526836020845",
            appId: "1:526836020845:android:3ea991380c104c75e8b164"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let selectedSubjects = [];
        let allExamData = {}; // Fanlar bo'yicha savollarni saqlash
        let examStatus = {}; // Qaysi fan tugallangani
        let currentSubject = "";
        let currentQIndex = 0;
        let timeLeft = 180 * 60;
        let userResults = [];

        const subjectsList = ["Matematika", "Ona tili", "Tarix", "Kimyo", "Biologiya", "Ingiliz tili", "Huquq", "Geografiya", "Fizika"];

        // 1. Fanlarni chiqarish
        const listDiv = document.getElementById('main-subjects-list');
        subjectsList.forEach(s => {
            const d = document.createElement('div');
            d.className = 'sub-card';
            d.innerText = s;
            d.onclick = () => {
                if(selectedSubjects.includes(s)) {
                    selectedSubjects = selectedSubjects.filter(x => x !== s);
                    d.classList.remove('selected');
                } else if(selectedSubjects.length < 2) {
                    selectedSubjects.push(s);
                    d.classList.add('selected');
                }
                document.getElementById('start-btn').disabled = (selectedSubjects.length !== 2);
            };
            listDiv.appendChild(d);
        });

        // 2. Imtihonni boshlash va savollarni yuklash
        window.startImtihon = async () => {
            document.getElementById('start-btn').innerText = "YUKLANMOQDA...";
            
            const examPlan = [
                { name: "Ona tili (Majburiy)", subject: "Ona tili", type: "premium_mandatory", count: 10, ball: 1.1 },
                { name: "Matematika (Majburiy)", subject: "Matematika", type: "premium_mandatory", count: 10, ball: 1.1 },
                { name: "Tarix (Majburiy)", subject: "Tarix", type: "premium_mandatory", count: 10, ball: 1.1 },
                { name: selectedSubjects[0], subject: selectedSubjects[0], type: "premium", count: 30, ball: 3.1 },
                { name: selectedSubjects[1], subject: selectedSubjects[1], type: "premium", count: 30, ball: 2.1 }
            ];

            for (let item of examPlan) {
                const q = query(collection(db, "quizzes"), where("subject", "==", item.subject), where("type", "==", item.type), limit(item.count));
                const snap = await getDocs(q);
                let questions = [];
                snap.forEach(doc => questions.push({...doc.data(), id: doc.id, ball: item.ball}));
                
                allExamData[item.name] = questions;
                examStatus[item.name] = false; // hali bajarilmadi
            }

            document.getElementById('selection-box').style.display = 'none';
            document.getElementById('top-nav').style.display = 'flex';
            renderDashboard();
            startTimer();
        };

        // 3. Fanlar panelini chizish
        function renderDashboard() {
            document.getElementById('subject-dashboard').style.display = 'block';
            document.getElementById('quiz-box').style.display = 'none';
            const container = document.getElementById('dashboard-items');
            container.innerHTML = "";

            let allDone = true;
            Object.keys(allExamData).forEach(name => {
                const isDone = examStatus[name];
                if(!isDone) allDone = false;

                const card = document.createElement('div');
                card.className = `subject-status-card ${isDone ? 'completed' : ''}`;
                card.innerHTML = `
                    <div>
                        <div class="subject-name">${name}</div>
                        <div class="subject-info">${allExamData[name].length} ta savol</div>
                    </div>
                    <span class="status-badge ${isDone ? 'badge-done' : 'badge-wait'}">${isDone ? 'TAMOM' : 'BOSHLASH'}</span>
                `;
                if(!isDone) card.onclick = () => startSubject(name);
                container.appendChild(card);
            });

            if(allDone) document.getElementById('final-submit-btn').style.display = 'block';
        }

        // 4. Muayyan fanni boshlash
        function startSubject(name) {
            currentSubject = name;
            currentQIndex = 0;
            document.getElementById('subject-dashboard').style.display = 'none';
            document.getElementById('quiz-box').style.display = 'block';
            showQuestion();
        }

        function showQuestion() {
            const questions = allExamData[currentSubject];
            const q = questions[currentQIndex];

            document.getElementById('current-subject-name').innerText = currentSubject;
            document.getElementById('q-counter').innerText = `${currentQIndex + 1} / ${questions.length}`;
            document.getElementById('q-text').innerText = q.question;

            const optContainer = document.getElementById('options-container');
            optContainer.innerHTML = "";
            document.getElementById('next-btn').disabled = true;

            ["A", "B", "C", "D"].forEach(key => {
                const div = document.createElement('div');
                div.className = "option";
                div.innerText = `${key}) ${q.options[key]}`;
                div.onclick = () => {
                    document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
                    div.classList.add('selected');
                    window.userChoice = key;
                    document.getElementById('next-btn').disabled = false;
                };
                optContainer.appendChild(div);
            });
        }

        window.nextQuestion = () => {
            const questions = allExamData[currentSubject];
            const q = questions[currentQIndex];

            userResults.push({
                subject: q.subject,
                isCorrect: window.userChoice === q.correctAnswer,
                ball: window.userChoice === q.correctAnswer ? q.ball : 0
            });

            currentQIndex++;
            if(currentQIndex < questions.length) {
                showQuestion();
            } else {
                examStatus[currentSubject] = true;
                renderDashboard();
            }
        };

        function startTimer() {
            setInterval(() => {
                let m = Math.floor(timeLeft / 60);
                let s = timeLeft % 60;
                document.getElementById('timer-display').innerText = `${m}:${s < 10 ? '0'+s : s}`;
                if (timeLeft-- <= 0) submitAll();
            }, 1000);
        }

        window.submitAll = () => {
            localStorage.setItem('premiumResult', JSON.stringify(userResults));
            window.location.replace('result.html');
        };
    </script>
</body>
</html>
