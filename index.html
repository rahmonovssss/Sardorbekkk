<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sardorbek Quiz App</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; font-family: 'Segoe UI', sans-serif; 
            background: #1A2D4D; height: 100vh; 
            display: flex; align-items: center; justify-content: center; 
            overflow: hidden;
        }

        /* 1. SPLASH SCREEN */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #2196F3; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 1000;
        }
        .logo-box { width: 90px; height: 90px; background: white; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        #app-name-text { color: white; font-size: 36px; font-weight: bold; }

        /* KARTALAR (Sahifalar) */
        .card {
            display: none; width: 90%; max-width: 400px; background: white;
            padding: 35px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            text-align: center; animation: slideUp 0.4s ease-out;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* INPUT VA TUGMALAR */
        input { 
            width: 100%; padding: 14px; margin-bottom: 12px; border: 1px solid #ddd; 
            border-radius: 12px; font-size: 16px; background: #f9f9f9; outline: none;
        }
        input:focus { border-color: #007AFF; background: #fff; }

        button { 
            width: 100%; padding: 16px; border-radius: 12px; font-size: 17px; 
            font-weight: bold; cursor: pointer; border: none; transition: 0.2s;
        }
        .btn-blue { background: #007AFF; color: white; margin-bottom: 10px; }
        .btn-outline { background: white; color: #007AFF; border: 2px solid #007AFF; }
        .btn-premium { background: #FFC107; color: #1A2D4D; margin-top: 15px; }
        .btn-free { background: #4CAF50; color: white; margin-top: 10px; }
        .btn-msg { background: #2196F3; color: white; margin-top: 10px; }
        
        button:active { transform: scale(0.97); }

        .loader { 
            border: 3px solid #f3f3f3; border-top: 3px solid #007AFF; 
            border-radius: 50%; width: 25px; height: 25px; 
            animation: spin 1s linear infinite; display: none; margin: 10px auto; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #user-id-tag { font-size: 12px; color: #fff; background: #12233f; padding: 5px 10px; border-radius: 8px; margin-bottom: 15px; display: inline-block; }
        .back-link { cursor: pointer; color: #888; font-size: 14px; margin-top: 15px; display: block; text-decoration: underline; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="logo-box"><b style="font-size: 50px; color: #2196F3;">S</b></div>
        <div id="app-name-text"></div>
    </div>

    <div id="choice-screen" class="card">
        <h2 style="color: #333;">Xush kelibsiz</h2>
        <p style="color: #666; margin-bottom: 30px;">Davom etish uchun tanlang</p>
        <button class="btn-blue" onclick="showAuth('login')">KIRISH</button>
        <button class="btn-outline" onclick="showAuth('register')">RO'YXATDAN O'TISH</button>
    </div>

    <div id="auth-form" class="card">
        <h2 id="form-title" style="color: #333;">Ro'yxatdan o'tish</h2>
        <div id="reg-fields">
            <input type="text" id="fname" placeholder="Ism">
            <input type="text" id="lname" placeholder="Familya">
        </div>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Parol (min. 6 belgi)">
        
        <div id="loading" class="loader"></div>
        <button class="btn-blue" id="auth-btn" onclick="handleAuth()">DAVOM ETISH</button>
        
        <span class="back-link" onclick="goBackToChoice()">Orqaga qaytish</span>
    </div>

    <div id="main-menu" class="card">
        <span id="user-id-tag">ID: yuklanmoqda...</span>
        <h2 style="color: #333; margin-bottom: 5px;">Test rejimini tanlang</h2>
        <p style="color: #888; margin-bottom: 25px;">Bilimingizni sinab ko'ring</p>
        
        <button class="btn-premium" onclick="alert('Tez kunda: Pulli testlar')">💰 PULLI TESTLAR 🏆</button>
        <button class="btn-free" onclick="alert('Tez kunda: Bepul testlar')">🆓 BEPUL TESTLAR</button>
        <button class="btn-msg" onclick="alert('Xabarlar yuklanmoqda...')">📩 XABARLARIM</button>
        
        <button class="btn-outline" style="margin-top: 30px; border-color: #ff4444; color: #ff4444;" onclick="logout()">Chiqish</button>
    </div>

    <script>
        // --- FIREBASE KONFIGURATSIYASI ---
        const firebaseConfig = {
            apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
            authDomain: "quiz-app-3692d.firebaseapp.com",
            databaseURL: "https://quiz-app-3692d-default-rtdb.firebaseio.com",
            projectId: "quiz-app-3692d",
            storageBucket: "quiz-app-3692d.firebasestorage.app",
            messagingSenderId: "526836020845",
            appId: "1:526836020845:android:3ea991380c104c75e8b164"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // --- 1. SPLASH ANIMATSIYASI ---
        const appName = "Sardorbek";
        let idx = 0;
        function playSplash() {
            if (idx < appName.length) {
                document.getElementById("app-name-text").innerHTML += appName.charAt(idx);
                idx++;
                setTimeout(playSplash, 150);
            } else {
                setTimeout(() => {
                    document.getElementById("splash").style.display = "none";
                    // Agar foydalanuvchi allaqachon kirgan bo'lsa, menyuga o'tamiz
                    auth.onAuthStateChanged(user => {
                        if (user) { openMainMenu(); } 
                        else { document.getElementById("choice-screen").style.display = "block"; }
                    });
                }, 1000);
            }
        }
        window.onload = playSplash;

        // --- 2. NAVIGATSIYA FUNKSIYALARI ---
        let currentMode = 'register';

        function showAuth(m) {
            currentMode = m;
            document.getElementById("choice-screen").style.display = "none";
            document.getElementById("auth-form").style.display = "block";
            
            if (m === 'login') {
                document.getElementById("form-title").innerText = "Tizimga kirish";
                document.getElementById("reg-fields").style.display = "none";
                document.getElementById("auth-btn").innerText = "KIRISH";
            } else {
                document.getElementById("form-title").innerText = "Ro'yxatdan o'tish";
                document.getElementById("reg-fields").style.display = "block";
                document.getElementById("auth-btn").innerText = "RO'YXATDAN O'TISH";
            }
        }

        // --- TO'G'IRLANGAN ORQAGA QAYTISH FUNKSIYASI ---
        function goBackToChoice() {
            document.getElementById("auth-form").style.display = "none";
            document.getElementById("choice-screen").style.display = "block";
            // Inputlarni tozalash
            document.getElementById("email").value = "";
            document.getElementById("pass").value = "";
        }

        // --- 3. FIREBASE AUTH LOGIKASI ---
        function handleAuth() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("pass").value;
            const loader = document.getElementById("loading");

            if (!email || password.length < 6) { alert("Email xato yoki parol juda qisqa!"); return; }
            
            loader.style.display = "block";
            document.getElementById("auth-btn").disabled = true;

            if (currentMode === 'register') {
                const fn = document.getElementById("fname").value;
                const ln = document.getElementById("lname").value;
                if(!fn || !ln) { alert("Ism va familiyani kiriting!"); loader.style.display="none"; document.getElementById("auth-btn").disabled=false; return; }

                auth.createUserWithEmailAndPassword(email, password)
                    .then(res => {
                        return db.ref('Users/' + res.user.uid).set({
                            firstName: fn, lastName: ln, email: email,
                            isPremium: false, registrationTime: Date.now()
                        });
                    })
                    .then(() => openMainMenu())
                    .catch(e => { loader.style.display="none"; document.getElementById("auth-btn").disabled=false; alert(e.message); });
            } else {
                auth.signInWithEmailAndPassword(email, password)
                    .then(() => openMainMenu())
                    .catch(e => { loader.style.display="none"; document.getElementById("auth-btn").disabled=false; alert("Email yoki parol xato!"); });
            }
        }

        function openMainMenu() {
            document.getElementById("splash").style.display = "none";
            document.getElementById("choice-screen").style.display = "none";
            document.getElementById("auth-form").style.display = "none";
            document.getElementById("main-menu").style.display = "block";
            
            const user = auth.currentUser;
            if(user) {
                document.getElementById("user-id-tag").innerText = "ID: " + user.uid.substring(0, 8).toUpperCase();
            }
        }

        function logout() {
            auth.signOut().then(() => {
                location.reload(); // To'liq chiqish uchun sahifani yangilaymiz
            });
        }
    </script>
</body>
</html>
