<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sardorbek Premium Quiz</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <style>
        :root { --p: #2196F3; --bg: #1A2D4D; --card: #12233f; --text: #ffffff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        .page { display: none; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .active { display: flex; flex-direction: column; }
        
        /* Splash Activity uslubi */
        #splash-page { justify-content: center; align-items: center; background: #2196F3; }
        .logo-text { font-size: 40px; font-weight: bold; border: 4px solid white; padding: 10px 25px; }

        /* Login & Register uslubi (activity_register.xml ga o'xshash) */
        .input-group { background: #f0f4f8; padding: 25px; border-radius: 20px; color: #333; margin-top: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #ccc; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        .btn-blue { background: #007AFF; color: white; margin-bottom: 10px; }
        .btn-white { background: white; color: #007AFF; border: 1px solid #007AFF; }

        /* ChooseMode uslubi */
        .mode-btn { padding: 20px; margin: 10px 0; border-radius: 15px; font-size: 18px; text-align: center; font-weight: bold; }
        .premium { background: #FFC107; color: #1A2D4D; }
        .free { background: #4CAF50; color: white; }

        /* Quiz Activity uslubi */
        .timer-box { font-size: 20px; color: #FFEB3B; text-align: right; margin-bottom: 10px; }
        .progress-bar { width: 100%; height: 10px; background: #333; border-radius: 5px; overflow: hidden; }
        .progress-fill { height: 100%; background: #FFEB3B; width: 100%; transition: 1s linear; }
        .q-card { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; margin: 20px 0; font-size: 20px; }
        .opt { background: #007AFF; padding: 15px; margin: 10px 0; border-radius: 10px; cursor: pointer; transition: 0.2s; }
        .opt:active { transform: scale(0.95); background: #0056b3; }
    </style>
</head>
<body>

    <div id="splash-page" class="page active">
        <div class="logo-text">SARDORBEK</div>
        <p style="margin-top: 20px;">Yuklanmoqda...</p>
    </div>

    <div id="auth-page" class="page">
        <h2 style="text-align: center; margin-top: 50px;">Kirish / Ro'yxatdan O'tish</h2>
        <div class="input-group">
            <input type="email" id="email" placeholder="E-mail">
            <input type="password" id="pass" placeholder="Parol">
            <button class="btn btn-blue" onclick="handleAuth('login')">KIRISH</button>
            <button class="btn btn-white" onclick="handleAuth('reg')">RO'YXATDAN O'TISH</button>
        </div>
    </div>

    <div id="mode-page" class="page">
        <div style="background: #12233f; padding: 10px; text-align: center; border-radius: 10px;" id="user-id">ID: Yuklanmoqda...</div>
        <h2 style="text-align: center; margin: 30px 0;">Test turini tanlang</h2>
        <div class="mode-btn premium" onclick="requestPremium()">💰 PULLI TESTLAR 🏆</div>
        <div class="mode-btn free" onclick="openMain('Bepul')">🆓 BEPUL TESTLAR</div>
        <div class="mode-btn btn-blue" onclick="alert('Xabarlar yuklanmoqda...')">📩 XABARLARIM</div>
    </div>

    <div id="main-page" class="page">
        <h2 style="text-align: center;">Fanlar</h2>
        <div class="opt" onclick="startQuiz('Matematika')">Matematika</div>
        <div class="opt" onclick="startQuiz('Tarix')">Tarix</div>
        <div class="opt" onclick="startQuiz('Ona tili')">Ona tili</div>
        <div class="opt" onclick="startQuiz('Biologiya')">Biologiya</div>
    </div>

    <div id="quiz-page" class="page">
        <div class="timer-box" id="timer">90:00</div>
        <div class="progress-bar"><div id="p-fill" class="progress-fill"></div></div>
        <div id="q-count" style="margin-top: 10px;">Savol: 1/10</div>
        <div class="q-card" id="q-text">Savol yuklanmoqda...</div>
        <div id="options-container"></div>
    </div>

    <div id="result-page" class="page" style="text-align: center; justify-content: center;">
        <h1 style="color: #FFEB3B;">Natija</h1>
        <div id="final-score" style="font-size: 30px; margin: 20px 0;">0 / 0</div>
        <button class="btn btn-blue" onclick="location.reload()">YANGI TEST</button>
    </div>

    <script>
        // FIREBASE KONFIGURATSIYASI (Sizning QuizActivity.java dagi ma'lumotlaringiz)
        const firebaseConfig = {
            databaseURL: "https://quiz-app-3692d-default-rtdb.firebaseio.com",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let currentSubject = "";
        let questions = [];
        let currentIdx = 0;
        let score = 0;
        let timeLeft = 90 * 60;

        // Sahifalarni boshqarish
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // 1. Splash logic
        setTimeout(() => {
            auth.onAuthStateChanged(user => {
                if (user) {
                    document.getElementById('user-id').innerText = "ID: " + user.uid.substring(0,5);
                    showPage('mode-page');
                } else {
                    showPage('auth-page');
                }
            });
        }, 3000);

        // 2. Auth logic
        function handleAuth(type) {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            if(!e || !p) return alert("To'ldiring!");
            
            if(type === 'reg') {
                auth.createUserWithEmailAndPassword(e, p).catch(err => alert(err.message));
            } else {
                auth.signInWithEmailAndPassword(e, p).catch(err => alert(err.message));
            }
        }

        // 3. Mode logic
        function requestPremium() {
            const user = auth.currentUser;
            db.ref('payments_pending/' + user.uid.substring(0,5)).set({
                firebaseId: user.uid,
                status: "pending_admin_review",
                timestamp: Date.now()
            }).then(() => alert("Admin panelga so'rov yuborildi!"));
        }

        function openMain(mode) {
            showPage('main-page');
        }

        // 4. Quiz logic (QuizActivity.java dagi kabi Firebase'dan savol olish)
        function startQuiz(sub) {
            currentSubject = sub;
            showPage('quiz-page');
            
            db.ref('Savollar/' + sub).once('value', snapshot => {
                const data = snapshot.val();
                questions = Object.values(data);
                questions = questions.sort(() => 0.5 - Math.random()); // Shuffle
                loadQuestion();
                startTimer();
            });
        }

        function loadQuestion() {
            if(currentIdx >= questions.length) return finishQuiz();
            const q = questions[currentIdx];
            document.getElementById('q-text').innerText = q.savol || q.question;
            document.getElementById('q-count').innerText = `Savol: ${currentIdx + 1}/${questions.length}`;
            
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            const variants = ['A', 'B', 'C', 'D'];
            variants.forEach(v => {
                const btn = document.createElement('div');
                btn.className = 'opt';
                btn.innerText = q['variant' + v] || q[v.toLowerCase()];
                btn.onclick = () => {
                    if(v === q.javob) score++;
                    currentIdx++;
                    loadQuestion();
                };
                container.appendChild(btn);
            });
        }

        function startTimer() {
            const timerInt = setInterval(() => {
                timeLeft--;
                let m = Math.floor(timeLeft / 60);
                let s = timeLeft % 60;
                document.getElementById('timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
                document.getElementById('p-fill').style.width = (timeLeft / (90*60) * 100) + "%";
                if(timeLeft <= 0) { clearInterval(timerInt); finishQuiz(); }
            }, 1000);
        }

        function finishQuiz() {
            document.getElementById('final-score').innerText = `${questions.length} dan ${score} ta to'g'ri`;
            showPage('result-page');
            
            // Natijani Firebase'ga yuborish (ResultActivity.java kabi)
            const user = auth.currentUser;
            db.ref('UserResults/' + user.uid.substring(0,5)).update({
                [currentSubject]: score,
                timestamp: Date.now()
            });
        }
    </script>
</body>
</html>
