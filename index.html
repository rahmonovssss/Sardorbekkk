<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sardorbek DTM System</title>
    <style>
        :root {
            --primary: #2563eb; --secondary: #1e40af; --bg: #f3f4f6;
            --text: #1f2937; --card: #ffffff; --correct: #10b981; --wrong: #ef4444;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 0; }
        
        /* Header */
        .header { background: var(--primary); color: white; padding: 15px; text-align: center; font-weight: bold; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        .page { display: none; padding: 15px; animation: fadeIn 0.3s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Card styles */
        .card { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .btn { width: 100%; padding: 14px; border-radius: 8px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-blue:active { background: var(--secondary); transform: scale(0.98); }

        /* Timer & Progress */
        .timer-bar { background: #e5e7eb; height: 8px; border-radius: 4px; margin: 15px 0; overflow: hidden; }
        .progress { background: var(--primary); height: 100%; width: 100%; transition: 1s linear; }
        
        /* Question styles */
        .q-text { font-size: 18px; font-weight: 600; margin-bottom: 20px; }
        .option { padding: 15px; border: 2px solid #e5e7eb; border-radius: 10px; margin-bottom: 10px; cursor: pointer; display: flex; align-items: center; }
        .option:active { background: #f0f7ff; }
        .option.selected { border-color: var(--primary); background: #eff6ff; }
        
        /* Subject grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .sub-btn { background: white; padding: 20px; border-radius: 10px; text-align: center; border: 1px solid #ddd; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header" id="header-text">DTM TEST TIZIMI</div>

    <div id="main-page" class="page active">
        <div class="card">
            <h3>Xush kelibsiz!</h3>
            <p>Bilimingizni sinash uchun fanni tanlang:</p>
            <div class="grid">
                <div class="sub-btn" onclick="startQuiz('Matematika')">🧮<br>Matematika</div>
                <div class="sub-btn" onclick="startQuiz('Tarix')">📜<br>Tarix</div>
                <div class="sub-btn" onclick="startQuiz('Ona tili')">📚<br>Ona tili</div>
                <div class="sub-btn" onclick="startQuiz('Ingliz tili')">🇬🇧<br>Ingliz tili</div>
            </div>
        </div>
    </div>

    <div id="quiz-page" class="page">
        <div style="display:flex; justify-content:space-between; font-weight:bold">
            <span id="q-count">Savol: 1/10</span>
            <span id="timer" style="color:red">30:00</span>
        </div>
        <div class="timer-bar"><div id="p-bar" class="progress"></div></div>
        
        <div class="card">
            <div id="q-text" class="q-text">Savol yuklanmoqda...</div>
            <div id="options"></div>
        </div>
        <button class="btn btn-blue" id="next-btn" onclick="nextQuestion()">KEYINGISI</button>
    </div>

    <div id="result-page" class="page">
        <div class="card" style="text-align: center;">
            <h2 style="color: var(--correct)">Test Yakunlandi!</h2>
            <div style="font-size: 50px; margin: 20px 0;" id="score-val">0/0</div>
            <p id="percent"></p>
            <button class="btn btn-blue" onclick="location.reload()">QAYTA BOSHLASH</button>
        </div>
    </div>

    <script>
        const database = {
            "Matematika": [
                {q: "2x + 5 = 15 bo'lsa, x ni toping?", o: ["5", "10", "15", "20"], a: 0},
                {q: "144 ning kvadrat ildizi?", o: ["10", "11", "12", "13"], a: 2}
            ],
            "Tarix": [
                {q: "Amir Temur qachon tug'ilgan?", o: ["1336", "1342", "1405", "1299"], a: 0}
            ]
        };

        let currentQ = 0, score = 0, selected = null, questions = [], timerInt;

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function startQuiz(sub) {
            questions = database[sub] || [];
            if(questions.length == 0) return alert("Hozircha bu fanda savollar yo'q");
            currentQ = 0; score = 0;
            showPage('quiz-page');
            document.getElementById('header-text').innerText = sub;
            loadQuestion();
            startTimer(30 * 60);
        }

        function loadQuestion() {
            selected = null;
            const q = questions[currentQ];
            document.getElementById('q-count').innerText = `Savol: ${currentQ + 1}/${questions.length}`;
            document.getElementById('q-text').innerText = q.q;
            
            const optDiv = document.getElementById('options');
            optDiv.innerHTML = "";
            q.o.forEach((opt, i) => {
                const d = document.createElement('div');
                d.className = 'option';
                d.innerHTML = `<b>${String.fromCharCode(65+i)})</b> &nbsp; ${opt}`;
                d.onclick = () => {
                    document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
                    d.classList.add('selected');
                    selected = i;
                };
                optDiv.appendChild(d);
            });
        }

        function nextQuestion() {
            if(selected === null) return alert("Javobni tanlang!");
            if(selected === questions[currentQ].a) score++;
            
            currentQ++;
            if(currentQ < questions.length) loadQuestion();
            else finish();
        }

        function startTimer(sec) {
            let t = sec;
            const total = sec;
            timerInt = setInterval(() => {
                t--;
                let m = Math.floor(t/60), s = t%60;
                document.getElementById('timer').innerText = `${m}:${s<10?'0'+s:s}`;
                document.getElementById('p-bar').style.width = (t/total*100) + "%";
                if(t <= 0) { clearInterval(timerInt); finish(); }
            }, 1000);
        }

        function finish() {
            clearInterval(timerInt);
            showPage('result-page');
            document.getElementById('score-val').innerText = `${score}/${questions.length}`;
            document.getElementById('percent').innerText = "To'g'ri javoblar: " + Math.round(score/questions.length*100) + "%";
        }
    </script>
</body>
</html>
