<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sardorbek Pro Quiz</title>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --accent: #38bdf8;
            --text: #f8fafc; --success: #22c55e; --warning: #f59e0b;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg); color: var(--text);
            margin: 0; padding: 0; overflow-x: hidden;
        }
        .page {
            display: none; min-height: 100vh; padding: 20px;
            flex-direction: column; align-items: center; justify-content: center;
            animation: fadeIn 0.4s ease;
        }
        .active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Splash Screen */
        #splash { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
        .logo { font-size: 45px; font-weight: bold; color: var(--accent); text-shadow: 0 0 20px rgba(56, 189, 248, 0.4); }

        /* Card & Inputs */
        .card { background: var(--card); padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; border: 1px solid #334155; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: white; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: var(--accent); outline: none; }
        
        /* Buttons */
        button { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; font-size: 16px; }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); }

        /* Loader */
        .loader { width: 20px; height: 20px; border: 3px solid #f3f3f3; border-top: 3px solid var(--accent); border-radius: 50%; display: none; animation: spin 1s linear infinite; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Menu */
        .subject-card { background: var(--card); width: 100%; max-width: 400px; padding: 20px; border-radius: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; border: 1px solid #334155; }
    </style>
</head>
<body>

    <div id="splash" class="page active">
        <div class="logo">SARDORBEK</div>
        <p style="color: #64748b;">Premium Quiz System</p>
    </div>

    <div id="auth" class="page">
        <div class="card">
            <h2 id="auth-title">Kirish / Ro'yxatdan o'tish</h2>
            <div id="loader" class="loader"></div>
            
            <input type="email" id="et_email" placeholder="E-mail">
            <input type="password" id="et_password" placeholder="Parol (kamida 6 ta belgi)">
            
            <button class="btn-primary" id="btn_login" onclick="loginUser()">KIRISH</button>
            <button class="btn-outline" id="btn_register" onclick="registerUser()">RO'YXATDAN O'TISH</button>
        </div>
    </div>

    <div id="mode" class="page">
        <h2 id="welcome-msg">Xush kelibsiz!</h2>
        <div class="subject-card" onclick="showPage('main')">
            <span>🆓 BEPUL TESTLAR</span>
            <span style="color:var(--accent)">➔</span>
        </div>
        <div class="subject-card" style="border-color: var(--warning);" onclick="alert('Admin bilan bog\'laning!')">
            <span>💰 PULLI TESTLAR</span>
            <span style="color:var(--warning)">★</span>
        </div>
    </div>

    <div id="main" class="page">
        <h2>Fanlar</h2>
        <div class="subject-card" onclick="startQuiz('Matematika')"><span>🧮 Matematika</span></div>
        <div class="subject-card" onclick="startQuiz('Tarix')"><span>📜 Tarix</span></div>
        <button class="btn-outline" onclick="showPage('mode')">ORQAGA</button>
    </div>

    <script>
        // UI elementlarini Java kodingizdagi nomlar bilan bir xil qildik
        const etEmail = document.getElementById('et_email');
        const etPassword = document.getElementById('et_password');
        const btnLogin = document.getElementById('btn_login');
        const btnRegister = document.getElementById('btn_register');
        const loader = document.getElementById('loader');

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        // OnStart() mantiqi: Agar foydalanuvchi avval kirgan bo'lsa
        window.onload = () => {
            setTimeout(() => {
                const loggedInUser = localStorage.getItem('currentUser');
                if (loggedInUser) {
                    document.getElementById('welcome-msg').innerText = "Xush kelibsiz, " + loggedInUser;
                    showPage('mode');
                } else {
                    showPage('auth');
                }
            }, 3000); // 3 soniya Splash
        };

        // RO'YXATDAN O'TISH (registerUser)
        function registerUser() {
            const email = etEmail.value;
            const password = etPassword.value;

            if (email.trim() === "" || password.trim() === "") {
                alert("E-mail va parolni kiriting.");
                return;
            }
            if (password.length < 6) {
                alert("Parol kamida 6 ta belgi bo'lishi kerak.");
                return;
            }

            // Animatsiya va tugmalarni o'chirish
            loader.style.display = "block";
            btnLogin.disabled = true;
            btnRegister.disabled = true;

            setTimeout(() => {
                // Ma'lumotlarni saqlash (Java dagi saveUserToDatabase kabi)
                localStorage.setItem('userEmail', email);
                localStorage.setItem('userPass', password);
                localStorage.setItem('currentUser', email);
                
                loader.style.display = "none";
                btnLogin.disabled = false;
                btnRegister.disabled = false;
                
                alert("Ro'yxatdan o'tish muvaffaqiyatli.");
                showPage('mode');
            }, 1500);
        }

        // KIRISH (loginUser)
        function loginUser() {
            const email = etEmail.value;
            const password = etPassword.value;
            
            const savedEmail = localStorage.getItem('userEmail');
            const savedPass = localStorage.getItem('userPass');

            if (email === savedEmail && password === savedPass) {
                loader.style.display = "block";
                setTimeout(() => {
                    localStorage.setItem('currentUser', email);
                    showPage('mode');
                }, 1000);
            } else {
                alert("Kirishda xato: Parol yoki E-mail noto'g'ri.");
            }
        }
    </script>
</body>
</html>
