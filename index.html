<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Flow - Sound Integrated</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e14;
            --accent: #00d2ff;
            --break: #00ff88;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0; background: var(--bg); color: white;
            font-family: 'Outfit', sans-serif; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        .container {
            background: var(--glass); backdrop-filter: blur(25px);
            border: 1px solid var(--border); padding: 45px;
            border-radius: 55px; text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6); width: 300px;
        }

        .timer-box { position: relative; width: 240px; height: 240px; margin: 0 auto 30px; }

        svg { transform: rotate(-90deg); width: 240px; height: 240px; }
        circle { fill: none; stroke-width: 10; stroke-linecap: round; }
        .bg-circle { stroke: var(--border); }
        .progress-circle {
            stroke: var(--accent); stroke-dasharray: 722; stroke-dashoffset: 722;
            transition: stroke-dashoffset 1s linear, stroke 0.5s;
        }

        .timer-content {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }

        .time { font-size: 48px; font-weight: 700; margin: 0; }
        .label { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); }

        .controls { display: flex; justify-content: center; gap: 15px; }

        button {
            background: white; border: none; color: black;
            padding: 12px 28px; border-radius: 18px;
            cursor: pointer; font-size: 14px; font-weight: 700;
            transition: 0.3s;
        }

        button:active { transform: scale(0.95); }
        button.secondary { background: var(--glass); color: white; border: 1px solid var(--border); }
    </style>
</head>
<body>

    <div class="container">
        <div class="timer-box">
            <svg>
                <circle class="bg-circle" cx="120" cy="120" r="115"></circle>
                <circle id="progress" class="progress-circle" cx="120" cy="120" r="115"></circle>
            </svg>
            <div class="timer-content">
                <span id="modeLabel" class="label">Focus</span>
                <p id="timeDisplay" class="time">25:00</p>
            </div>
        </div>

        <div class="controls">
            <button onclick="handleToggle()" id="playBtn">START</button>
            <button onclick="handleReset()" class="secondary">RESET</button>
        </div>
    </div>

    <script>
        let timeLeft = 25 * 60;
        let totalTime = 25 * 60;
        let timerId = null;
        let isWork = true;

        const circle = document.getElementById('progress');
        const timeDisplay = document.getElementById('timeDisplay');
        const modeLabel = document.getElementById('modeLabel');
        const playBtn = document.getElementById('playBtn');

        // --- OVOZLAR (Audio Synthesis) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playClickSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function playAlarmSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(440, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.5);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

        // --- FUNKSIYALAR ---
        function updateDisplay() {
            let mins = Math.floor(timeLeft / 60);
            let secs = timeLeft % 60;
            timeDisplay.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            const offset = 722 - (722 * (totalTime - timeLeft)) / totalTime;
            circle.style.strokeDashoffset = offset;
        }

        function handleToggle() {
            playClickSound(); // Tugma bosilganda ovoz
            if (timerId) {
                clearInterval(timerId);
                timerId = null;
                playBtn.textContent = "RESUME";
            } else {
                playBtn.textContent = "PAUSE";
                timerId = setInterval(() => {
                    timeLeft--;
                    updateDisplay();
                    if (timeLeft <= 0) {
                        clearInterval(timerId);
                        timerId = null;
                        playAlarmSound(); // Taymer tugaganda ovoz
                        setTimeout(switchMode, 1000);
                    }
                }, 1000);
            }
        }

        function handleReset() {
            playClickSound();
            clearInterval(timerId);
            timerId = null;
            timeLeft = 25 * 60;
            totalTime = 25 * 60;
            isWork = true;
            playBtn.textContent = "START";
            modeLabel.textContent = "Focus";
            modeLabel.style.color = "var(--accent)";
            circle.style.stroke = "var(--accent)";
            updateDisplay();
        }

        function switchMode() {
            isWork = !isWork;
            timeLeft = isWork ? 25 * 60 : 5 * 60;
            totalTime = timeLeft;
            modeLabel.textContent = isWork ? "Focus" : "Break";
            const color = isWork ? "var(--accent)" : "var(--break)";
            modeLabel.style.color = color;
            circle.style.stroke = color;
            updateDisplay();
            handleToggle();
        }

        updateDisplay();
    </script>
</body>
</html>
