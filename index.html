<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Flow - Premium Pomodoro</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e14;
            --accent: #00d2ff;
            --break: #00ff88;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            background: var(--bg);
            color: white;
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Fon animatsiyasi */
        .ambient-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a2a44 0%, #0b0e14 100%);
            z-index: -1;
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 50px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            width: 320px;
        }

        .timer-box {
            position: relative;
            width: 250px;
            height: 250px;
            margin: 0 auto 30px;
        }

        /* Aylana Progress */
        svg {
            transform: rotate(-90deg);
            width: 250px;
            height: 250px;
        }

        circle {
            fill: none;
            stroke-width: 8;
            stroke-linecap: round;
        }

        .bg-circle { stroke: var(--border); }
        
        .progress-circle {
            stroke: var(--accent);
            stroke-dasharray: 754; /* 2 * PI * R (R=120) */
            stroke-dashoffset: 754;
            transition: stroke-dashoffset 1s linear, stroke 0.5s;
        }

        .timer-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .time {
            font-size: 50px;
            font-weight: 700;
            margin: 0;
            letter-spacing: -1px;
        }

        .mode-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
            margin-bottom: 5px;
            display: block;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        button {
            background: var(--glass);
            border: 1px solid var(--border);
            color: white;
            padding: 12px 20px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 13px;
            transition: 0.3s;
        }

        button:hover { background: white; color: black; }

        .audio-controls {
            border-top: 1px solid var(--border);
            padding-top: 20px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .audio-btn {
            font-size: 18px;
            padding: 8px;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .active-audio {
            background: var(--accent);
            color: black;
            border: none;
        }
    </style>
</head>
<body>

    <div class="ambient-bg"></div>

    <div class="container">
        <div class="timer-box">
            <svg>
                <circle class="bg-circle" cx="125" cy="125" r="120"></circle>
                <circle id="progress" class="progress-circle" cx="125" cy="125" r="120"></circle>
            </svg>
            <div class="timer-content">
                <span id="modeLabel" class="mode-label">Focus</span>
                <p id="timeDisplay" class="time">25:00</p>
            </div>
        </div>

        <div class="controls">
            <button onclick="toggleTimer()" id="playBtn">Start</button>
            <button onclick="resetTimer()">Reset</button>
        </div>

        <div class="audio-controls">
            <button class="audio-btn" id="rainBtn" onclick="toggleAudio('rain')">🌧️</button>
            <button class="audio-btn" id="lofiBtn" onclick="toggleAudio('lofi')">🎵</button>
        </div>
    </div>

    <audio id="rainSound" loop src="https://www.soundjay.com/nature/rain-07.mp3"></audio>
    <audio id="lofiSound" loop src="https://p.scdn.co/mp3-preview/659695d36e2f694e1d3e230872658866e4a8497d?cid=774b75d4050d42d392e2764b85d30132"></audio>
    <audio id="bell" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

    <script>
        let timeLeft = 25 * 60;
        let totalTime = 25 * 60;
        let timerId = null;
        let isWork = true;

        const circle = document.getElementById('progress');
        const timeDisplay = document.getElementById('timeDisplay');
        const modeLabel = document.getElementById('modeLabel');
        const playBtn = document.getElementById('playBtn');

        function updateDisplay() {
            let mins = Math.floor(timeLeft / 60);
            let secs = timeLeft % 60;
            timeDisplay.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            
            // Aylana to'lishi
            const offset = 754 - (754 * (totalTime - timeLeft)) / totalTime;
            circle.style.strokeDashoffset = offset;
        }

        function toggleTimer() {
            if (timerId) {
                clearInterval(timerId);
                timerId = null;
                playBtn.textContent = "Resume";
            } else {
                playBtn.textContent = "Pause";
                timerId = setInterval(() => {
                    timeLeft--;
                    updateDisplay();
                    if (timeLeft <= 0) {
                        document.getElementById('bell').play();
                        switchMode();
                    }
                }, 1000);
            }
        }

        function switchMode() {
            isWork = !isWork;
            timeLeft = isWork ? 25 * 60 : 5 * 60;
            totalTime = timeLeft;
            modeLabel.textContent = isWork ? "Focus" : "Break";
            modeLabel.style.color = isWork ? "var(--accent)" : "var(--break)";
            circle.style.stroke = isWork ? "var(--accent)" : "var(--break)";
            updateDisplay();
        }

        function resetTimer() {
            clearInterval(timerId);
            timerId = null;
            timeLeft = 25 * 60;
            totalTime = 25 * 60;
            isWork = true;
            playBtn.textContent = "Start";
            updateDisplay();
        }

        function toggleAudio(type) {
            const rain = document.getElementById('rainSound');
            const lofi = document.getElementById('lofiSound');
            const rBtn = document.getElementById('rainBtn');
            const lBtn = document.getElementById('lofiBtn');

            if (type === 'rain') {
                if (rain.paused) { rain.play(); rBtn.classList.add('active-audio'); }
                else { rain.pause(); rBtn.classList.remove('active-audio'); }
            } else {
                if (lofi.paused) { lofi.play(); lBtn.classList.add('active-audio'); }
                else { lofi.pause(); lBtn.classList.remove('active-audio'); }
            }
        }

        updateDisplay();
    </script>
</body>
</html>
