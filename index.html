<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sardorbek Pro Quiz</title>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --accent: #38bdf8;
            --text: #f8fafc; --success: #22c55e; --warning: #f59e0b;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg); color: var(--text);
            margin: 0; padding: 0; overflow-x: hidden;
        }
        .page {
            display: none; min-height: 100vh; padding: 20px;
            flex-direction: column; align-items: center; justify-content: center;
            animation: fadeIn 0.5s ease;
        }
        .active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Splash Screen */
        #splash { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
        .logo { font-size: 45px; font-weight: bold; color: var(--accent); text-shadow: 0 0 20px rgba(56, 189, 248, 0.5); }

        /* Auth Form */
        .card { background: var(--card); padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; border: 1px solid #334155; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; }
        button { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); }

        /* Menu & Cards */
        .subject-card {
            background: var(--card); width: 100%; max-width: 400px;
            padding: 20px; border-radius: 15px; margin-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid #334155;
        }

        /* Quiz UI */
        .timer { font-size: 24px; color: var(--warning); font-weight: bold; margin-bottom: 10px; }
        .q-box { font-size: 20px; margin: 20px 0; text-align: center; }
        .option {
            width: 100%; background: #334155; padding: 15px;
            margin: 8px 0; border-radius: 10px; cursor: pointer;
        }
        .option:active { background: var(--accent); color: #000; }
    </style>
</head>
<body>

    <div id="splash" class="page active">
        <div class="logo">SARDORBEK</div>
        <p>Yuklanmoqda...</p>
    </div>

    <div id="auth" class="page">
        <div class="card">
            <h2>Kirish</h2>
            <input type="email" id="email" placeholder="E-mail">
            <input type="password" id="pass" placeholder="Parol">
            <button class="btn-primary" onclick="showPage('mode')">KIRISH</button>
            <button class="btn-outline">RO'YXATDAN O'TISH</button>
        </div>
    </div>

    <div id="mode" class="page">
        <h2>Rejimni tanlang</h2>
        <div class="subject-card" onclick="showPage('main')">
            <span>🆓 BEPUL TESTLAR</span>
            <button style="width:auto; margin:0" class="btn-primary">Kirish</button>
        </div>
        <div class="subject-card" style="border-color: var(--warning);" onclick="alert('Admin bilan bog\'laning!')">
            <span>💰 PULLI TESTLAR</span>
            <button style="width:auto; margin:0; background: var(--warning);" class="btn-primary">Sotib olish</button>
        </div>
    </div>

    <div id="main" class="page">
        <h2>Fanlar</h2>
        <div class="subject-card" onclick="startQuiz('Matematika')"><span>🧮 Matematika</span></div>
        <div class="subject-card" onclick="startQuiz('Tarix')"><span>📜 Tarix</span></div>
        <div class="subject-card" onclick="startQuiz('Ona tili')"><span>📚 Ona tili</span></div>
    </div>

    <div id="quiz" class="page">
        <div class="timer" id="timer">90:00</div>
        <div class="card">
            <div id="q-count">Savol: 1/10</div>
            <div class="q-box" id="q-text">Savol yuklanmoqda...</div>
            <div id="options-box"></div>
        </div>
    </div>

    <div id="result" class="page">
        <div class="card" style="text-align: center;">
            <h1 style="color: var(--success)">Natija</h1>
            <div id="score-text" style="font-size: 25px;">10 dan 8 to'g'ri</div>
            <button class="btn-primary" onclick="showPage('main')">YANGI TEST</button>
        </div>
    </div>

    <script>
        // Sahifalarni almashtirish funksiyasi
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        // Splashni 3 soniyadan keyin o'chirish
        setTimeout(() => showPage('auth'), 3000);

        // Savollar bazasi
        const database = {
            "Matematika": [
                {q: "5 + 7 = ?", opt: ["10", "12", "13", "11"], a: 1},
                {q: "25 ning ildizi?", opt: ["4", "5", "6", "3"], a: 1}
            ],
            "Tarix": [
                {q: "Amir Temur nechanchi yilda tug'ilgan?", opt: ["1336", "1342", "1405", "1299"], a: 0}
            ]
        };

        let currentSubject = "";
        let currentIdx = 0;
        let score = 0;

        function startQuiz(sub) {
            currentSubject = sub;
            currentIdx = 0;
            score = 0;
            showPage('quiz');
            loadQuestion();
        }

        function loadQuestion() {
            const data = database[currentSubject][currentIdx];
            document.getElementById('q-text').innerText = data.q;
            document.getElementById('q-count').innerText = `Savol: ${currentIdx + 1}/${database[currentSubject].length}`;
            
            const box = document.getElementById('options-box');
            box.innerHTML = "";
            data.opt.forEach((o, i) => {
                const d = document.createElement('div');
                d.className = "option";
                d.innerText = o;
                d.onclick = () => checkAnswer(i);
                box.appendChild(d);
            });
        }

        function checkAnswer(i) {
            if(i === database[currentSubject][currentIdx].a) score++;
            
            currentIdx++;
            if(currentIdx < database[currentSubject].length) {
                loadQuestion();
            } else {
                finishQuiz();
            }
        }

        function finishQuiz() {
            document.getElementById('score-text').innerText = `${database[currentSubject].length} dan ${score} ta to'g'ri`;
            showPage('result');
        }
    </script>
</body>
</html>
