<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sardorbek Quiz App</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; transition: 0.3s; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #1A2D4D; color: #333; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { display: none; width: 90%; max-width: 450px; background: white; padding: 25px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); text-align: center; }
        input { width: 100%; padding: 15px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 15px; background: #f9f9f9; outline: none; }
        button { width: 100%; padding: 16px; border-radius: 15px; font-size: 17px; font-weight: bold; cursor: pointer; border: none; margin-bottom: 10px; }
        .btn-blue { background: #007AFF; color: white; }
        .btn-option { background: #f0f4f8; border: 1px solid #d1d9e6; text-align: left; padding: 15px; font-weight: normal; }
        .btn-option:hover { background: #e0e7ff; border-color: #007AFF; }
        .timer-header { background: #f8f9fa; padding: 15px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #eee; }
        #timer-text { font-size: 20px; font-weight: bold; color: #d32f2f; }
        .msg-item { background: #e3f2fd; padding: 15px; border-radius: 15px; margin-bottom: 10px; text-align: left; border-left: 5px solid #2196F3; }
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #2196F3; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; color: white; }
    </style>
</head>
<body>

    <div id="splash">
        <h1 id="splash-text" style="font-size: 40px;"></h1>
    </div>

    <div id="auth-screen" class="card">
        <h2 id="auth-title">Xush kelibsiz</h2>
        <div id="reg-inputs" style="display:none">
            <input type="text" id="fname" placeholder="Ism">
            <input type="text" id="lname" placeholder="Familya">
        </div>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Parol">
        <button class="btn-blue" id="auth-btn" onclick="handleAuth()">DAVOM ETISH</button>
        <p id="toggle-auth" onclick="toggleAuthMode()" style="cursor:pointer; color:#007AFF">Ro'yxatdan o'tish</p>
    </div>

    <div id="mode-screen" class="card">
        <div id="id-tag" style="background:#eee; padding:10px; border-radius:10px; margin-bottom:15px; font-size:12px; cursor:pointer;" onclick="copyID()">ID: ...</div>
        <h3>Rejimni tanlang</h3>
        <button style="background:#FFC107; color:#1A2D4D" onclick="checkPremium()">💰 PULLI TESTLAR</button>
        <button style="background:#4CAF50; color:white" onclick="enterMain(false)">🆓 BEPUL TESTLAR</button>
        <button style="background:#2196F3; color:white" onclick="showMessages()">📩 XABARLARIM</button>
    </div>

    <div id="main-screen" class="card">
        <div class="timer-header"><span id="timer-text">90:00</span></div>
        <h3>Fanni tanlang</h3>
        <button class="btn-option" onclick="startQuiz('Matematika')">📐 Matematika</button>
        <button class="btn-option" onclick="startQuiz('Tarix')">📜 Tarix</button>
        <button class="btn-option" onclick="startQuiz('Ona tili')">✍️ Ona tili</button>
    </div>

    <div id="quiz-screen" class="card">
        <div id="q-progress" style="font-size:14px; color:#888; margin-bottom:10px;">Savol: 1/10</div>
        <h3 id="question-text" style="margin-bottom:20px;">Savol yuklanmoqda...</h3>
        <div id="options-container"></div>
    </div>

    <div id="result-screen" class="card">
        <h2 style="color:#4CAF50">Test yakunlandi!</h2>
        <div style="font-size:18px; margin:20px 0;">
            <p>To'g'ri javoblar: <b id="res-correct">0</b></p>
            <p>Xato javoblar: <b id="res-wrong">0</b></p>
        </div>
        <button class="btn-blue" onclick="location.reload()">ASOSIY MENYUGA QAYTISH</button>
    </div>

    <div id="msg-screen" class="card">
        <h3>Admin xabarlari</h3>
        <div id="msg-list" style="max-height:300px; overflow-y:auto; margin-bottom:20px;"></div>
        <button class="btn-blue" onclick="closeMessages()">ORQAGA</button>
    </div>

    <script>
        // FIREBASE SOZLAMALARI
        const firebaseConfig = {
            apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
            authDomain: "quiz-app-3692d.firebaseapp.com",
            databaseURL: "https://quiz-app-3692d-default-rtdb.firebaseio.com",
            projectId: "quiz-app-3692d",
            storageBucket: "quiz-app-3692d.firebasestorage.app",
            messagingSenderId: "526836020845",
            appId: "1:526836020845:android:3ea991380c104c75e8b164"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.database();

        let currentMode = 'login', userShortId = '', isPremiumUser = false;
        let questions = [], currentQIdx = 0, correctCount = 0, wrongCount = 0, timerInterval;

        // SPLASH
        let sTxt = "Sardorbek", sIdx = 0;
        function playSplash() {
            if(sIdx < sTxt.length) { document.getElementById("splash-text").innerHTML += sTxt[sIdx++]; setTimeout(playSplash, 150); }
            else { setTimeout(() => { 
                document.getElementById("splash").style.display = "none";
                auth.onAuthStateChanged(user => { if(user) loadUserData(user); else showScreen('auth-screen'); });
            }, 1000); }
        }
        window.onload = playSplash;

        // AUTH
        function toggleAuthMode() {
            currentMode = currentMode === 'login' ? 'reg' : 'login';
            document.getElementById("auth-title").innerText = currentMode === 'login' ? 'Kirish' : 'Ro\'yxatdan o\'tish';
            document.getElementById("reg-inputs").style.display = currentMode === 'login' ? 'none' : 'block';
            document.getElementById("toggle-auth").innerText = currentMode === 'login' ? 'Ro\'yxatdan o'tish' : 'Akkauntingiz bormi? Kirish';
        }

        function handleAuth() {
            const email = document.getElementById("email").value, pass = document.getElementById("pass").value;
            if(currentMode === 'reg') {
                auth.createUserWithEmailAndPassword(email, pass).then(res => {
                    const sid = Math.random().toString(36).substr(2, 5).toUpperCase();
                    db.ref('Users/' + res.user.uid).set({ firstName: document.getElementById("fname").value, lastName: document.getElementById("lname").value, email, isPremium: false, shortId: sid });
                }).catch(e => alert(e.message));
            } else {
                auth.signInWithEmailAndPassword(email, pass).catch(e => alert(e.message));
            }
        }

        // CHOOSE MODE
        function loadUserData(user) {
            db.ref('Users/' + user.uid).once('value', snap => {
                const data = snap.val();
                userShortId = data.shortId;
                document.getElementById("id-tag").innerText = "ID: " + userShortId + " (Nusxalash)";
                showScreen('mode-screen');
            });
        }

        function checkPremium() {
            db.ref('Users/' + auth.currentUser.uid + '/isPremium').once('value', snap => {
                if(snap.val() === true) {
                    db.ref('Users/' + auth.currentUser.uid + '/isPremium').set(false);
                    enterMain(true);
                } else {
                    if(confirm("Premium rejim uchun admin bilan bog'laning. ID: " + userShortId + "\nO'tishni xohlaysizmi?")) window.open("https://t.me/Uzb_Quiz");
                }
            });
        }

        // MAIN & TIMER
        function enterMain(premium) {
            isPremiumUser = premium;
            showScreen('main-screen');
            let time = 90 * 60;
            timerInterval = setInterval(() => {
                let m = Math.floor(time / 60), s = time % 60;
                document.getElementById("timer-text").innerText = `${m}:${s < 10 ? '0'+s : s}`;
                if(time-- <= 0) { clearInterval(timerInterval); alert("Vaqt tugadi!"); location.reload(); }
            }, 1000);
        }

        // QUIZ LOGIC
        function startQuiz(subject) {
            showScreen('quiz-screen');
            // Haqiqiy bazadan savollarni olish 
            db.ref('Questions/' + subject).limitToFirst(10).once('value', snap => {
                snap.forEach(child => { questions.push({id: child.key, ...child.val()}); });
                showQuestion();
            });
        }

        function showQuestion() {
            if(currentQIdx >= questions.length) return showResult();
            const q = questions[currentQIdx];
            document.getElementById("q-progress").innerText = `Savol: ${currentQIdx + 1}/${questions.length}`;
            document.getElementById("question-text").innerText = q.question;
            const container = document.getElementById("options-container");
            container.innerHTML = '';
            [q.option1, q.option2, q.option3, q.option4].forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'btn-option';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt, q.answer);
                container.appendChild(btn);
            });
        }

        function checkAnswer(selected, correct) {
            if(selected === correct) correctCount++; else wrongCount++;
            currentQIdx++;
            showQuestion();
        }

        // RESULT
        function showResult() {
            clearInterval(timerInterval);
            showScreen('result-screen');
            document.getElementById("res-correct").innerText = correctCount;
            document.getElementById("res-wrong").innerText = wrongCount;
        }

        // MESSAGES
        function showMessages() {
            showScreen('msg-screen');
            db.ref('Messages').on('value', snap => {
                const list = document.getElementById("msg-list");
                list.innerHTML = '';
                snap.forEach(child => {
                    const d = child.val();
                    list.innerHTML += `<div class="msg-item"><b>Admin:</b><br>${d.message}</div>`;
                });
            });
        }

        function closeMessages() { showScreen('mode-screen'); }

        function showScreen(id) {
            document.querySelectorAll('.card').forEach(c => c.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }

        function copyID() { navigator.clipboard.writeText(userShortId); alert("ID nusxalandi!"); }
    </script>
</body>
</html>
