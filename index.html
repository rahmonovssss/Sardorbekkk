<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sardorbek Taymeri - Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --accent: #00d2ff;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background: var(--bg); color: white;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
        }

        /* --- KIRISH QISMI (Splash Screen) --- */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
            transition: opacity 1s ease, visibility 1s;
        }

        .logo-text {
            font-size: 42px; font-weight: 800; letter-spacing: 5px;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 210, 255, 0.3);
            animation: fadeInOut 2.5s infinite alternate;
        }

        .loader-bar {
            width: 150px; height: 2px; background: var(--border);
            margin-top: 20px; border-radius: 2px; overflow: hidden;
        }

        .loader-progress {
            width: 0%; height: 100%; background: var(--accent);
            animation: load 2.5s forwards;
        }

        @keyframes fadeInOut {
            0% { opacity: 0.5; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes load { 100% { width: 100%; } }

        /* --- ASOSIY INTERFEYS --- */
        #main-content {
            opacity: 0; transform: translateY(20px);
            transition: all 1s ease;
            height: 100vh; display: flex; justify-content: center; align-items: center;
        }

        .container {
            background: var(--glass); backdrop-filter: blur(40px);
            border: 1px solid var(--border); padding: 50px;
            border-radius: 60px; text-align: center;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8); width: 280px;
        }

        .app-title {
            font-size: 12px; text-transform: uppercase; letter-spacing: 4px;
            color: rgba(255,255,255,0.4); margin-bottom: 30px;
        }

        .timer-box { position: relative; width: 220px; height: 220px; margin: 0 auto 40px; }

        svg { transform: rotate(-90deg); width: 220px; height: 220px; }
        circle { fill: none; stroke-width: 8; stroke-linecap: round; }
        .bg-circle { stroke: var(--border); }
        .progress-circle {
            stroke: var(--accent); stroke-dasharray: 660; stroke-dashoffset: 660;
            transition: stroke-dashoffset 1s linear;
        }

        .time-display {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 52px; font-weight: 600;
        }

        .controls button {
            background: white; border: none; color: black;
            padding: 14px 35px; border-radius: 20px;
            cursor: pointer; font-size: 15px; font-weight: 800;
            transition: 0.3s; margin: 0 5px;
        }

        button:active { transform: scale(0.9); }
        button.reset-btn { background: var(--glass); color: white; border: 1px solid var(--border); }

    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="logo-text">SARDORBEK</div>
        <div style="font-size: 10px; letter-spacing: 3px; margin-top: 5px; color: #555;">PREMIUM TIMER</div>
        <div class="loader-bar"><div class="loader-progress"></div></div>
    </div>

    <div id="main-content">
        <div class="container">
            <div class="app-title">Focus Session</div>
            <div class="timer-box">
                <svg>
                    <circle class="bg-circle" cx="110" cy="110" r="105"></circle>
                    <circle id="progress" class="progress-circle" cx="110" cy="110" r="105"></circle>
                </svg>
                <div class="time-display" id="time">25:00</div>
            </div>

            <div class="controls">
                <button onclick="toggleTimer()" id="playBtn">START</button>
                <button onclick="resetTimer()" class="reset-btn">RESET</button>
            </div>
        </div>
    </div>

    <script>
        // --- KIRISH ANIMATSIYASI ---
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                document.getElementById('splash-screen').style.visibility = 'hidden';
                document.getElementById('main-content').style.opacity = '1';
                document.getElementById('main-content').style.transform = 'translateY(0)';
            }, 3000);
        };

        // --- OVOZ FUNKSIYASI (Integrated) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playClick() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        // --- TAYMER MANTIQI ---
        let timeLeft = 25 * 60;
        let totalTime = 25 * 60;
        let timerId = null;

        function updateUI() {
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            document.getElementById('time').textContent = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
            const offset = 660 - (660 * (totalTime - timeLeft)) / totalTime;
            document.getElementById('progress').style.strokeDashoffset = offset;
        }

        function toggleTimer() {
            playClick();
            if (timerId) {
                clearInterval(timerId);
                timerId = null;
                document.getElementById('playBtn').textContent = "RESUME";
            } else {
                document.getElementById('playBtn').textContent = "PAUSE";
                timerId = setInterval(() => {
                    timeLeft--;
                    updateUI();
                    if (timeLeft <= 0) {
                        clearInterval(timerId);
                        alert("Vaqt tugadi!");
                    }
                }, 1000);
            }
        }

        function resetTimer() {
            playClick();
            clearInterval(timerId);
            timerId = null;
            timeLeft = 25 * 60;
            document.getElementById('playBtn').textContent = "START";
            updateUI();
        }

        updateUI();
    </script>
</body>
</html>
