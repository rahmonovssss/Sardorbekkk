<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Pomodoro</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #2f3640;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
        }
        .pomodoro-card {
            background: #e84118;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            text-align: center;
            width: 300px;
            transition: background 0.5s;
        }
        .timer-display {
            font-size: 80px;
            font-weight: bold;
            margin: 20px 0;
        }
        .controls button {
            background: white;
            border: none;
            padding: 10px 25px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            color: #e84118;
            margin: 5px;
            font-size: 16px;
        }
        .status-text {
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        /* Dam olish vaqti uchun yashil rang */
        .break-mode {
            background: #4cd137;
        }
        .break-mode button {
            color: #4cd137;
        }
    </style>
</head>
<body>

<div class="pomodoro-card" id="card">
    <div class="status-text" id="status">Diqqat: Ish vaqti</div>
    <div class="timer-display" id="timer">25:00</div>
    
    <div class="controls">
        <button onclick="startTimer()">START</button>
        <button onclick="pauseTimer()">PAUSE</button>
        <button onclick="resetTimer()">RESET</button>
    </div>
</div>

<script>
    let timeLeft = 25 * 60;
    let timerId = null;
    let isWorkMode = true;

    const timerDisplay = document.getElementById('timer');
    const statusText = document.getElementById('status');
    const card = document.getElementById('card');

    function updateDisplay() {
        let minutes = Math.floor(timeLeft / 60);
        let seconds = timeLeft % 60;
        timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    }

    function startTimer() {
        if (timerId !== null) return;
        
        timerId = setInterval(() => {
            timeLeft--;
            updateDisplay();

            if (timeLeft <= 0) {
                clearInterval(timerId);
                timerId = null;
                switchMode();
            }
        }, 1000);
    }

    function pauseTimer() {
        clearInterval(timerId);
        timerId = null;
    }

    function resetTimer() {
        pauseTimer();
        isWorkMode = true;
        timeLeft = 25 * 60;
        updateDisplay();
        updateUI();
    }

    function switchMode() {
        // Ovozli xabar (Brauzer ruxsat bersa)
        const bell = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
        bell.play();

        isWorkMode = !isWorkMode;
        timeLeft = isWorkMode ? 25 * 60 : 5 * 60;
        
        updateUI();
        updateDisplay();
        alert(isWorkMode ? "Ishni boshlaymiz!" : "Tanaffus vaqti!");
        startTimer();
    }

    function updateUI() {
        if (isWorkMode) {
            statusText.textContent = "Diqqat: Ish vaqti";
            card.classList.remove('break-mode');
        } else {
            statusText.textContent = "Tanaffus";
            card.classList.add('break-mode');
        }
    }
</script>

</body>
</html>
