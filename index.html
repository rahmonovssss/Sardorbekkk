<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sardorbek Taymeri - Ultra</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --accent: #00d2ff;
            --break: #00ff88;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background: var(--bg); color: white;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
        }

        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
            transition: opacity 0.8s ease;
        }

        .logo-text {
            font-size: 42px; font-weight: 800; letter-spacing: 5px;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 210, 255, 0.3);
        }

        #main-content {
            opacity: 0; transform: translateY(20px);
            transition: all 0.8s ease;
            height: 100vh; display: flex; justify-content: center; align-items: center;
        }

        .container {
            background: var(--glass); backdrop-filter: blur(40px);
            border: 1px solid var(--border); padding: 40px;
            border-radius: 60px; text-align: center;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8); width: 280px;
        }

        .status-label {
            font-size: 11px; text-transform: uppercase; letter-spacing: 4px;
            color: var(--accent); margin-bottom: 15px; font-weight: 800;
        }

        .time-setter {
            display: flex; justify-content: center; gap: 10px; margin-bottom: 20px;
        }
        .time-setter input {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            color: white; width: 50px; padding: 10px; border-radius: 12px;
            text-align: center; font-family: 'Outfit'; font-size: 18px; outline: none;
        }
        .time-setter input:focus { border-color: var(--accent); }

        .timer-box { position: relative; width: 200px; height: 200px; margin: 0 auto 30px; }
        svg { transform: rotate(-90deg); width: 200px; height: 200px; }
        circle { fill: none; stroke-width: 8; stroke-linecap: round; }
        .bg-circle { stroke: var(--border); }
        .progress-circle {
            stroke: var(--accent); stroke-dasharray: 600; stroke-dashoffset: 600;
            transition: stroke-dashoffset 0.5s linear, stroke 0.5s;
        }

        .time-display {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 45px; font-weight: 600;
        }

        .controls button {
            background: white; border: none; color: black;
            padding: 14px 30px; border-radius: 20px;
            cursor: pointer; font-size: 14px; font-weight: 800;
            transition: 0.3s; margin: 0 5px;
        }

        button:active { transform: scale(0.95); }
        button.reset-btn { background: var(--glass); color: white; border: 1px solid var(--border); }
        .hidden { display: none; }
    </style>
</head>
<body>

    <audio id="alarmSound" src="alarm.mp3" preload="auto"></audio>

    <div id="splash-screen">
        <div class="logo-text">SARDORBEK</div>
        <div style="font-size: 10px; letter-spacing: 3px; margin-top: 5px; color: #555;">PREMIUM TIMER</div>
    </div>

    <div id="main-content">
        <div class="container">
            <div id="statusLabel" class="status-label">Focus Session</div>

            <div class="time-setter" id="setter">
                <input type="number" id="minInput" value="25" min="0" max="99" onchange="manualSet()">
                <span style="line-height: 45px; opacity: 0.5;">:</span>
                <input type="number" id="secInput" value="0" min="0" max="59" onchange="manualSet()">
            </div>

            <div class="timer-box">
                <svg>
                    <circle class="bg-circle" cx="100" cy="100" r="95"></circle>
                    <circle id="progress" class="progress-circle" cx="100" cy="100" r="95"></circle>
                </svg>
                <div class="time-display" id="time">25:00</div>
            </div>

            <div class="controls">
                <button onclick="toggleTimer()" id="playBtn">START</button>
                <button onclick="resetTimer()" class="reset-btn">RESET</button>
            </div>
        </div>
    </div>

    <script>
        let timeLeft = 25 * 60;
        let totalTime = 25 * 60;
        let timerId = null;
        let isWorkMode = true;
        let endTime = null;

        const alarm = document.getElementById('alarmSound');
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // Yoqimli click ovozi (Soft Pop)
        function playClickEffect() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(1000, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 800);
                document.getElementById('main-content').style.opacity = '1';
                document.getElementById('main-content').style.transform = 'translateY(0)';
            }, 2500);
        };

        function updateUI() {
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            document.getElementById('time').textContent = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
            const offset = 600 - (600 * (totalTime - timeLeft)) / totalTime;
            document.getElementById('progress').style.strokeDashoffset = offset;
        }

        function manualSet() {
            if (timerId) return;
            const m = parseInt(document.getElementById('minInput').value) || 0;
            const s = parseInt(document.getElementById('secInput').value) || 0;
            timeLeft = (m * 60) + s;
            totalTime = timeLeft;
            updateUI();
        }

        function toggleTimer() {
            playClickEffect(); // CLICK!
            alarm.play().then(() => { alarm.pause(); alarm.currentTime = 0; }).catch(() => {});

            if (timerId) {
                clearInterval(timerId);
                timerId = null;
                endTime = null;
                document.getElementById('playBtn').textContent = "RESUME";
                document.getElementById('setter').classList.remove('hidden');
            } else {
                if (timeLeft <= 0) return;
                endTime = Date.now() + (timeLeft * 1000);
                document.getElementById('playBtn').textContent = "PAUSE";
                document.getElementById('setter').classList.add('hidden');
                timerId = setInterval(tick, 1000);
            }
        }

        function tick() {
            const now = Date.now();
            timeLeft = Math.round((endTime - now) / 1000);
            if (timeLeft <= 0) {
                timeLeft = 0;
                updateUI();
                clearInterval(timerId);
                timerId = null;
                handleEnd();
            } else {
                updateUI();
            }
        }

        function handleEnd() {
            alarm.play().catch(e => console.log("Audio error"));
            if (Notification.permission === 'granted') {
                new Notification(isWorkMode ? "Vaqt tugadi!" : "Tanaffus tugadi!");
            }
            isWorkMode = !isWorkMode;
            if (isWorkMode) {
                manualSet();
                document.getElementById('statusLabel').textContent = "Focus Session";
                document.getElementById('statusLabel').style.color = "var(--accent)";
                document.getElementById('progress').style.stroke = "var(--accent)";
            } else {
                timeLeft = 5 * 60;
                totalTime = timeLeft;
                document.getElementById('statusLabel').textContent = "Short Break";
                document.getElementById('statusLabel').style.color = "var(--break)";
                document.getElementById('progress').style.stroke = "var(--break)";
            }
            document.getElementById('playBtn').textContent = "START";
            document.getElementById('setter').classList.remove('hidden');
            updateUI();
        }

        function resetTimer() {
            playClickEffect(); // CLICK!
            clearInterval(timerId);
            timerId = null;
            isWorkMode = true;
            manualSet();
            document.getElementById('playBtn').textContent = "START";
            document.getElementById('statusLabel').textContent = "Focus Session";
            document.getElementById('statusLabel').style.color = "var(--accent)";
            document.getElementById('progress').style.stroke = "var(--accent)";
            document.getElementById('setter').classList.remove('hidden');
            updateUI();
        }

        updateUI();
    </script>
</body>
</html>
