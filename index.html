<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DTM Tizimi - Index</title>
    
    <style>
        /* --- DIZAYN QISMI (O'ZGARISHSIZ QOLDI) --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            height: 100vh; width: 100%; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364);
            background-size: 400% 400%; animation: gradientBG 10s ease infinite; overflow: hidden;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364);
            display: flex; align-items: center; justify-content: center; z-index: 10000; text-align: center; color: white;
        }
        .logo-icon { font-size: 80px; margin-bottom: 20px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } }
        .loading-bar { width: 200px; height: 4px; background: rgba(255, 255, 255, 0.2); border-radius: 10px; margin: 20px auto; position: relative; overflow: hidden; }
        .loading-bar::after { content: ''; position: absolute; left: -100%; width: 100%; height: 100%; background: #00d2ff; animation: loading 2s linear infinite; }
        @keyframes loading { 0% { left: -100%; } 100% { left: 100%; } }

        #main-auth-container { display: none; width: 100%; height: 100%; align-items: center; justify-content: center; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); padding: 20px; }
        .form-box { width: 100%; max-width: 450px; padding: 40px; background: rgba(255, 255, 255, 0.1); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.2); text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        h2 { color: #fff; margin-bottom: 30px; letter-spacing: 2px; text-transform: uppercase; }
        .input-group { position: relative; margin-bottom: 25px; width: 100%; }
        .input-group input { width: 100%; padding: 15px; background: rgba(255, 255, 255, 0.1); border: none; outline: none; border-radius: 10px; color: #fff; font-size: 16px; border-bottom: 2px solid transparent; transition: 0.3s; }
        .input-group input:focus { border-bottom: 2px solid #00d2ff; background: rgba(255, 255, 255, 0.2); }
        .input-group label { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: rgba(255, 255, 255, 0.5); pointer-events: none; transition: 0.3s ease; }
        .input-group input:focus ~ label, .input-group input:valid ~ label { top: -12px; left: 10px; font-size: 12px; color: #00d2ff; font-weight: bold; }
        .submit-btn { width: 100%; padding: 15px; background: linear-gradient(90deg, #00d2ff, #3a7bd5); border: none; border-radius: 10px; color: white; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.4s; box-shadow: 0 5px 15px rgba(0,210,255,0.3); }
        .submit-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,210,255,0.5); }
        .footer-text { margin-top: 20px; color: rgba(255, 255, 255, 0.7); font-size: 14px; }
        .footer-text span { color: #00d2ff; cursor: pointer; text-decoration: underline; }
    </style>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import { getAuth, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
      // Firestore import qilindi
      import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
        authDomain: "quiz-app-3692d.firebaseapp.com",
        projectId: "quiz-app-3692d",
        storageBucket: "quiz-app-3692d.firebasestorage.app",
        messagingSenderId: "526836020845",
        appId: "1:526836020845:android:3ea991380c104c75e8b164"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app); // Bazani ishga tushirdik

      // --- LOGIN HOLATINI TEKSHIRISH ---
      onAuthStateChanged(auth, (user) => {
          setTimeout(() => {
              if (user) {
                  window.location.replace("home.html");
              } else {
                  document.getElementById('splash-screen').style.display = 'none';
                  document.getElementById('main-auth-container').style.display = 'flex';
              }
          }, 3000);
      });

      // --- ASOSIY AUTH FUNKSIYASI ---
      window.handleAuth = async () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const fullname = document.getElementById('fullname').value;
        const btn = document.getElementById('submit-btn');
        const mode = btn.getAttribute('data-mode');

        btn.disabled = true;
        btn.innerText = "ILTIMOS KUTING...";

        try {
            if (mode === 'login') {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.replace("home.html");
            } else {
                // RO'YXATDAN O'TISH
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // 1. Firebase Auth profiliga yozish
                await updateProfile(user, { displayName: fullname });

                // 2. FIRESTORE BAZASIGA YUBORISH (Siz aytgan qism)
                await setDoc(doc(db, "users", user.uid), {
                    fio: fullname,
                    email: email,
                    createdAt: new Date()
                });
                
                alert("Muvaffaqiyatli ro'yxatdan o'tdingiz!");
                window.location.replace("home.html");
            }
        } catch (error) {
            alert("Xatolik: " + error.message);
            btn.disabled = false;
            btn.innerText = "DAVOM ETISH";
        }
      };
    </script>
</head>
<body>

    <div id="splash-screen">
        <div class="loader-container">
            <div class="logo-icon">🎓</div>
            <h1>DTM QUIZ</h1>
            <p style="opacity: 0.6; font-size: 14px; margin-top: 5px;">Xush kelibsiz, Doktor!</p>
            <div class="loading-bar"></div>
        </div>
    </div>

    <div id="main-auth-container">
        <div class="form-box">
            <h2 id="form-title">Kirish</h2>
            <form id="auth-form" onsubmit="event.preventDefault(); handleAuth();">
                <div class="input-group" id="name-group" style="display: none;">
                    <input type="text" id="fullname">
                    <label>F.I.SH</label>
                </div>
                <div class="input-group">
                    <input type="email" id="email" required>
                    <label>Email</label>
                </div>
                <div class="input-group">
                    <input type="password" id="password" required>
                    <label>Parol</label>
                </div>
                <button type="submit" class="submit-btn" id="submit-btn" data-mode="login">DAVOM ETISH</button>
            </form>
            <p class="footer-text" id="toggle-text">
                Akkauntingiz yo'qmi? <span onclick="toggleMode()">Ro'yxatdan o'tish</span>
            </p>
        </div>
    </div>

    <script>
        function toggleMode() {
            const title = document.getElementById('form-title');
            const btn = document.getElementById('submit-btn');
            const toggleText = document.getElementById('toggle-text');
            const nameGroup = document.getElementById('name-group');
            const mode = btn.getAttribute('data-mode');

            if (mode === 'login') {
                title.innerText = "Ro'yxatdan o'tish";
                btn.innerText = "RO'YXATDAN O'TISH";
                btn.setAttribute('data-mode', 'signup');
                toggleText.innerHTML = "Akkauntingiz bormi? <span onclick='toggleMode()'>Kirish</span>";
                nameGroup.style.display = "block";
                document.getElementById('fullname').required = true;
            } else {
                title.innerText = "Kirish";
                btn.innerText = "KIRISH";
                btn.setAttribute('data-mode', 'login');
                toggleText.innerHTML = "Akkauntingiz yo'qmi? <span onclick='toggleMode()'>Ro'yxatdan o'tish</span>";
                nameGroup.style.display = "none";
                document.getElementById('fullname').required = false;
            }
        }
    </script>
</body>
</html>
