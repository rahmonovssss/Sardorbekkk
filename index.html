<!DOCTYPE html>
<html>
<head>
    <title>Matematik Mayatnik Simulyatsiyasi</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; background: #f0f0f0; font-family: sans-serif; }
        canvas { background: white; border: 2px solid #333; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .controls { margin-top: 20px; padding: 10px; background: #fff; border-radius: 8px; }
    </style>
</head>
<body>

    <h2>Matematik Mayatnik</h2>
    <canvas id="canvas" width="600" height="400"></canvas>

    <div class="controls">
        <label>Ip uzunligi (L): </label>
        <input type="range" id="lenSlider" min="50" max="250" value="150">
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const lenSlider = document.getElementById('lenSlider');

        // Fizik o'zgaruvchilar
        let angle = Math.PI / 4; // Boshlang'ich burchak (45 daraja)
        let angleV = 0;          // Burchak tezligi
        let angleA = 0;          // Burchak tezlanishi
        let g = 0.8;             // Erkin tushish tezlanishi (simulyatsiya uchun)
        
        const origin = { x: 300, y: 50 };

        function draw() {
            let L = parseFloat(lenSlider.value);
            
            // Fizik hisob-kitob (Nyuton qonuni asosida)
            // formula: a = -(g/L) * sin(theta)
            angleA = (-1 * g / L) * Math.sin(angle);
            angleV += angleA;
            angle += angleV;

            // Ishqalanish (damping) - to'xtab qolishi uchun
            angleV *= 0.995;

            // Koordinatalarni hisoblash
            let x = L * Math.sin(angle) + origin.x;
            let y = L * Math.cos(angle) + origin.y;

            // Chizish
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Ipni chizish
            ctx.beginPath();
            ctx.moveTo(origin.x, origin.y);
            ctx.lineTo(x, y);
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Yukni (sharchani) chizish
            ctx.beginPath();
            ctx.arc(x, y, 20, 0, Math.PI * 2);
            ctx.fillStyle = '#e74c3c';
            ctx.fill();
            ctx.stroke();

            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
