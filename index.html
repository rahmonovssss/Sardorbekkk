<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sardorbek Pro - Audio</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05070a; --accent: #00d2ff; --glass: rgba(255, 255, 255, 0.05); }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Outfit', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .container { background: var(--glass); backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.1); padding: 40px; border-radius: 50px; text-align: center; width: 280px; }
        .time-inputs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        input { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; width: 55px; padding: 10px; border-radius: 12px; text-align: center; font-size: 18px; outline: none; }
        .timer-box { position: relative; width: 200px; height: 200px; margin: 0 auto 30px; }
        svg { transform: rotate(-90deg); width: 200px; height: 200px; }
        circle { fill: none; stroke-width: 8; stroke: rgba(255,255,255,0.1); stroke-linecap: round; }
        #progress { stroke: var(--accent); stroke-dasharray: 600; stroke-dashoffset: 600; transition: 0.5s linear; }
        .display { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 45px; font-weight: 800; }
        .btns button { background: white; border: none; padding: 12px 30px; border-radius: 15px; font-weight: 800; cursor: pointer; transition: 0.3s; margin: 0 5px; }
        .stats { margin-top: 25px; font-size: 11px; opacity: 0.5; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="container">
    <div id="status" style="font-size: 10px; color: var(--accent); margin-bottom: 15px; letter-spacing: 2px;">READY TO FOCUS</div>
    <div class="time-inputs" id="inputArea">
        <input type="number" id="m" value="25">
        <input type="number" id="s" value="0">
    </div>

    <div class="timer-box">
        <svg><circle cx="100" cy="100" r="95"></circle><circle id="progress" cx="100" cy="100" r="95"></circle></svg>
        <div class="display" id="display">25:00</div>
    </div>

    <div class="btns">
        <button onclick="toggleTimer()" id="mainBtn">START</button>
        <button onclick="reset()" style="background:none; color:white; border:1px solid rgba(255,255,255,0.1);">RESET</button>
    </div>

    <div class="stats">BUGUNGI FOKUSLAR: <span id="count" style="color:var(--accent)">0</span></div>
</div>

<script>
    let timeLeft, total, timerId = null, endTime = null;
    let sessions = parseInt(localStorage.getItem('sessions')) || 0;
    document.getElementById('count').textContent = sessions;

    // --- AUDIO FAYLNI BIRLASHTIRISH ---
    // Fayl assets papkasida "alarm.mp3" nomi bilan bo'lishi kerak
    const finishAudio = new Audio('alarm.mp3');

    function playFinishSound() {
        finishAudio.play().catch(e => console.log("Audio xatosi: ", e));
    }

    function updateUI() {
        const mm = Math.floor(timeLeft / 60);
        const ss = timeLeft % 60;
        document.getElementById('display').textContent = `${mm.toString().padStart(2,'0')}:${ss.toString().padStart(2,'0')}`;
        document.getElementById('progress').style.strokeDashoffset = 600 - (600 * (total - timeLeft) / total);
    }

    function toggleTimer() {
        // Android uchun audio tizimini "uyg'otish"
        finishAudio.play(); 
        finishAudio.pause();
        finishAudio.currentTime = 0;

        if (timerId) {
            clearInterval(timerId);
            timerId = null;
            localStorage.removeItem('endTime');
            document.getElementById('mainBtn').textContent = "RESUME";
        } else {
            if (!endTime) {
                const m = parseInt(document.getElementById('m').value) || 0;
                const s = parseInt(document.getElementById('s').value) || 0;
                timeLeft = (m * 60) + s;
                total = timeLeft;
            }
            endTime = Date.now() + (timeLeft * 1000);
            localStorage.setItem('endTime', endTime);
            localStorage.setItem('totalTime', total);
            timerId = setInterval(tick, 1000);
            document.getElementById('mainBtn').textContent = "PAUSE";
            document.getElementById('inputArea').style.opacity = "0.2";
        }
    }

    function tick() {
        const now = Date.now();
        const storedEnd = localStorage.getItem('endTime');
        timeLeft = Math.round((storedEnd - now) / 1000);

        if (timeLeft <= 0) {
            timeLeft = 0;
            updateUI();
            finish();
        } else {
            updateUI();
        }
    }

    function finish() {
        clearInterval(timerId);
        timerId = null;
        localStorage.removeItem('endTime');
        
        // --- OVOZNI CHIQARISH ---
        playFinishSound();
        
        sessions++;
        localStorage.setItem('sessions', sessions);
        document.getElementById('count').textContent = sessions;
        document.getElementById('mainBtn').textContent = "START";
        document.getElementById('inputArea').style.opacity = "1";
        endTime = null;
    }

    function reset() {
        clearInterval(timerId);
        timerId = null;
        endTime = null;
        localStorage.removeItem('endTime');
        const m = parseInt(document.getElementById('m').value) || 0;
        const s = parseInt(document.getElementById('s').value) || 0;
        timeLeft = (m * 60) + s;
        updateUI();
        document.getElementById('mainBtn').textContent = "START";
        document.getElementById('inputArea').style.opacity = "1";
    }

    window.onload = () => {
        const storedEnd = localStorage.getItem('endTime');
        if (storedEnd) {
            total = localStorage.getItem('totalTime');
            endTime = storedEnd;
            timerId = setInterval(tick, 1000);
            document.getElementById('mainBtn').textContent = "PAUSE";
            document.getElementById('inputArea').style.opacity = "0.2";
        }
    };
</script>
</body>
</html>
