<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milliy Sertifikat</title>
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg);
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        .card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 25px;
            width: 320px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }

        h1 { color: var(--text); font-size: 1.5rem; margin-bottom: 1rem; }
        p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 2rem; }

        /* Professional tugma dizayni */
        .btn {
            display: inline-block;
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 15px;
            font-weight: 600;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3);
        }

        /* Bosilganda effekt */
        .btn:active {
            transform: scale(0.95);
            background: #4338ca;
        }

        /* Ripple animatsiyasi */
        .btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 5px;
            height: 5px;
            background: rgba(255,255,255,0.5);
            opacity: 0;
            border-radius: 100%;
            transform: scale(1, 1) translate(-50%);
            transform-origin: 50% 50%;
        }

        .btn:focus:not(:active)::after {
            animation: ripple 1s ease-out;
        }

        @keyframes ripple {
            0% { transform: scale(0, 0); opacity: 0.5; }
            100% { transform: scale(40, 40); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>🎓 Milliy Sertifikat</h1>
        <p>Imtihonga puxta tayyorlaning va o'z ustingizda ishlang!</p>
        
        <!-- Link yashirilgan holda tugma ko'rinishida -->
        <a href="https://t.me/milliysertifikat07_bot" class="btn" onclick="this.blur()">
            Botga kirish
        </a>
    </div>

</body>
</html>
