<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milliy Sertifikat Tayyorgarlik</title>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            /* Brauzer menyusini bloklash */
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        /* Chiqish tugmasi */
        .exit-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 8px 16px;
            background: #271010;
            color: #ef4444;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            border: 1px solid #7f1d1d;
            transition: transform 0.2s;
        }

        .exit-btn:active {
            transform: scale(0.9);
            background: #450a0a;
        }

        .container {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 450px;
            width: 90%;
            border: 1px solid #334155;
            margin-top: 80px;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .features {
            text-align: left;
            margin: 20px 0;
            list-style: none;
            padding: 0;
        }

        .features li {
            margin-bottom: 12px;
            padding-left: 30px;
            position: relative;
        }

        .features li::before {
            content: '✅';
            position: absolute;
            left: 0;
        }

        /* Ilova uslubidagi animatsiyali tugma */
        .cta-button {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 30px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            animation: pulse 2s infinite;
            transition: transform 0.1s;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(99, 102, 241, 0); }
            100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); }
        }

        .cta-button:active {
            transform: scale(0.95);
        }

        .footer-note {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #94a3b8;
            font-style: italic;
        }
    </style>
</head>
<body>

    <a href="home.html" class="exit-btn">Chiqish</a>

    <div class="container">
        <h1>🎓 Milliy Sertifikat</h1>
        <p>Imtihonga puxta tayyorlaning!</p>

        <ul class="features">
            <li>Barcha fanlardan sifatli testlar</li>
            <li>Haqiqiy imtihon formatidagi savollar</li>
            <li>Natijalarni avtomatik hisoblash</li>
            <li>Bilimingizni sinab, o'sishni kuzatish</li>
        </ul>

        <a href="https://t.me/milliysertifikat07_bot" class="cta-button">🚀 Botga o'tish</a>

        <p class="footer-note">Bilim — muvaffaqiyat kaliti! 🔥</p>
    </div>

</body>
</html>
