<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Profil</title>
    <style>
        .profile-card { border: 1px solid #ddd; padding: 20px; border-radius: 10px; width: 300px; margin: 20px; }
    </style>
</head>
<body>

    <div id="profile-container" class="profile-card">
        Yuklanmoqda...
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            // Konfiguratsiyangiz
            apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
            projectId: "quiz-app-3692d",
            // ...
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Tizimga kirgan foydalanuvchini kuzatish
        onAuthStateChanged(auth, async (user) => {
            const container = document.getElementById('profile-container');
            
            if (user) {
                // Tizimga kirgan foydalanuvchi bor
                try {
                    // Firestore'dan 'users' kolleksiyasidan aynan shu foydalanuvchining (uid) ma'lumotini olamiz
                    const docRef = doc(db, "users", user.uid);
                    const docSnap = await getDoc(docRef);

                    if (docSnap.exists()) {
                        const userData = docSnap.data();
                        container.innerHTML = `
                            <h3>Sizning ma'lumotlaringiz:</h3>
                            <p>Ism: <strong>${userData.fio || "Noma'lum"}</strong></p>
                            <p>ID raqam: <strong>${userData.studentID || "Mavjud emas"}</strong></p>
                        `;
                    } else {
                        container.innerHTML = "Foydalanuvchi ma'lumotlari topilmadi.";
                    }
                } catch (error) {
                    container.innerHTML = "Xatolik yuz berdi.";
                }
            } else {
                // Foydalanuvchi tizimga kirmagan
                container.innerHTML = "Iltimos, tizimga kiring.";
            }
        });
    </script>
</body>
</html>
