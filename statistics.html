<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Foydalanuvchilar ro'yxati</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .user-item { padding: 10px; border-bottom: 1px solid #ccc; }
        .id-style { color: #007bff; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Talabalar bazasi</h2>
    <div id="users-list">Yuklanmoqda...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase konfiguratsiyangiz
        const firebaseConfig = {
            apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
            projectId: "quiz-app-3692d",
            // Boshqa maydonlar...
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadUsers() {
            const listDiv = document.getElementById('users-list');
            try {
                // 1. 'users' kolleksiyasidan barcha hujjatlarni olamiz
                const querySnapshot = await getDocs(collection(db, "users"));
                
                let html = "<ul>";
                
                // 2. Har bir hujjatni aylanib chiqib, ro'yxatga qo'shamiz
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const fio = data.fio || "Ism kiritilmagan";
                    const studentID = data.studentID || "ID yo'q";

                    html += `
                        <li class="user-item">
                            Ism: <strong>${fio}</strong> | 
                            ID: <span class="id-style">${studentID}</span>
                        </li>`;
                });
                
                html += "</ul>";
                listDiv.innerHTML = html;

            } catch (error) {
                console.error("Xatolik:", error);
                listDiv.innerHTML = "Ma'lumotlarni yuklashda xatolik yuz berdi.";
            }
        }

        // Sahifa yuklanganda funksiyani chaqiramiz
        loadUsers();
    </script>
</body>
</html>
