<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hisobni To'ldirish - Dr. Rahmonov</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #0f2027; color: white; padding: 20px; text-align: center; }
        .card { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .input-box { width: 100%; padding: 15px; margin: 15px 0; border-radius: 12px; border: 1px solid #00d2ff; background: rgba(0,0,0,0.3); color: white; text-align: center; font-size: 16px; outline: none; }
        .file-label { display: block; background: rgba(0,210,255,0.1); padding: 15px; border-radius: 12px; border: 1px dashed #00d2ff; cursor: pointer; margin-bottom: 20px; font-size: 13px; }
        .pay-btn { width: 100%; padding: 18px; background: #00d2ff; border: none; border-radius: 15px; color: #000; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .pay-btn:active { transform: scale(0.95); }
        #preview { width: 100px; height: 100px; object-fit: cover; border-radius: 10px; display: none; margin: 10px auto; }
        #toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: #ffd700; color: #000; padding: 12px 25px; border-radius: 50px; transition: 0.5s; z-index: 3000; font-weight: 600; }
        #toast.show { bottom: 40px; }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="color:#00d2ff; margin-bottom:10px;">To'lov So'rovi</h2>
        <p style="font-size:12px; opacity:0.7; margin-bottom:20px;">Pulni o'tkazib, chekni yuklang</p>

        <input type="number" id="amount" class="input-box" placeholder="Summani yozing (masalan: 10000)">
        
        <label for="screenshot" class="file-label">
            📸 Skrinshot yuklash (Chek)
            <input type="file" id="screenshot" accept="image/*" style="display:none;" onchange="previewImage(this)">
        </label>
        <img id="preview" src="">

        <button class="pay-btn" onclick="submitPayment()">ADMIN’GA YUBORISH</button>
    </div>

    <div id="toast">Xabar!</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, doc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = { /* SIZNING CONFIG */ };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let userProfile = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await getDoc(doc(db, "users", user.uid));
                userProfile = snap.data();
            } else { location.href = "index.html"; }
        });

        window.previewImage = (input) => {
            const pre = document.getElementById('preview');
            if (input.files[0]) {
                pre.src = URL.createObjectURL(input.files[0]);
                pre.style.display = 'block';
            }
        }

        window.submitPayment = async () => {
            const amt = document.getElementById('amount').value;
            const file = document.getElementById('screenshot').files[0];

            if (!amt || !file) return showToast("Barcha maydonlarni to'ldiring!");
            
            showToast("Chek yuklanmoqda...");

            try {
                const sRef = ref(storage, `checks/${Date.now()}_${auth.currentUser.uid}`);
                await uploadBytes(sRef, file);
                const url = await getDownloadURL(sRef);

                await addDoc(collection(db, "payment_requests"), {
                    userId: auth.currentUser.uid,
                    fio: userProfile.fio || "Ismsiz",
                    email: auth.currentUser.email,
                    amount: parseInt(amt),
                    screenshot: url,
                    status: "pending",
                    timestamp: serverTimestamp()
                });

                showToast("Muvaffaqiyatli yuborildi! ✅");
                setTimeout(() => location.href = 'home.html', 2000);
            } catch (e) {
                showToast("Xatolik: " + e.message);
            }
        }

        window.showToast = (txt) => { const t = document.getElementById('toast'); t.innerText = txt; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); };
    </script>
</body>
</html>
