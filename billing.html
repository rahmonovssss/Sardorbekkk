<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To'lov - Dr. Rahmonov</title>
    <style>
        body { background: #0f2027; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 30px; border-radius: 20px; width: 100%; max-width: 380px; text-align: center; border: 1px solid rgba(255,255,255,0.2); }
        .input-box { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; text-align: center; font-size: 18px; box-sizing: border-box; color: #000; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-send { background: #00d2ff; color: #000; }
    </style>
</head>
<body>

<div class="card">
    <h3 id="user-display">Yuklanmoqda...</h3>
    <p>To'lov summasini kiriting:</p>
    <input type="number" id="amt" class="input-box" placeholder="Masalan: 5000">
    <button class="btn btn-send" id="sendBtn">TASDIQLASHGA YUBORISH</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
        authDomain: "quiz-app-3692d.firebaseapp.com",
        projectId: "quiz-app-3692d",
        storageBucket: "quiz-app-3692d.firebasestorage.app",
        messagingSenderId: "526836020845",
        appId: "1:526836020845:android:3ea991380c104c75e8b164"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let profile = null;

    // 1. Foydalanuvchini aniqlash
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const snap = await getDoc(doc(db, "users", user.uid));
            if (snap.exists()) {
                profile = snap.data();
                document.getElementById('user-display').innerText = profile.fio;
            } else {
                document.getElementById('user-display').innerText = "Profil topilmadi";
            }
        } else {
            window.location.href = "index.html";
        }
    });

    // 2. MA'LUMOTLARNI YUBORISH (Rasm shart emas qismi)
    document.getElementById('sendBtn').onclick = async () => {
        const sum = document.getElementById('amt').value;
        
        // Agar summa bo'sh bo'lsa to'xtatadi
        if(!sum || sum <= 0) return alert("Iltimos, summani kiriting!");
        
        const btn = document.getElementById('sendBtn');
        btn.disabled = true;
        btn.innerText = "YUBORILMOQDA...";

        try {
            // A) FIRESTOREGA YOZISH (Rasmisiz faqat ma'lumotlar)
            const docRef = await addDoc(collection(db, "payment_requests"), {
                userId: auth.currentUser.uid,
                fio: profile?.fio || "Noma'lum",
                studentID: profile?.studentID || "---",
                amount: Number(sum),
                status: "pending",
                timestamp: serverTimestamp()
            });

            // B) TELEGRAMGA YUBORISH (SendMessage - matnli xabar)
            const text = `💰 TO'LOV SO'ROVI\n👤 Ism: ${profile?.fio}\n🆔 ID: ${auth.currentUser.uid}\n💵 Summa: ${sum} so'm\n📄 Doc: ${docRef.id}`;
            
            await fetch(`https://api.telegram.org/bot5714791266:AAEpc1YGClxn0e5u9BReEsiWrr66APqSYbk/sendMessage?chat_id=5769394153&text=${encodeURIComponent(text)}`);

            alert("So'rov yuborildi! ✅");
            window.location.href = "home.html";

        } catch (err) {
            console.error(err);
            alert("Firebase bilan bog'lanishda xato: " + err.message);
            btn.disabled = false;
            btn.innerText = "QAYTA URINISH";
        }
    };
</script>
</body>
</html>
