<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To'lov - Dr. Rahmonov</title>
    <style>
        body { background: #0f2027; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .card { background: rgba(255,255,255,0.1); padding: 30px; border-radius: 20px; width: 100%; max-width: 350px; text-align: center; }
        .input-box { width: 100%; padding: 12px; margin: 15px 0; border-radius: 10px; border: none; outline: none; text-align: center; }
        .btn { background: #00d2ff; color: black; padding: 15px; border: none; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; }
        #preview { width: 100%; margin-top: 15px; border-radius: 10px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h3>To'lov qilish</h3>
    <input type="number" id="amt" class="input-box" placeholder="Summani kiriting">
    <input type="file" id="file" accept="image/*" style="display:none;" onchange="document.getElementById('preview').src=URL.createObjectURL(this.files[0]); document.getElementById('preview').style.display='block'">
    <button class="btn" onclick="document.getElementById('file').click()" style="background: #555; color: white; margin-bottom: 10px;">📸 Chekni tanlash</button>
    
    <img id="preview">
    
    <button class="btn" id="sendBtn" onclick="sendToBot()">ADMINGA YUBORISH</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
        authDomain: "quiz-app-3692d.firebaseapp.com",
        projectId: "quiz-app-3692d",
        storageBucket: "quiz-app-3692d.firebasestorage.app",
        messagingSenderId: "526836020845",
        appId: "1:526836020845:android:3ea991380c104c75e8b164"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let userProfile = null;

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const snap = await getDoc(doc(db, "users", user.uid));
            if (snap.exists()) userProfile = snap.data();
        }
    });

    window.sendToBot = async () => {
        const amount = document.getElementById('amt').value;
        const photo = document.getElementById('file').files[0];
        const btn = document.getElementById('sendBtn');

        if(!amount || !photo) return alert("Hamma ma'lumotlarni kiriting!");

        btn.disabled = true;
        btn.innerText = "YUBORILMOQDA...";

        const formData = new FormData();
        formData.append("chat_id", "5769394153");
        formData.append("photo", photo);
        formData.append("caption", `💰 TO'LOV KELDI\n👤 Ism: ${userProfile?.fio || 'Noma\'lum'}\n🆔 ID: ${userProfile?.studentID || '---'}\n💵 Summa: ${amount} so'm`);
        
        // Tasdiqlash tugmalari
        const keyboard = {
            inline_keyboard: [[
                { text: "✅ Tasdiqlash", callback_data: `approve_${auth.currentUser.uid}_${amount}` },
                { text: "❌ Rad etish", callback_data: `reject_${auth.currentUser.uid}` }
            ]]
        };
        formData.append("reply_markup", JSON.stringify(keyboard));

        try {
            const res = await fetch(`https://api.telegram.org/bot5714791266:AAEpc1YGClxn0e5u9BReEsiWrr66APqSYbk/sendPhoto`, {
                method: "POST",
                body: formData
            });

            if(res.ok) {
                alert("Yuborildi! Admin tasdiqlashini kuting.");
                window.location.href = 'home.html';
            } else {
                alert("Xato! Botga /start bosganingizni tekshiring.");
                btn.disabled = false;
            }
        } catch (e) {
            alert("Internet xatosi!");
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
