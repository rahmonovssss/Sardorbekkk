<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To'lov - Dr. Rahmonov</title>
    <style>
        body { background: #0f2027; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 30px; border-radius: 20px; width: 100%; max-width: 380px; text-align: center; border: 1px solid rgba(255,255,255,0.2); }
        .input-box { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; text-align: center; font-size: 18px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-send { background: #00d2ff; color: #000; }
        #preview { width: 100%; margin-top: 15px; border-radius: 10px; display: none; max-height: 200px; object-fit: contain; }
    </style>
</head>
<body>

<div class="card">
    <h3 id="user-display">Yuklanmoqda...</h3>
    <input type="number" id="amt" class="input-box" placeholder="Summa (masalan: 5000)">
    <input type="file" id="file" accept="image/*" style="display:none;">
    <button class="btn" style="background:#444; color:white;" onclick="document.getElementById('file').click()">📸 CHEKNI TANLASH</button>
    <img id="preview">
    <button class="btn btn-send" id="sendBtn">TASDIQLASHGA YUBORISH</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
        authDomain: "quiz-app-3692d.firebaseapp.com",
        projectId: "quiz-app-3692d",
        storageBucket: "quiz-app-3692d.firebasestorage.app",
        messagingSenderId: "526836020845",
        appId: "1:526836020845:android:3ea991380c104c75e8b164"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let profile = null;

    // 1. Foydalanuvchini aniqlash
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const snap = await getDoc(doc(db, "users", user.uid));
            if (snap.exists()) {
                profile = snap.data();
                document.getElementById('user-display').innerText = profile.fio;
            } else {
                document.getElementById('user-display').innerText = "Profil topilmadi";
            }
        } else {
            window.location.href = "index.html";
        }
    });

    // 2. Rasm ko'rinishi
    document.getElementById('file').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const img = document.getElementById('preview');
            img.src = ev.target.result;
            img.style.display = 'block';
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    // 3. YUBORISH (Xatolar tuzatilgan variant)
    document.getElementById('sendBtn').onclick = async () => {
        const sum = document.getElementById('amt').value;
        const photo = document.getElementById('file').files[0];
        
        if(!sum || !photo) return alert("Hamma joyni to'ldiring!");
        
        const btn = document.getElementById('sendBtn');
        btn.disabled = true;
        btn.innerText = "YUBORILMOQDA...";

        try {
            // Firestorega yozish
            await addDoc(collection(db, "payment_requests"), {
                userId: auth.currentUser.uid,
                fio: profile?.fio || "Noma'lum",
                studentID: profile?.studentID || "---",
                amount: Number(sum),
                status: "pending",
                timestamp: serverTimestamp()
            });

            // Telegram botga yuborish
            const fd = new FormData();
            fd.append("chat_id", "5769394153");
            fd.append("photo", photo);
            fd.append("caption", `💰 TO'LOV: ${sum} so'm\n👤 ${profile?.fio}\n🆔 ${profile?.studentID}`);

            await fetch(`https://api.telegram.org/bot5714791266:AAEpc1YGClxn0e5u9BReEsiWrr66APqSYbk/sendPhoto`, {
                method: "POST",
                body: fd
            });

            alert("Yuborildi! ✅");
            window.location.href = "home.html";
        } catch (err) {
            alert("Xato chiqdi: " + err.message);
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
