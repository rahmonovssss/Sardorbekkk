<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - Dr. Rahmonov</title>
    <style>
        body { background: #0f2027; color: white; font-family: sans-serif; padding: 20px; }
        .card { 
            background: #1e2a33; padding: 20px; border-radius: 15px; 
            margin-bottom: 15px; border: 1px solid #00d2ff;
            display: flex; justify-content: space-between; align-items: center;
        }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-ok { background: #4caf50; color: white; }
        .btn-del { background: #ff4b2b; color: white; margin-left: 10px; }
        .amount { color: #ffd700; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <h2>📩 Kelgan so'rovlar</h2>
    <div id="request-list">Yuklanmoqda...</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, increment, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
        authDomain: "quiz-app-3692d.firebaseapp.com",
        projectId: "quiz-app-3692d",
        storageBucket: "quiz-app-3692d.firebasestorage.app",
        messagingSenderId: "526836020845",
        appId: "1:526836020845:android:3ea991380c104c75e8b164"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const colRef = collection(db, "payment_requests");

    // 1. MA'LUMOTLARNI KO'RSATISH (Faqat 'pending' holatdagilar)
    // Query ishlatamizki, tasdiqlanganlar ro'yxatdan o'zi yo'qolsin
    const q = query(colRef, where("status", "==", "pending"));

    onSnapshot(q, (snapshot) => {
        const listDiv = document.getElementById('request-list');
        listDiv.innerHTML = ""; // Har safar tozalab yangitdan chiqaradi

        if (snapshot.empty) {
            listDiv.innerHTML = "Hozircha yangi so'rovlar yo'q.";
            return;
        }

        snapshot.forEach((res) => {
            const data = res.data();
            listDiv.innerHTML += `
                <div class="card">
                    <div>
                        <p><b>👤 Foydalanuvchi:</b> ${data.fio || 'Ismsiz'}</p>
                        <p><b>🆔 ID:</b> ${data.userId}</p>
                        <p class="amount">💰 ${data.amount} so'm</p>
                    </div>
                    <div>
                        <button class="btn btn-ok" onclick="approve('${res.id}', '${data.userId}', ${data.amount})">TASDIQLASH</button>
                        <button class="btn btn-del" onclick="removeReq('${res.id}')">O'CHIRISH</button>
                    </div>
                </div>
            `;
        });
    });

    // 2. TASDIQLASH VA BALANSGA QO'SHISH
    window.approve = async (docId, uID, summa) => {
        if (!uID) return alert("Foydalanuvchi ID si yo'q!");

        try {
            // A) Foydalanuvchining 'users' kolleksiyasidagi balansini oshirish
            const userRef = doc(db, "users", uID);
            await updateDoc(userRef, {
                balance: increment(Number(summa)) // Balansga qo'shadi
            });

            // B) So'rov statusini o'zgartirish (bu uni ro'yxatdan yo'qotadi)
            await updateDoc(doc(db, "payment_requests", docId), {
                status: "approved"
            });

            alert("Muvaffaqiyatli qo'shildi! ✅");
        } catch (e) {
            console.error(e);
            alert("Xatolik: " + e.message + "\n\nEslatma: 'users' kolleksiyasida hujjat ID si foydalanuvchi UID si bilan bir xil bo'lishi kerak.");
        }
    };

    window.removeReq = async (id) => {
        if(confirm("O'chirilsinmi?")) {
            await deleteDoc(doc(db, "payment_requests", id));
        }
    };

</script>
</body>
</html>
