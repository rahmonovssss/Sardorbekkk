<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>To'lovlar - Dr. Rahmonov</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #0f2027; color: white; min-height: 100vh; padding: 20px; }

        /* --- BACK BUTTON --- */
        .back-btn {
            display: flex; align-items: center; gap: 8px; color: #00d2ff;
            text-decoration: none; font-size: 14px; margin-bottom: 30px;
        }

        /* --- GLASS CARD --- */
        .billing-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .balance-label { font-size: 14px; opacity: 0.6; margin-bottom: 5px; }
        .current-balance { font-size: 36px; font-weight: 600; color: #ffd700; margin-bottom: 30px; }

        /* --- INPUT GROUP --- */
        .amount-group { margin-bottom: 30px; }
        .amount-input {
            width: 100%; background: rgba(255,255,255,0.05);
            border: 2px solid rgba(0, 210, 255, 0.3);
            border-radius: 15px; padding: 15px; color: white;
            font-size: 20px; text-align: center; outline: none;
            transition: 0.3s;
        }
        .amount-input:focus { border-color: #00d2ff; box-shadow: 0 0 15px rgba(0, 210, 255, 0.3); }

        /* --- PAYMENT METHODS --- */
        .methods-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 30px;
        }
        .method-item {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            padding: 15px; border-radius: 20px; cursor: pointer; transition: 0.3s;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        .method-item img { width: 40px; height: 40px; border-radius: 8px; }
        .method-item span { font-size: 12px; font-weight: 600; }
        .method-item.active {
            background: rgba(0, 210, 255, 0.1); border-color: #00d2ff; transform: translateY(-5px);
        }

        .pay-button {
            width: 100%; padding: 18px; background: #00d2ff;
            border: none; border-radius: 20px; color: #000;
            font-weight: 700; font-size: 16px; cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3);
            transition: 0.3s;
        }
        .pay-button:active { transform: scale(0.96); }

        /* --- TOAST --- */
        #toast {
            position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%);
            background: #00d2ff; color: #000; padding: 15px 30px;
            border-radius: 50px; font-weight: 600; transition: 0.5s; z-index: 1000;
        }
        #toast.show { bottom: 40px; }
    </style>
</head>
<body>

    <a href="home.html" class="back-btn">⬅️ Orqaga qaytish</a>

    <div class="billing-card">
        <p class="balance-label">Sizning balansingiz</p>
        <h1 class="current-balance" id="display-balance">0 so'm</h1>

        <div class="amount-group">
            <p class="balance-label" style="margin-bottom: 10px;">To'lov summasini kiriting</p>
            <input type="number" class="amount-input" id="pay-amount" placeholder="Masalan: 5000" value="1000">
        </div>

        <p class="balance-label" style="margin-bottom: 15px; text-align: left;">To'lov usulini tanlang</p>
        <div class="methods-grid">
            <div class="method-item active" onclick="selectMethod(this, 'Payme')">
                <img src="https://cdn.payme.uz/logo/payme_color.png" alt="Payme">
                <span>Payme</span>
            </div>
            <div class="method-item" onclick="selectMethod(this, 'Click')">
                <img src="https://click.uz/click/images/click-logo.png" alt="Click">
                <span>Click</span>
            </div>
            <div class="method-item" onclick="selectMethod(this, 'Uzum')">
                <img src="https://uzum.uz/static/img/favicons/apple-touch-icon.png" alt="Uzum">
                <span>Uzum Bank</span>
            </div>
            <div class="method-item" onclick="selectMethod(this, 'Visa')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/d/d6/Visa_2021.svg" alt="Visa">
                <span>Visa / Card</span>
            </div>
        </div>

        <button class="pay-button" onclick="handlePayment()">HISOBNI TO'LDIRISH</button>
    </div>

    <div id="toast">Xabar!</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
            authDomain: "quiz-app-3692d.firebaseapp.com",
            projectId: "quiz-app-3692d",
            storageBucket: "quiz-app-3692d.firebasestorage.app",
            messagingSenderId: "526836020845",
            appId: "1:526836020845:android:3ea991380c104c75e8b164"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentMethod = 'Payme';
        let currentUser = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const userRef = doc(db, "users", user.uid);
                const snap = await getDoc(userRef);
                if (snap.exists()) {
                    document.getElementById('display-balance').innerText = (snap.data().balance || 0).toLocaleString() + " so'm";
                }
            } else {
                window.location.replace("index.html");
            }
        });

        window.selectMethod = (el, name) => {
            document.querySelectorAll('.method-item').forEach(m => m.classList.remove('active'));
            el.classList.add('active');
            currentMethod = name;
        };

        window.handlePayment = async () => {
            const amount = parseInt(document.getElementById('pay-amount').value);
            
            if (!amount || amount < 1000) {
                showToast("Minimal to'lov 1,000 so'm");
                return;
            }

            showToast(`${currentMethod} orqali bog'lanilmoqda...`);

            // BU YERDA TO'LOV TIZIMI BILAN INTEGRATSIYA BO'LADI
            // Hozircha demo sifatida balansni to'g'ridan-to'g'ri oshiramiz:
            setTimeout(async () => {
                const userRef = doc(db, "users", currentUser.uid);
                const snap = await getDoc(userRef);
                const newBalance = (snap.data().balance || 0) + amount;
                
                await updateDoc(userRef, { balance: newBalance });
                
                showToast(`Muvaffaqiyatli! +${amount.toLocaleString()} so'm ✅`);
                document.getElementById('display-balance').innerText = newBalance.toLocaleString() + " so'm";
            }, 2000);
        };

        window.showToast = (txt) => {
            const t = document.getElementById('toast');
            t.innerText = txt; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        };
    </script>
</body>
</html>
