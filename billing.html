<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To'lov - Dr. Rahmonov</title>
    <style>
        body { background: #0f2027; color: white; font-family: 'Poppins', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; margin: 0; }
        .card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 30px; border-radius: 20px; width: 100%; max-width: 380px; text-align: center; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        h3 { color: #00d2ff; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
        .input-box { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: none; outline: none; text-align: center; font-size: 16px; background: rgba(255,255,255,0.9); color: #333; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; margin-top: 10px; }
        .btn-select { background: #555; color: white; margin-bottom: 10px; }
        .btn-send { background: #00d2ff; color: #000; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        #preview { width: 100%; margin-top: 20px; border-radius: 12px; display: none; border: 2px solid #00d2ff; max-height: 200px; object-fit: contain; }
    </style>
</head>
<body>

<div class="card">
    <h3>To'lovni Tasdiqlash</h3>
    
    <input type="number" id="amt" class="input-box" placeholder="To'lov summasi (so'm)">
    
    <input type="file" id="file" accept="image/*" style="display:none;">
    <button class="btn btn-select" id="selectBtn">📸 CHEKNI TANLASH</button>
    
    <img id="preview">
    
    <button class="btn btn-send" id="sendBtn">TASDIQLASHGA YUBORISH</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
        authDomain: "quiz-app-3692d.firebaseapp.com",
        projectId: "quiz-app-3692d",
        storageBucket: "quiz-app-3692d.firebasestorage.app",
        messagingSenderId: "526836020845",
        appId: "1:526836020845:android:3ea991380c104c75e8b164"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUserData = null;

    // 1. Foydalanuvchi holatini tekshirish
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            try {
                const snap = await getDoc(doc(db, "users", user.uid));
                if (snap.exists()) {
                    currentUserData = snap.data();
                }
            } catch (e) { console.error("Profil yuklanmadi:", e); }
        } else {
            // Agar tizimga kirmagan bo'lsa, test uchun bu yerni ochiq qoldiramiz 
            // yoki index.html ga yo'naltiramiz
            console.warn("Foydalanuvchi tizimga kirmagan.");
        }
    });

    // 2. Rasm tanlash funksiyasi
    const fileInput = document.getElementById('file');
    const selectBtn = document.getElementById('selectBtn');
    const preview = document.getElementById('preview');

    selectBtn.onclick = () => fileInput.click();

    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                preview.src = event.target.result;
                preview.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }
    };

    // 3. Yuborish funksiyasi
    window.processPayment = async () => {
        const amount = document.getElementById('amt').value;
        const photo = fileInput.files[0];
        const btn = document.getElementById('sendBtn');

        if (!amount || !photo) {
            alert("Iltimos, summa kiriting va chek rasmini tanlang!");
            return;
        }

        if (!auth.currentUser) {
            alert("Siz tizimga kirmagansiz!");
            return;
        }

        btn.disabled = true;
        btn.innerText = "YUBORILMOQDA...";

        try {
            const uID = auth.currentUser.uid;
            const ism = currentUserData?.fio || "Ismsiz foydalanuvchi";
            const sid = currentUserData?.studentID || "---";

            // A) Telegramga yuborish
            const formData = new FormData();
            formData.append("chat_id", "5769394153");
            formData.append("photo", photo);
            formData.append("caption", `💰 YANGI TO'LOV\n👤 Ism: ${ism}\n🆔 ID: ${sid}\n💵 Summa: ${amount} so'm`);

            fetch(`https://api.telegram.org/bot5714791266:AAEpc1YGClxn0e5u9BReEsiWrr66APqSYbk/sendPhoto`, {
                method: "POST",
                body: formData
            }).catch(err => console.error("Telegram xatosi:", err));

            // B) Firestorega saqlash
            await addDoc(collection(db, "payment_requests"), {
                userId: uID,
                fio: ism,
                studentID: sid,
                amount: Number(amount),
                status: "pending",
                timestamp: serverTimestamp()
            });

            alert("To'lov yuborildi! ✅");
            window.location.href = 'home.html';

        } catch (error) {
            console.error(error);
            alert("Xatolik yuz berdi: " + error.message);
            btn.disabled = false;
            btn.innerText = "QAYTA URINISH";
        }
    };

    document.getElementById('sendBtn').onclick = window.processPayment;
</script>

</body>
</html>
