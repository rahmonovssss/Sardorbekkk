<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Pay</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; padding: 50px 20px; }
        .btn { background: #00d2ff; color: black; padding: 20px; border: none; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; }
        input { margin-bottom: 20px; }
        #status { margin-top: 20px; color: yellow; }
    </style>
</head>
<body>

    <h2>Rasm yuborish testi</h2>
    <br>
    
    <input type="file" id="photoInput" accept="image/*">
    <br><br>

    <button class="btn" id="sendBtn" onclick="testSend()">TELEGRAMGA YUBORISH</button>

    <div id="status">Kutilyapti...</div>

    <script>
        function testSend() {
            const fileInput = document.getElementById('photoInput');
            const statusDiv = document.getElementById('status');
            const btn = document.getElementById('sendBtn');
            const file = fileInput.files[0];

            // 1. Fayl tanlanganini tekshirish
            if (!file) {
                alert("Rasm tanlang!");
                return;
            }

            // Holatni o'zgartirish
            btn.disabled = true;
            statusDiv.innerText = "Yuborilmoqda... Iltimos kuting.";

            // Telegram ma'lumotlari
            const token = "5714791266:AAEpc1YGClxn0e5u9BReEsiWrr66APqSYbk";
            const chatId = "5769394153";

            const formData = new FormData();
            formData.append("chat_id", chatId);
            formData.append("photo", file);
            formData.append("caption", "Test xabari: Faqat rasm");

            // So'rov yuborish
            fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {
                method: "POST",
                body: formData
            })
            .then(response => {
                if (response.ok) {
                    statusDiv.innerText = "✅ MUVAFFAQIYATLI YUBORILDI!";
                    statusDiv.style.color = "lime";
                    alert("Botga qarang, rasm borgan bo'lishi kerak!");
                } else {
                    statusDiv.innerText = "❌ XATOLIK: " + response.status;
                    statusDiv.style.color = "red";
                    alert("Xato! Botga /start bosganmisiz?");
                }
            })
            .catch(error => {
                statusDiv.innerText = "❌ Internet xatosi!";
                console.error(error);
            })
            .finally(() => {
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
