<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>To'lov - Dr. Rahmonov</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #0f2027; color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        
        .card { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(15px); 
            padding: 30px; 
            border-radius: 25px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            width: 100%; max-width: 400px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            text-align: center;
        }

        h2 { color: #00d2ff; margin-bottom: 10px; font-weight: 600; }
        p { font-size: 13px; opacity: 0.7; margin-bottom: 25px; }

        .input-box { 
            width: 100%; padding: 15px; margin-bottom: 20px; 
            border-radius: 15px; border: 2px solid rgba(0, 210, 255, 0.3); 
            background: rgba(0,0,0,0.2); color: white; 
            font-size: 16px; outline: none; text-align: center;
        }

        .file-label { 
            display: block; background: rgba(0, 210, 255, 0.1); 
            padding: 20px; border-radius: 15px; border: 2px dashed #00d2ff; 
            cursor: pointer; margin-bottom: 25px; font-size: 14px; color: #00d2ff;
        }

        #preview { 
            width: 100%; max-height: 180px; object-fit: contain; 
            border-radius: 10px; display: none; margin-bottom: 20px; border: 1px solid #444;
        }

        .pay-btn { 
            width: 100%; padding: 18px; background: #00d2ff; 
            border: none; border-radius: 15px; color: #000; 
            font-weight: 700; font-size: 16px; cursor: pointer; 
            transition: 0.3s;
        }
        .pay-btn:disabled { background: #555; cursor: not-allowed; }

        #toast { 
            position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); 
            background: #ffd700; color: #000; padding: 12px 25px; 
            border-radius: 50px; font-weight: 600; transition: 0.5s; z-index: 9999;
        }
        #toast.show { bottom: 40px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>To'lov So'rovi</h2>
        <p>To'lov miqdorini kiriting va chek rasmini yuklang.</p>

        <input type="number" id="amount" class="input-box" placeholder="Summa (masalan: 10000)">
        
        <label for="screenshot" class="file-label" id="label-text">
            📸 Galereyadan chekni tanlang
            <input type="file" id="screenshot" accept="image/*" style="display:none;" onchange="previewImage(this)">
        </label>
        
        <img id="preview" src="">

        <button class="pay-btn" id="submit-btn" onclick="submitPayment()">ADMINGA YUBORISH</button>
    </div>

    <div id="toast">Xabar!</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, doc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase konfiguratsiyasi
        const firebaseConfig = {
            apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
            authDomain: "quiz-app-3692d.firebaseapp.com",
            projectId: "quiz-app-3692d",
            storageBucket: "quiz-app-3692d.firebasestorage.app",
            messagingSenderId: "526836020845",
            appId: "1:526836020845:android:3ea991380c104c75e8b164"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let userProfile = null;
        const botToken = "5714791266:AAEpc1YGClxn0e5u9BReEsiWrr66APqSYbk"; 
        const myChatId = "5769394153"; 

        // Foydalanuvchi profilini yuklash
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    const snap = await getDoc(doc(db, "users", user.uid));
                    if (snap.exists()) userProfile = snap.data();
                } catch (e) { console.error("Profil xatosi:", e); }
            } else { window.location.replace("index.html"); }
        });

        window.previewImage = (input) => {
            const pre = document.getElementById('preview');
            const labelText = document.getElementById('label-text');
            if (input.files && input.files[0]) {
                pre.src = URL.createObjectURL(input.files[0]);
                pre.style.display = 'block';
                labelText.innerText = "✅ Rasm yuklandi";
            }
        };

        window.submitPayment = async () => {
            const amt = document.getElementById('amount').value;
            const file = document.getElementById('screenshot').files[0];
            const btn = document.getElementById('submit-btn');

            if (!amt || !file) {
                showToast("Barcha maydonlarni to'ldiring!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "YUBORILMOQDA...";

            const ism = (userProfile && userProfile.fio) ? userProfile.fio : "Noma'lum";
            const sid = (userProfile && userProfile.studentID) ? userProfile.studentID : "ID_YOQ";
            const uID = auth.currentUser.uid;

            // Telegram uchun tugmalar (Inline Keyboard)
            const keyboard = {
                inline_keyboard: [
                    [
                        { text: "✅ Tasdiqlash", callback_data: `approve_${uID}_${amt}` },
                        { text: "❌ Rad etish", callback_data: `reject_${uID}` }
                    ]
                ]
            };

            const formData = new FormData();
            formData.append("chat_id", myChatId);
            formData.append("photo", file);
            formData.append("caption", `💰 TO'LOV SO'ROVI\n\n👤 F.I.SH: ${ism}\n🆔 ID: ${sid}\n💵 Summa: ${amt} so'm\n📧 Email: ${auth.currentUser.email}`);
            formData.append("reply_markup", JSON.stringify(keyboard));

            try {
                // 1. Telegramga yuborish
                const response = await fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                    method: "POST",
                    body: formData
                });

                if (response.ok) {
                    // 2. Firestore bazaga yozish
                    await addDoc(collection(db, "payment_requests"), {
                        userId: uID,
                        fio: ism,
                        amount: parseInt(amt),
                        status: "pending",
                        timestamp: serverTimestamp()
                    });

                    showToast("Adminga yuborildi! ✅");
                    setTimeout(() => window.location.href = 'home.html', 2000);
                } else {
                    alert("Telegram xatosi: " + response.status);
                    btn.disabled = false;
                    btn.innerText = "QAYTA URINISH";
                }
            } catch (e) {
                showToast("Internet ulanishini tekshiring!");
                btn.disabled = false;
                btn.innerText = "ADMINGA YUBORISH";
            }
        };

        window.showToast = (txt) => {
            const t = document.getElementById('toast');
            t.innerText = txt; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        };
    </script>
</body>
</html>
