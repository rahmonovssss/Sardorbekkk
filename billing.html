<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To'lov - Dr. Rahmonov</title>
    <style>
        body { background: #0f2027; color: white; font-family: sans-serif; margin: 0; padding: 0; }
        
        /* Toast dizayni */
        #toast { visibility: hidden; min-width: 250px; margin-left: -125px; background-color: #00d2ff; color: #000; text-align: center; border-radius: 10px; padding: 16px; position: fixed; z-index: 10; left: 50%; bottom: 30px; font-weight: bold; }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }

        .header-top { padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.2); }
        .btn-exit { background: rgba(255,255,255,0.1); color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 14px; font-weight: bold; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.2); }
        
        .top-info { text-align: right; }
        .user-name { font-size: 13px; color: #ffd700; font-weight: 600; }
        .balance-box { font-size: 14px; font-weight: bold; color: #00ff88; }

        .container { display: flex; align-items: center; justify-content: center; min-height: 80vh; padding: 20px; }
        .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); padding: 25px; border-radius: 20px; width: 100%; max-width: 380px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        
        .card-box { background: #1a2a33; padding: 15px; border-radius: 12px; border: 1px solid #00d2ff; margin-bottom: 15px; cursor: pointer; }
        .card-owner { font-size: 12px; color: #aaa; margin-bottom: 5px; }
        .card-num { font-size: 17px; font-weight: bold; color: #00d2ff; letter-spacing: 1px; }
        
        #copy-msg { font-size: 12px; color: #00d2ff; margin-bottom: 15px; display: none; font-weight: bold; }

        .input-box { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; text-align: center; font-size: 18px; box-sizing: border-box; background: #eee; color: #000; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-send { background: #00d2ff; color: #000; }
        #preview { width: 100%; margin-top: 15px; border-radius: 10px; display: none; max-height: 200px; object-fit: contain; }
    </style>
</head>
<body>

<div id="toast"></div>

<div class="header-top">
    <button class="btn-exit" onclick="window.location.href='home.html'">⬅ Orqaga</button>
    <div class="top-info">
        <div id="user-display" class="user-name">Yuklanmoqda...</div>
        <div id="user-balance" class="balance-box">0 so'm</div>
    </div>
</div>

<div class="container">
    <div class="card">
        <div class="card-box" onclick="copyCard()">
            <div class="card-owner">Davlatov Asadbek</div>
            <div class="card-num" id="cardNumber">9860 1901 0862 1023</div>
        </div>
        
        <div id="copy-msg">Raqam nusxalandi. Summani yozing va Endi skrinshotni yuklang.👇</div>

        <input type="number" id="amt" class="input-box" placeholder="Summani kiriting">
        <input type="file" id="file" accept="image/*" style="display:none;">
        <button class="btn" style="background:#444; color:white;" onclick="document.getElementById('file').click()">📸 CHEKNI TANLASH</button>
        <img id="preview">
        <button class="btn btn-send" id="sendBtn">TASDIQLASHGA YUBORISH</button>
    </div>
</div>

<script>
    function showToast(text) {
        const toast = document.getElementById("toast");
        toast.innerText = text;
        toast.className = "show";
        setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
    }

    function copyCard() {
        const text = document.getElementById('cardNumber').innerText;
        navigator.clipboard.writeText(text.replace(/\s/g, ''));
        document.getElementById('copy-msg').style.display = 'block';
    }
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
        authDomain: "quiz-app-3692d.firebaseapp.com",
        projectId: "quiz-app-3692d",
        storageBucket: "quiz-app-3692d.firebasestorage.app",
        messagingSenderId: "526836020845",
        appId: "1:526836020845:android:3ea991380c104c75e8b164"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let profileData = null;

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const snap = await getDoc(doc(db, "users", user.uid));
            if (snap.exists()) {
                profileData = snap.data();
                document.getElementById('user-display').innerText = profileData.fio;
                document.getElementById('user-balance').innerText = (profileData.balance || 0).toLocaleString() + " so'm";
            }
        } else { window.location.href = "index.html"; }
    });

    document.getElementById('file').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const img = document.getElementById('preview');
            img.src = ev.target.result;
            img.style.display = 'block';
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    document.getElementById('sendBtn').onclick = async () => {
        const sum = document.getElementById('amt').value;
        const photo = document.getElementById('file').files[0];
        if(!sum || !photo) return showToast("Iltimos, barcha maydonlarni to'ldiring!");

        const btn = document.getElementById('sendBtn');
        btn.disabled = true;
        btn.innerText = "YUBORILMOQDA...";

        try {
            const hozir = new Date();
            const sana = hozir.toLocaleDateString('uz-UZ');
            const vaqt = hozir.toLocaleTimeString('uz-UZ', {hour: '2-digit', minute:'2-digit'});
            const paymentId = `${auth.currentUser.uid}_${hozir.getTime()}`;
            
            // 1. Firebase ga saqlash
            await setDoc(doc(db, "payments", paymentId), {
                uid: auth.currentUser.uid,
                fio: profileData.fio,
                studentID: profileData.studentID || "N/A",
                summa: Number(sum),
                sana: sana,
                vaqt: vaqt,
                status: "kutilmoqda"
            });

            // 2. Telegram ga yuborish
            const fd = new FormData();
            fd.append("chat_id", "5769394153"); 
            fd.append("photo", photo);
            fd.append("caption", `💰 TO'LOV: ${Number(sum).toLocaleString()} so'm\n👤 Ism: ${profileData.fio}\n🆔 ID: ${profileData.studentID || "N/A"}\n📅 Sana: ${sana}\n⏰ Vaqt: ${vaqt}`);

            await fetch(`https://api.telegram.org/bot5714791266:AAEpc1YGClxn0e5u9BReEsiWrr66APqSYbk/sendPhoto`, {
                method: "POST",
                body: fd
            });

            showToast("To'lov yuborildi!🎉");
            setTimeout(() => { window.location.href = "home.html"; }, 2000);
        } catch (err) {
            showToast("Xatolik yuz berdi!");
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
