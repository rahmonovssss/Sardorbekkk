<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To'lov - Dr. Rahmonov</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #00d2ff; --bg: #050b10; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow: hidden; }
        
        /* Neon fon */
        body::before { content: ""; position: absolute; width: 300px; height: 300px; background: var(--primary); filter: blur(150px); opacity: 0.2; top: -50px; left: -50px; z-index: -1; }

        .card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); padding: 40px; border-radius: 30px; width: 100%; max-width: 400px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 25px 50px rgba(0,0,0,0.5); position: relative; }
        
        .user-info { margin-bottom: 25px; }
        .user-info h3 { margin: 5px 0; font-size: 22px; color: var(--primary); }
        .user-info span { font-size: 14px; opacity: 0.6; }

        .input-group { position: relative; margin-bottom: 20px; }
        .input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--primary); }
        .input-box { width: 100%; padding: 15px 15px 15px 45px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: white; font-size: 18px; outline: none; transition: 0.3s; box-sizing: border-box; }
        .input-box:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(0, 210, 255, 0.3); }

        .file-label { display: block; padding: 20px; border: 2px dashed rgba(255,255,255,0.2); border-radius: 15px; cursor: pointer; transition: 0.3s; margin-bottom: 20px; }
        .file-label:hover { border-color: var(--primary); background: rgba(0, 210, 255, 0.05); }
        
        .btn-send { width: 100%; padding: 18px; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; background: linear-gradient(45deg, #00d2ff, #3a7bd5); color: white; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .btn-send:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0, 210, 255, 0.4); }
        .btn-send:disabled { background: #444; cursor: not-allowed; }

        #preview { width: 100%; margin-top: 15px; border-radius: 10px; display: none; border: 2px solid var(--primary); }
    </style>
</head>
<body>

<div class="card">
    <div class="user-info">
        <span id="user-id-display">Yuklanmoqda...</span>
        <h3 id="top-name">Dr. Rahmonov</h3>
    </div>

    <div class="input-group">
        <i class="fas fa-wallet"></i>
        <input type="number" id="amt" class="input-box" placeholder="Summani kiriting">
    </div>

    <input type="file" id="file" accept="image/*" style="display:none;">
    <label for="file" class="file-label">
        <i class="fas fa-camera-retro" style="font-size: 24px; color: var(--primary);"></i>
        <p style="margin: 10px 0 0 0; font-size: 14px;">Chek rasmini yuklang</p>
    </label>

    <img id="preview">

    <button class="btn-send" id="sendBtn">TASDIQLASHGA YUBORISH</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
        authDomain: "quiz-app-3692d.firebaseapp.com",
        projectId: "quiz-app-3692d",
        storageBucket: "quiz-app-3692d.firebasestorage.app",
        messagingSenderId: "526836020845",
        appId: "1:526836020845:android:3ea991380c104c75e8b164"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let profile = null;

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const snap = await getDoc(doc(db, "users", user.uid));
            if (snap.exists()) {
                profile = snap.data();
                document.getElementById('top-name').innerText = profile.fio;
                document.getElementById('user-id-display').innerText = "ID: " + (profile.studentID || "---");
            }
        } else { window.location.replace("index.html"); }
    });

    document.getElementById('file').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const img = document.getElementById('preview');
            img.src = ev.target.result;
            img.style.display = 'block';
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    document.getElementById('sendBtn').onclick = async () => {
        const sum = document.getElementById('amt').value;
        const photo = document.getElementById('file').files[0];
        
        if(!sum || !photo) return alert("Barcha maydonlarni to'ldiring!");
        
        const btn = document.getElementById('sendBtn');
        btn.disabled = true;
        btn.innerText = "YUBORILMOQDA...";

        try {
            // 1. Firestorega yozish (Admin panel ko'rishi uchun)
            const reqRef = await addDoc(collection(db, "payment_requests"), {
                userId: auth.currentUser.uid,
                fio: profile?.fio || "Noma'lum",
                amount: Number(sum),
                status: "pending",
                timestamp: serverTimestamp()
            });

            // 2. Telegramga tugmalar bilan yuborish
            // DIQQAT: Tugmalar ishlashi uchun botingizga Backend/Webhook ulangan bo'lishi kerak.
            // Bu yerda biz faqat xabarni chiroyli qilib yuboramiz.
            const fd = new FormData();
            fd.append("chat_id", "5769394153");
            fd.append("photo", photo);
            fd.append("caption", `💳 TO'LOV SO'ROVI\n\n👤 Foydalanuvchi: ${profile?.fio}\n🆔 ID: ${profile?.studentID}\n💰 Summa: ${sum} so'm\n📝 DocID: ${reqRef.id}`);

            await fetch(`https://api.telegram.org/bot5714791266:AAEpc1YGClxn0e5u9BReEsiWrr66APqSYbk/sendPhoto`, {
                method: "POST",
                body: fd
            });

            alert("So'rov yuborildi! ✅");
            window.location.href = "home.html";
        } catch (err) {
            alert("Xato: " + err.message);
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
