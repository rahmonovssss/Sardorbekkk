<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>To'lovlar - Dr. Rahmonov</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #0f2027; color: white; padding: 20px; min-height: 100vh; }
        
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; }
        .back-btn { text-decoration: none; font-size: 24px; color: white; background: rgba(255,255,255,0.1); width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 12px; }
        
        .summary-cards { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 25px; }
        .s-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .s-card span { font-size: 11px; opacity: 0.6; text-transform: uppercase; }
        .s-card h3 { font-size: 18px; margin-top: 5px; }

        .pay-item { 
            background: rgba(255, 255, 255, 0.03); border-left: 4px solid #ff4b2b;
            padding: 15px; border-radius: 12px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .amount { font-weight: 700; color: #ff4b2b; }
        .status-badge { font-size: 10px; padding: 3px 8px; border-radius: 6px; font-weight: 600; margin-top: 5px; display: inline-block; }
        .status-kutilmoqda { background: #ffaa00; color: #000; }
        .status-tasdiqlandi { background: #00ff88; color: #000; }
        .status-rad-etildi { background: #ff4b2b; color: #fff; }
        
        .date-label { font-size: 10px; opacity: 0.5; display: block; margin-top: 4px; }
        #loader { text-align: center; margin-top: 50px; opacity: 0.5; }
    </style>
</head>
<body>

    <div class="header">
        <a href="home.html" class="back-btn">⬅️</a> 
        <h2>Yechilgan Pullar Tarixi</h2>
    </div>

    <div class="summary-cards">
        <div class="s-card">
            <span>Umumiy Chiqim (So'rovlar)</span>
            <h3 id="total-out" style="color: #ff4b2b;">0 so'm</h3>
        </div>
    </div>

    <div id="pay-list">
        <div id="loader">Yuklanmoqda...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, query, where, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
            authDomain: "quiz-app-3692d.firebaseapp.com",
            projectId: "quiz-app-3692d",
            storageBucket: "quiz-app-3692d.firebasestorage.app",
            messagingSenderId: "526836020845",
            appId: "1:526836020845:android:3ea991380c104c75e8b164"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Kolleksiya nomini haqiqiy bazangizdagi "withdraw_requests" ga almashtirdik!
                const payRef = collection(db, "withdraw_requests");
                
                // Faqat shu foydalanuvchining uid si bo'yicha qidiramiz (Indeks shart emas)
                const q = query(payRef, where("uid", "==", user.uid));

                onSnapshot(q, (snapshot) => {
                    const listContainer = document.getElementById('pay-list');
                    listContainer.innerHTML = "";
                    
                    let totalOut = 0;
                    const oneWeekAgo = Date.now() - (7 * 24 * 60 * 60 * 1000); // 7 kunlik limit

                    if (snapshot.empty) {
                        listContainer.innerHTML = "<p style='text-align:center; opacity:0.5;'>Hozircha pul yechish tarixi mavjud emas.</p>";
                        document.getElementById('total-out').innerText = "0 so'm";
                        return;
                    }

                    // Vaqt bo'yicha saralash uchun massivga olamiz
                    let docsArray = [];
                    snapshot.forEach(d => docsArray.push(d));
                    
                    // JavaScript orqali yangisidan eskisiga qarab saralash
                    docsArray.sort((a, b) => {
                        const timeA = a.data().createdAt?.toMillis() || 0;
                        const timeB = b.data().createdAt?.toMillis() || 0;
                        return timeB - timeA;
                    });

                    docsArray.forEach((documentSnap) => {
                        const data = documentSnap.data();
                        const time = data.createdAt?.toMillis() || Date.now();

                        // 7 kundan o'tgan eski so'rovlarni o'chirish (fonda)
                        if (time < oneWeekAgo) {
                            deleteDoc(doc(db, "withdraw_requests", documentSnap.id)).catch(err => console.log(err));
                            return; 
                        }

                        const amount = Number(data.amount || 0);
                        totalOut += amount;

                        const dateStr = new Date(time).toLocaleString('uz-UZ', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                        
                        // Status ranglarini moslash
                        let statusClass = "status-kutilmoqda";
                        let statusText = data.status || "Kutilmoqda";
                        if (statusText === "Tasdiqlandi") statusClass = "status-tasdiqlandi";
                        if (statusText === "Rad etildi") statusClass = "status-rad-etildi";

                        const item = document.createElement('div');
                        item.className = 'pay-item';
                        item.innerHTML = `
                            <div>
                                <strong>${data.cardType || 'Karta'} ga yechish</strong>
                                <span class="date-label">${dateStr}</span>
                                <span class="status-badge ${statusClass}">${statusText}</span>
                            </div>
                            <div class="amount minus">
                                -${amount.toLocaleString()} so'm
                            </div>
                        `;
                        listContainer.appendChild(item);
                    });

                    document.getElementById('total-out').innerText = totalOut.toLocaleString() + " so'm";
                }, (error) => {
                    console.error("Xatolik:", error);
                    document.getElementById('pay-list').innerHTML = "<p style='text-align:center; color:#ff4b2b;'>Yuklashda xatolik yuz berdi.</p>";
                });
            } else {
                window.location.replace("home.html");
            }
        });
    </script>
</body>
</html>
