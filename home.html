<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asosiy Sahifa - DTM Quiz</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            height: 100vh; background: #0f2027;
            color: white; overflow-x: hidden;
        }

        /* --- 1. HEADER (PROFIL VA XABARLAR) --- */
        .header {
            position: fixed; top: 0; left: 0; width: 100%; 
            padding: 20px; display: flex; justify-content: space-between; 
            align-items: center; background: rgba(15, 32, 39, 0.8); 
            backdrop-filter: blur(10px); z-index: 1000;
        }

        .header-left { display: flex; align-items: center; gap: 15px; }

        .notif-btn {
            width: 45px; height: 45px; background: rgba(255, 255, 255, 0.1);
            border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; cursor: pointer; position: relative;
            transition: 0.3s; border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .notif-btn:hover { background: rgba(255, 255, 255, 0.2); }
        .notif-badge {
            position: absolute; top: 0; right: 0; background: #ff4b2b;
            color: white; font-size: 10px; padding: 2px 6px; 
            border-radius: 50%; border: 2px solid #0f2027;
        }

        .top-profile-container {
            display: flex; align-items: center; gap: 12px;
            background: rgba(255, 255, 255, 0.1); padding: 5px 15px; 
            border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer; transition: 0.3s;
        }
        .top-profile-container:hover { background: rgba(255, 255, 255, 0.2); }

        .mini-avatar {
            width: 35px; height: 35px; background: #00d2ff;
            border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; font-weight: bold; font-size: 16px;
        }

        /* --- 2. ASOSIY KONTENT --- */
        .main-content {
            padding: 100px 20px 40px; text-align: center;
            max-width: 600px; margin: 0 auto;
        }

        .balance-card {
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            padding: 25px; border-radius: 25px; margin-bottom: 30px;
            text-align: left; box-shadow: 0 10px 20px rgba(0, 210, 255, 0.2);
        }
        .balance-card h3 { font-size: 14px; opacity: 0.8; font-weight: 400; }
        .balance-card h1 { font-size: 32px; margin: 5px 0; }

        .grid-menu {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px;
        }

        .menu-item {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px 15px; border-radius: 20px; transition: 0.3s; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        .menu-item:hover { 
            transform: translateY(-5px); border-color: #00d2ff; 
            background: rgba(0, 210, 255, 0.1); 
        }
        .menu-item i { font-size: 30px; font-style: normal; }
        .menu-item span { font-size: 14px; font-weight: 600; }
        .premium { border-color: rgba(255, 215, 0, 0.3) !important; color: #ffd700; }

        /* --- 3. MODALLAR VA TOAST --- */
        .modal {
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: rgba(0,0,0,0.85);
            align-items: center; justify-content: center; z-index: 2000;
        }
        .modal-content {
            background: #1a2a33; padding: 30px; border-radius: 25px;
            width: 90%; max-width: 350px; text-align: center;
        }
        .edit-input {
            width: 100%; padding: 12px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 10px;
            color: white; margin: 15px 0; outline: none; text-align: center;
        }
        .btn-update {
            width: 100%; padding: 12px; background: #00d2ff;
            border: none; border-radius: 10px; color: white; font-weight: bold;
        }
        .logout-btn {
            margin-top: 15px; width: 100%; padding: 10px;
            background: transparent; border: 1px solid #ff4b2b;
            color: #ff4b2b; border-radius: 10px;
        }
        .confirm-btn-red { background: #ff4b2b; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; flex: 1; }
        .cancel-btn-grey { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 12px; border-radius: 10px; flex: 1; }

        #toast {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #00d2ff; color: white; padding: 12px 25px;
            border-radius: 50px; transition: 0.5s; z-index: 3000;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-left">
            <div class="notif-btn" onclick="openMessages()">
                <i>🔔</i>
                <span class="notif-badge" id="notif-count">0</span>
            </div>
        </div>
        <div class="top-profile-container" onclick="toggleModal(true)">
            <span id="top-name">Yuklanmoqda...</span>
            <div class="mini-avatar" id="top-initials">?</div>
        </div>
    </header>

    <div class="main-content">
        <div class="balance-card">
            <h3>Mening balansim</h3>
            <h1 id="user-balance">0 so'm</h1>
            <p style="font-size: 12px; cursor: pointer; display: inline-block; margin-top: 10px;" onclick="addMoney()">💳 To'ldirish</p>
        </div>

        <div class="grid-menu">
            <div class="menu-item" onclick="startQuiz('free')">
                <i>🎁</i><span>Bepul Testlar</span>
            </div>
            <div class="menu-item premium" onclick="startQuiz('paid')">
                <i>💎</i><span>Premium Testlar</span>
            </div>
            <div class="menu-item" onclick="openMessages()">
                <i>✉️</i><span>Xabarlarim</span>
            </div>
            <div class="menu-item" onclick="openSupport()">
                <i>🎧</i><span>Yordam</span>
            </div>
        </div>
    </div>

    <div id="toast">Muvaffaqiyatli saqlandi!</div>

    <div id="profileModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom: 10px;">Profil Sozlamalari</h3>
            <div id="modal-email" style="font-size: 12px; opacity: 0.5; margin-bottom: 10px;">---</div>
            <input type="text" id="input-name" class="edit-input" placeholder="F.I.SH kiriting">
            <button class="btn-update" id="save-btn" onclick="updateName()">SAQLASH</button>
            <button class="logout-btn" onclick="openLogoutModal()">TIZIMDAN CHIQISH</button>
            <p onclick="toggleModal(false)" style="margin-top: 15px; cursor: pointer; font-size: 13px; opacity: 0.7;">Yopish</p>
        </div>
    </div>

    <div id="logoutModal" class="modal">
        <div class="modal-content" style="border-top: 4px solid #ff4b2b;">
            <h3 style="margin-bottom: 15px;">Chiqish</h3>
            <p style="opacity: 0.7; font-size: 14px; margin-bottom: 25px;">Haqiqatan ham akkauntdan chiqmoqchimisiz?</p>
            <div style="display: flex; gap: 10px;">
                <button class="cancel-btn-grey" onclick="closeLogoutModal()">YO'Q</button>
                <button class="confirm-btn-red" id="confirm-logout-btn" onclick="confirmLogout()">HA</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
            authDomain: "quiz-app-3692d.firebaseapp.com",
            projectId: "quiz-app-3692d",
            storageBucket: "quiz-app-3692d.firebasestorage.app",
            messagingSenderId: "526836020845",
            appId: "1:526836020845:android:3ea991380c104c75e8b164"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUserUid = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUserUid = user.uid;
                loadUserData(user);
            } else {
                window.location.replace("index.html");
            }
        });

        async function loadUserData(user) {
            try {
                const docRef = doc(db, "users", user.uid);
                const docSnap = await getDoc(docRef);

                let name = user.displayName || "Foydalanuvchi";
                let balance = 0;
                let notifs = 0;

                if (docSnap.exists()) {
                    name = docSnap.data().fio || name;
                    balance = docSnap.data().balance || 0;
                    notifs = docSnap.data().notifCount || 0;
                }

                document.getElementById('top-name').innerText = name;
                document.getElementById('top-initials').innerText = name.charAt(0).toUpperCase();
                document.getElementById('modal-email').innerText = user.email;
                document.getElementById('input-name').value = name;
                document.getElementById('user-balance').innerText = balance.toLocaleString() + " so'm";
                document.getElementById('notif-count').innerText = notifs;

            } catch (e) {
                console.error("Xato:", e);
            }
        }

        window.toggleModal = (show) => {
            document.getElementById('profileModal').style.display = show ? 'flex' : 'none';
        };

        window.updateName = async () => {
            const newName = document.getElementById('input-name').value;
            const btn = document.getElementById('save-btn');
            const toast = document.getElementById('toast');
            if(!newName) return;

            btn.disabled = true; btn.innerText = "...";

            try {
                await setDoc(doc(db, "users", currentUserUid), { fio: newName }, { merge: true });
                document.getElementById('top-name').innerText = newName;
                document.getElementById('top-initials').innerText = newName.charAt(0).toUpperCase();
                toast.classList.add('show');
                setTimeout(() => {
                    toast.classList.remove('show');
                    toggleModal(false);
                    btn.disabled = false; btn.innerText = "SAQLASH";
                }, 2000);
            } catch (e) { alert(e.message); btn.disabled = false; }
        };

        window.openLogoutModal = () => {
            toggleModal(false);
            document.getElementById('logoutModal').style.display = 'flex';
        };

        window.closeLogoutModal = () => {
            document.getElementById('logoutModal').style.display = 'none';
        };

        window.confirmLogout = async () => {
            await signOut(auth);
            localStorage.clear();
            window.location.replace("index.html");
        };

        // --- QO'SHIMCHA FUNKSIYALAR ---
        
        // Yangilangan xabarlar funksiyasi
        window.openMessages = () => {
            window.location.href = "messages.html";
        };

        window.openSupport = () => {
            window.location.href = "https://t.me/Sardorbek_Rahmonov";
        };

        window.startQuiz = (type) => { 
            alert(type === 'free' ? "Bepul testlar yuklanmoqda..." : "Premium test uchun balans yetarli emas!"); 
        };

        window.addMoney = () => { 
            alert("To'lov tizimi tez kunda ishga tushadi!"); 
        };

    </script>
</body>
</html>
