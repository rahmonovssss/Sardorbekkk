<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asosiy Sahifa - DTM Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { height: 100vh; background: #0f2027; color: white; overflow-x: hidden; }

        /* --- 1. HEADER --- */
        .header {
            position: fixed; top: 0; left: 0; width: 100%; 
            padding: 20px; display: flex; justify-content: space-between; 
            align-items: center; background: rgba(15, 32, 39, 0.9); 
            backdrop-filter: blur(10px); z-index: 1000;
        }

        .notif-btn {
            width: 45px; height: 45px; background: rgba(255, 255, 255, 0.1);
            border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; cursor: pointer; position: relative;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .notif-badge {
            position: absolute; top: 0; right: 0; background: #ff4b2b;
            color: white; font-size: 10px; padding: 2px 6px; 
            border-radius: 50%; border: 2px solid #0f2027;
        }

        .top-profile-container {
            display: flex; align-items: center; gap: 12px;
            background: rgba(255, 255, 255, 0.1); padding: 5px 15px; 
            border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
        }

        .mini-avatar {
            width: 35px; height: 35px; background: #00d2ff;
            border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; font-weight: bold; font-size: 16px;
        }

        /* --- 2. ASOSIY KONTENT --- */
        .main-content {
            padding: 110px 20px 40px; text-align: center;
            max-width: 600px; margin: 0 auto;
        }

        .balance-card {
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            padding: 25px; border-radius: 25px; margin-bottom: 30px;
            text-align: left; box-shadow: 0 10px 20px rgba(0, 210, 255, 0.2);
        }
        .balance-card h3 { font-size: 14px; opacity: 0.8; font-weight: 400; }
        .balance-card h1 { font-size: 32px; margin: 5px 0; }

        .grid-menu { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }

        .menu-item {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px 15px; border-radius: 20px; transition: 0.3s; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        .menu-item:hover { transform: translateY(-3px); border-color: #00d2ff; }
        .menu-item i { font-size: 30px; font-style: normal; }
        .premium { border-color: rgba(255, 215, 0, 0.4) !important; color: #ffd700; }

        /* --- 3. MODALLAR --- */
        .modal {
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: rgba(0,0,0,0.85);
            align-items: center; justify-content: center; z-index: 2000;
        }
        .modal-content {
            background: #1a2a33; padding: 30px; border-radius: 25px;
            width: 90%; max-width: 350px; text-align: center;
        }
        .edit-input {
            width: 100%; padding: 12px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 10px;
            color: white; margin: 15px 0; outline: none; text-align: center;
        }
        .btn-update {
            width: 100%; padding: 12px; background: #00d2ff;
            border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer;
        }

        #toast {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #ffd700; color: #000; padding: 12px 25px;
            border-radius: 50px; transition: 0.5s; z-index: 3000; font-weight: bold;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <header class="header">
        <div class="notif-btn" onclick="location.href='messages.html'">
            <i>🔔</i><span class="notif-badge" id="notif-count">0</span>
        </div>
        <div class="top-profile-container" onclick="toggleModal(true)">
            <span id="top-name">Yuklanmoqda...</span>
            <div class="mini-avatar" id="top-initials">?</div>
        </div>
    </header>

    <div class="main-content">
        <div class="balance-card">
            <h3>Mening balansim</h3>
            <h1 id="user-balance">0 so'm</h1>
            <p style="font-size: 12px; cursor: pointer; margin-top: 10px;" onclick="showToast('To\'lov tizimi tez kunda...')">💳 To'ldirish</p>
        </div>

        <div class="grid-menu">
            <div class="menu-item" onclick="startQuiz('free')">
                <i>🎁</i><span>Bepul Testlar</span>
            </div>
            <div class="menu-item premium" onclick="startQuiz('paid')">
                <i>💎</i><span>Premium Testlar</span>
            </div>
            <div class="menu-item" onclick="location.href='messages.html'">
                <i>✉️</i><span>Xabarlarim</span>
            </div>
            <div class="menu-item" onclick="location.href='https://t.me/Sardorbek_Rahmonov'">
                <i>🎧</i><span>Yordam</span>
            </div>
        </div>
    </div>

    <div id="toast">Xabar!</div>

    <div id="profileModal" class="modal">
        <div class="modal-content">
            <h3>Profil Sozlamalari</h3>
            <input type="text" id="input-name" class="edit-input" placeholder="F.I.SH">
            <button class="btn-update" id="save-btn" onclick="updateName()">SAQLASH</button>
            <p onclick="toggleModal(false)" style="margin-top:15px; cursor:pointer; font-size:13px; opacity:0.6;">Yopish</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
            authDomain: "quiz-app-3692d.firebaseapp.com",
            projectId: "quiz-app-3692d",
            storageBucket: "quiz-app-3692d.firebasestorage.app",
            messagingSenderId: "526836020845",
            appId: "1:526836020845:android:3ea991380c104c75e8b164"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let userUid = null;
        let currentBalance = 0;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                userUid = user.uid;
                const docSnap = await getDoc(doc(db, "users", user.uid));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    currentBalance = data.balance || 0;
                    document.getElementById('top-name').innerText = data.fio || "Foydalanuvchi";
                    document.getElementById('top-initials').innerText = (data.fio || "F").charAt(0).toUpperCase();
                    document.getElementById('user-balance').innerText = currentBalance.toLocaleString() + " so'm";
                    document.getElementById('notif-count').innerText = data.notifCount || 0;
                    document.getElementById('input-name').value = data.fio || "";
                }
            } else { window.location.href = "index.html"; }
        });

        window.toggleModal = (s) => document.getElementById('profileModal').style.display = s ? 'flex' : 'none';

        window.updateName = async () => {
            const n = document.getElementById('input-name').value;
            if(!n) return;
            await setDoc(doc(db, "users", userUid), { fio: n }, { merge: true });
            showToast("Profil yangilandi!");
            setTimeout(() => location.reload(), 1000);
        };

        window.showToast = (text) => {
            const t = document.getElementById('toast');
            t.innerText = text;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        };

        window.startQuiz = (type) => {
            if(type === 'free') {
                showToast("Bepul testlar yuklanmoqda...");
                setTimeout(() => window.location.href = "quiz.html?type=free", 1500);
            } else {
                if(currentBalance >= 2000) {
                    window.location.href = "quiz.html?type=premium";
                } else {
                    showToast("Premium uchun mablag' yetarli emas!");
                }
            }
        };
    </script>
</body>
</html>
