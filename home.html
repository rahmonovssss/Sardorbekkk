<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dr. Rahmonov - Golden Ocean</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: #010d1a; 
            color: white; 
            overflow-x: hidden; 
            min-height: 100vh;
            position: relative;
        }

        /* --- TEPADAN PASTGA TO'LQINLAR --- */
        .ocean-top { 
            position: fixed; top: 0; left: 0; width: 100%; height: 250px; 
            background: #01579b; z-index: -1; transform: rotate(180deg); /* Tepaga o'girish */
        }

        .wave {
            background: url(https://s3-us-west-2.amazonaws.com/s.cdpn.io/85486/wave.svg) repeat-x; 
            position: absolute; bottom: -190px; width: 6400px; height: 198px;
            animation: wave 10s cubic-bezier(0.36, 0.45, 0.63, 0.53) infinite;
            opacity: 0.4;
        }

        .wave:nth-of-type(2) {
            bottom: -170px;
            animation: wave 15s cubic-bezier(0.36, 0.45, 0.63, 0.53) -0.125s infinite;
            opacity: 0.7;
        }

        @keyframes wave {
            0% { transform: translateX(0); }
            100% { transform: translateX(-1600px); }
        }

        /* --- HEADER & GLOWING BELL --- */
        .header {
            position: fixed; top: 0; left: 0; width: 100%; 
            padding: 15px 20px; display: flex; justify-content: space-between; 
            align-items: center; background: rgba(1, 13, 26, 0.7); 
            backdrop-filter: blur(15px); z-index: 1000;
        }

        .bell-btn {
            font-size: 24px; cursor: pointer;
            animation: bell-glow 2s ease-in-out infinite;
        }

        @keyframes bell-glow {
            0%, 100% { filter: drop-shadow(0 0 2px #ffd700); transform: scale(1); }
            50% { filter: drop-shadow(0 0 12px #ffd700); transform: scale(1.1); }
        }

        .top-profile-container { 
            display: flex; align-items: center; gap: 10px; 
            background: rgba(255, 255, 255, 0.1); padding: 5px 12px; 
            border-radius: 50px; border: 1px solid rgba(255,255,255,0.1);
        }

        /* --- BALANCE CARD --- */
        .main-content { padding: 110px 20px 30px; max-width: 500px; margin: 0 auto; text-align: center; }
        
        .balance-card { 
            background: linear-gradient(135deg, #00d2ff 0%, #007bb5 100%); 
            padding: 30px 25px; border-radius: 30px; margin-bottom: 25px; text-align: left;
            box-shadow: 0 15px 35px rgba(0, 210, 255, 0.2);
            position: relative; overflow: hidden;
        }

        /* --- REAL GOLD PREMIUM BUTTON --- */
        .premium-btn {
            background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c) !important;
            border: none !important;
            position: relative; overflow: hidden;
            box-shadow: 0 4px 15px rgba(184, 134, 11, 0.4);
            transition: 0.3s;
        }

        .premium-btn span, .premium-btn i { color: #5d4037 !important; font-weight: 800 !important; }

        .premium-btn::before {
            content: ""; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
            transition: 0.5s; animation: sweep 3s infinite;
        }

        @keyframes sweep {
            0% { left: -100%; }
            30% { left: 100%; }
            100% { left: 100%; }
        }

        .premium-btn:active { transform: scale(0.95); box-shadow: 0 2px 5px rgba(184, 134, 11, 0.6); }

        /* --- GRID MENU --- */
        .grid-menu { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .menu-item { 
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 25px 15px; border-radius: 25px; cursor: pointer; transition: 0.3s;
            backdrop-filter: blur(5px);
        }
        .menu-item i { font-size: 32px; display: block; margin-bottom: 8px; font-style: normal; }
        .menu-item span { font-size: 14px; font-weight: 600; }

        /* --- TOAST --- */
        #toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: #fcf6ba; color: #5d4037; padding: 15px 30px; border-radius: 50px; transition: 0.5s; z-index: 3000; font-weight: 800; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        #toast.show { bottom: 40px; }
    </style>
</head>
<body>

    <div class="ocean-top">
        <div class="wave"></div>
        <div class="wave"></div>
    </div>

    <header class="header">
        <div class="bell-btn" onclick="location.href='messages.html'">🔔</div>
        <div class="top-profile-container" onclick="toggleModal(true)">
            <span id="top-name" style="font-size: 13px; font-weight: 600;">...</span>
            <div style="width:30px; height:30px; background:#00d2ff; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#010d1a; font-weight:800;" id="top-initials">?</div>
        </div>
    </header>

    <div class="main-content">
        <div class="balance-card">
            <p style="font-size: 11px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.9;">Mavjud Balans</p>
            <h1 id="user-balance">0 so'm</h1>
            <a href="billing.html" style="text-decoration:none; background:#fff; color:#007bb5; padding:7px 15px; border-radius:10px; font-size:12px; font-weight:700; display:inline-block; margin-top:10px;">To'ldirish 💳</a>
        </div>

        <div class="grid-menu">
            <div class="menu-item" onclick="startQuiz('free')"><i>🎁</i><span>Bepul Test</span></div>
            <div class="menu-item premium-btn" onclick="startQuiz('premium')"><i>💎</i><span>Premium (1000)</span></div>
            <div class="menu-item" onclick="navigate('statistics.html', 'Statistika...')"><i>📊</i><span>Statistika</span></div>
            <div class="menu-item" onclick="navigate('leaderboard.html', 'Liderlar...')"><i>🏆</i><span>Liderlar</span></div>
            <div class="menu-item" style="grid-column: span 2; border-color: #0088cc;" onclick="window.open('https://t.me/dr_rahmonov_admin')">
                <i style="color:#0088cc;">✈️</i><span style="color:#0088cc;">Telegram Support</span>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
            authDomain: "quiz-app-3692d.firebaseapp.com",
            projectId: "quiz-app-3692d",
            storageBucket: "quiz-app-3692d.firebasestorage.app",
            messagingSenderId: "526836020845",
            appId: "1:526836020845:android:3ea991380c104c75e8b164"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let userBalance = 0;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                onSnapshot(doc(db, "users", user.uid), (snap) => {
                    const data = snap.data() || {};
                    userBalance = data.balance || 0;
                    document.getElementById('user-balance').innerText = userBalance.toLocaleString() + " so'm";
                    document.getElementById('top-name').innerText = data.fio || "Foydalanuvchi";
                    document.getElementById('top-initials').innerText = (data.fio || "U")[0].toUpperCase();
                });
            } else { location.replace("index.html"); }
        });

        window.startQuiz = async (type) => {
            if(type === 'premium') {
                if(userBalance < 1000) {
                    showToast("Mablag' yetarli emas! 💳");
                    setTimeout(() => location.href = 'billing.html', 1500);
                } else {
                    const userRef = doc(db, "users", auth.currentUser.uid);
                    await updateDoc(userRef, { balance: increment(-1000) });
                    showToast("Premium aktivlashdi (-1000 so'm) 💎");
                    setTimeout(() => location.href = 'premium-quiz.html', 1000);
                }
            } else {
                location.href = 'quiz.html';
            }
        };

        window.showToast = (txt) => {
            const t = document.getElementById('toast');
            t.innerText = txt; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        };

        window.navigate = (url, msg) => { showToast(msg); setTimeout(() => location.href = url, 800); };
    </script>
</body>
</html>
