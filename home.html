<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dr. Rahmonov - Premium Cabinet</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs" type="module"></script>

    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --premium: #f6d365;
            --premium-end: #fda085;
            --bg-start: #0f172a; 
            --bg-end: #1e1b4b;
            --card-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            color: white; 
            min-height: 100vh;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            overflow-x: hidden;
        }

        /* Fon animatsiyasi */
        body::before {
            content: ""; position: absolute; width: 300px; height: 300px;
            background: var(--secondary); filter: blur(150px);
            top: -100px; left: -100px; opacity: 0.2; z-index: -1;
        }

        .header {
            position: fixed; top: 0; left: 0; width: 100%; 
            padding: 15px 20px; display: flex; justify-content: space-between; 
            align-items: center; background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(15px); z-index: 1000; border-bottom: 1px solid var(--glass-border);
        }

        .top-profile-container { 
            display: flex; align-items: center; gap: 10px; 
            background: var(--card-bg); padding: 5px 15px; 
            border-radius: 100px; border: 1px solid var(--glass-border);
            cursor: pointer;
        }

        .mini-avatar { 
            width: 32px; height: 32px; 
            background: linear-gradient(45deg, var(--primary), var(--secondary)); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-weight: 800; color: #0f172a; font-size: 14px;
        }

        .main-content { padding: 110px 20px 40px; max-width: 500px; margin: 0 auto; }
        
        .balance-card { 
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); 
            padding: 25px; border-radius: 24px; margin-bottom: 25px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            text-align: center;
        }
        .balance-card h1 { font-size: 36px; font-weight: 800; margin: 5px 0; }
        
        .btn-refill { 
            display: inline-block; margin-top: 15px; background: white; 
            padding: 10px 20px; border-radius: 12px; font-size: 14px; font-weight: 700;
            text-decoration: none; color: #2563eb; transition: 0.3s;
        }

        /* --- GRID MENU --- */
        .grid-menu { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        
        .menu-item { 
            background: var(--card-bg); border: 1px solid var(--glass-border); 
            padding: 20px 10px; border-radius: 24px; cursor: pointer; text-align: center;
            transition: 0.3s; display: flex; flex-direction: column; align-items: center;
            backdrop-filter: blur(10px);
        }
        .menu-item:active { transform: scale(0.95); background: rgba(255,255,255,0.1); }
        
        /* Stiker o'lchami */
        .menu-item dotlottie-player { width: 80px; height: 80px; margin-bottom: 10px; }
        .menu-item span { font-size: 14px; font-weight: 600; color: #cbd5e1; }

        /* --- PREMIUM YALTIRASH --- */
        .menu-item.premium-item {
            border: 1px solid rgba(246, 211, 101, 0.4);
            background: rgba(246, 211, 101, 0.05);
            position: relative;
            overflow: hidden;
        }
        .menu-item.premium-item::before {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(246,211,101,0.2) 0%, transparent 70%);
            animation: rotateGlow 4s linear infinite;
        }
        @keyframes rotateGlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .menu-item.premium-item span { color: var(--premium); font-weight: 800; }

        /* --- MODAL --- */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(10px); }
        .modal-content { background: #1e293b; padding: 30px; border-radius: 30px; width: 90%; max-width: 350px; text-align: center; border: 1px solid var(--glass-border); }
        
        .edit-input { width: 100%; padding: 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 15px; color: white; margin: 20px 0; outline: none; text-align: center; }
        
        .btn-main { width: 100%; padding: 15px; background: linear-gradient(45deg, var(--primary), var(--secondary)); border: none; border-radius: 15px; color: #0f172a; font-weight: 800; cursor: pointer; margin-bottom: 10px; }

        #toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: var(--premium); color: #000; padding: 12px 25px; border-radius: 50px; transition: 0.5s; z-index: 3000; font-weight: 700; font-size: 13px; }
        #toast.show { bottom: 30px; }
    </style>
</head>
<body>

    <header class="header">
        <div class="bell-btn" onclick="location.href='messages.html'">🔔</div>
        <div class="top-profile-container" onclick="toggleModal(true)">
            <span id="top-name" style="font-weight: 700; font-size: 14px;">...</span>
            <div class="mini-avatar" id="top-initials">?</div>
        </div>
    </header>

    <div class="main-content">
        <div class="balance-card">
            <p style="font-size: 12px; opacity: 0.8; letter-spacing: 1px;">ASOSIY BALANS</p>
            <h1 id="user-balance">0 so'm</h1>
            <a href="billing.html" class="btn-refill">To'ldirish 💳</a>
        </div>

        <div class="grid-menu">
            <div class="menu-item" onclick="navigate('quiz.html', 'Bepul test...')">
                <dotlottie-player src="https://lottie.host/7c978a3c-3103-4481-9964-b5a83a48e7e1/N4C4XN148s.json" background="transparent" speed="1" loop autoplay></dotlottie-player>
                <span>Bepul Test</span>
            </div>
            
            <div class="menu-item premium-item" onclick="startQuiz('premium')">
                <dotlottie-player src="https://lottie.host/8026111b-7798-4228-a53c-1b702336338e/A9F4uNfD8p.json" background="transparent" speed="1" loop autoplay></dotlottie-player>
                <span>Premium (1000)</span>
            </div>
            
            <div class="menu-item" onclick="navigate('statistics.html', 'Statistika...')">
                <dotlottie-player src="https://lottie.host/8b7d4133-c598-4444-938b-d7b693e43075/j28r6XhH3A.json" background="transparent" speed="1" loop autoplay></dotlottie-player>
                <span>Statistika</span>
            </div>
            
            <div class="menu-item" onclick="navigate('leaderboard.html', 'Liderlar...')">
                <dotlottie-player src="https://lottie.host/575a7c2c-8097-422e-b2d9-f53874411624/k65C6b7E4K.json" background="transparent" speed="1" loop autoplay></dotlottie-player>
                <span>Liderlar</span>
            </div>
            
            <div class="menu-item" style="grid-column: span 2; flex-direction: row; gap: 15px; padding: 15px;" onclick="window.open('https://t.me/dr_rahmonov_admin', '_blank')">
                <dotlottie-player src="https://lottie.host/5b47a61d-6161-4608-8e6b-67e324c47841/T88XGOf6m6.json" background="transparent" speed="1" loop autoplay style="width: 40px; height: 40px; margin: 0;"></dotlottie-player>
                <span style="color: var(--secondary);">Telegram Support</span>
            </div>
        </div>
    </div>

    <div id="profileModal" class="modal">
        <div class="modal-content">
            <div style="height: 100px;"><dotlottie-player src="https://lottie.host/0a8a6886-c408-4177-bb89-7243b85f0962/8U7uG4H8D5.json" speed="1" loop autoplay></dotlottie-player></div>
            <div id="user-id-display" style="font-size: 12px; color: var(--premium); font-weight: bold; margin-top: 10px;">ID: ...</div>
            <input type="text" id="input-name" class="edit-input" placeholder="Ismingiz">
            <button class="btn-main" onclick="updateName()">SAQLASH</button>
            <button class="btn-main" style="background: transparent; border: 1px solid #ff4b2b; color: #ff4b2b;" onclick="signOut(auth).then(()=>location.reload())">Chiqish</button>
            <p onclick="toggleModal(false)" style="margin-top:15px; cursor:pointer; opacity:0.5; font-size: 12px;">Yopish</p>
        </div>
    </div>

    <div id="toast"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
            authDomain: "quiz-app-3692d.firebaseapp.com",
            projectId: "quiz-app-3692d",
            storageBucket: "quiz-app-3692d.firebasestorage.app",
            messagingSenderId: "526836020845",
            appId: "1:526836020845:android:3ea991380c104c75e8b164"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let userBalance = 0;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                onSnapshot(doc(db, "users", user.uid), (snap) => {
                    const data = snap.data() || {};
                    userBalance = data.balance || 0;
                    const name = data.fio || "Foydalanuvchi";
                    document.getElementById('user-balance').innerText = userBalance.toLocaleString() + " so'm";
                    document.getElementById('top-name').innerText = name;
                    document.getElementById('top-initials').innerText = name[0].toUpperCase();
                    document.getElementById('user-id-display').innerText = "ID: " + (data.studentID || "...");
                    document.getElementById('input-name').value = data.fio || "";
                });
            } else { location.replace("index.html"); }
        });

        window.navigate = (url, msg) => { showToast(msg); setTimeout(() => location.href = url, 800); };
        window.startQuiz = (t) => {
            if(t === 'premium' && userBalance < 1000) {
                showToast("Mablag' yetarli emas!");
                setTimeout(() => location.href='billing.html', 1200);
            } else { navigate(t === 'premium' ? 'premium-quiz.html' : 'quiz.html', "Yuklanmoqda..."); }
        };
        window.toggleModal = (s) => document.getElementById('profileModal').style.display = s ? 'flex' : 'none';
        window.showToast = (m) => { const t = document.getElementById('toast'); t.innerText = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); };
        window.updateName = async () => {
            await updateDoc(doc(db, "users", auth.currentUser.uid), { fio: document.getElementById('input-name').value });
            showToast("Saqlandi! ✅"); toggleModal(false);
        };
    </script>
</body>
</html>
