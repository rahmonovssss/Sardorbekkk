<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asosiy Sahifa - DTM Quiz</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            height: 100vh; background: #0f2027;
            color: white; overflow: hidden;
        }

        /* --- 1. PROFIL TEPADA BURCHAKDA --- */
        .top-profile-container {
            position: absolute; top: 20px; right: 20px;
            display: flex; align-items: center; gap: 15px;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 20px; border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px); cursor: pointer;
            transition: 0.3s; z-index: 1000;
        }
        .top-profile-container:hover { background: rgba(255, 255, 255, 0.2); }

        .mini-avatar {
            width: 40px; height: 40px;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            border-radius: 50%; display: flex;
            align-items: center; justify-content: center;
            font-weight: bold; font-size: 18px;
            position: relative;
            box-shadow: 0 0 10px #00d2ff;
        }

        /* Animatsiyali halqa */
        .mini-avatar::after {
            content: ''; position: absolute;
            width: 100%; height: 100%;
            border: 2px solid #00d2ff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 2s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #top-name { font-size: 14px; font-weight: 500; }

        /* --- 2. MODAL OYNA --- */
        .modal {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            align-items: center; justify-content: center; z-index: 2000;
        }
        .modal-content {
            background: #1a2a33; padding: 30px; border-radius: 20px;
            width: 90%; max-width: 350px; text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .edit-input {
            width: 100%; padding: 12px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 10px;
            color: white; margin: 15px 0; outline: none; text-align: center;
        }

        .btn-update {
            width: 100%; padding: 12px; background: #00d2ff;
            border: none; border-radius: 10px; color: white;
            font-weight: bold; cursor: pointer;
        }

        .logout-btn {
            margin-top: 15px; width: 100%; padding: 10px;
            background: transparent; border: 1px solid #ff4b2b;
            color: #ff4b2b; border-radius: 10px; cursor: pointer;
        }

        .welcome-hero {
            height: 100vh; display: flex; align-items: center; justify-content: center;
            flex-direction: column; text-align: center;
        }
    </style>
</head>
<body>

    <div class="top-profile-container" onclick="toggleModal(true)">
        <div class="mini-avatar" id="top-initials">?</div>
        <span id="top-name">Yuklanmoqda...</span>
    </div>

    <div class="welcome-hero">
        <h1>Xush kelibsiz!</h1>
        <p style="opacity: 0.5; margin-top: 10px;">DTM Quiz tizimi siz uchun tayyor.</p>
    </div>

    <div id="profileModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom: 10px;">Profil Sozlamalari</h3>
            <div id="modal-email" style="font-size: 12px; opacity: 0.5; margin-bottom: 10px;">---</div>
            
            <input type="text" id="input-name" class="edit-input" placeholder="F.I.SH kiriting">
            
            <button class="btn-update" id="save-btn" onclick="updateName()">SAQLASH</button>
            <button class="logout-btn" onclick="logoutUser()">TIZIMDAN CHIQISH</button>
            
            <p onclick="toggleModal(false)" style="margin-top: 15px; cursor: pointer; font-size: 13px; opacity: 0.7;">Yopish</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
            authDomain: "quiz-app-3692d.firebaseapp.com",
            projectId: "quiz-app-3692d",
            storageBucket: "quiz-app-3692d.firebasestorage.app",
            messagingSenderId: "526836020845",
            appId: "1:526836020845:android:3ea991380c104c75e8b164"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUserUid = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUserUid = user.uid;
                loadUserData(user);
            } else {
                window.location.replace("index.html");
            }
        });

        async function loadUserData(user) {
            try {
                const docRef = doc(db, "users", user.uid);
                const docSnap = await getDoc(docRef);

                let name = user.displayName || "Foydalanuvchi";
                if (docSnap.exists()) {
                    name = docSnap.data().fio || name;
                }

                document.getElementById('top-name').innerText = name;
                document.getElementById('top-initials').innerText = name.charAt(0).toUpperCase();
                document.getElementById('modal-email').innerText = user.email;
                document.getElementById('input-name').value = name;
            } catch (e) {
                console.error("Xato:", e);
                document.getElementById('top-name').innerText = "Xatolik!";
            }
        }

        window.toggleModal = (show) => {
            document.getElementById('profileModal').style.display = show ? 'flex' : 'none';
        };

        window.updateName = async () => {
            const newName = document.getElementById('input-name').value;
            const btn = document.getElementById('save-btn');
            if(!newName) return alert("Ism kiriting!");

            btn.disabled = true;
            btn.innerText = "SAQLANMOQDA...";

            try {
                await setDoc(doc(db, "users", currentUserUid), {
                    fio: newName,
                    lastUpdate: new Date()
                }, { merge: true });
                
                alert("Yangilandi!");
                location.reload();
            } catch (e) {
                alert("Xato: " + e.message);
                btn.disabled = false;
                btn.innerText = "SAQLASH";
            }
        };

        // --- CHIQUV (LOGOUT) - ILovalarda aniq ishlashi uchun to'liq tozalash ---
        window.logoutUser = async () => {
            if(confirm("Haqiqatan ham akkauntdan chiqmoqchimisiz?")) {
                try {
                    // 1. Firebase seansini tugatish
                    await signOut(auth);
                    
                    // 2. Local xotirani butunlay tozalash
                    localStorage.clear();
                    sessionStorage.clear();

                    // 3. Cookie fayllarini majburiy o'chirish (Ilovalar uchun)
                    document.cookie.split(";").forEach((c) => {
                        document.cookie = c.replace(/^ +/, "").replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/");
                    });

                    // 4. Seansni qayta tiklanmasligi uchun majburiy yo'naltirish
                    window.location.replace("index.html");
                } catch (e) {
                    console.error("Logout xatosi:", e);
                    window.location.replace("index.html");
                }
            }
        };
    </script>
</body>
</html>
