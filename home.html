<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dr. Rahmonov - Shaxsiy Kabinet</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs" type="module"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #0f2027; color: white; overflow-x: hidden; min-height: 100vh; }

        /* --- HEADER --- */
        .header {
            position: fixed; top: 0; left: 0; width: 100%; 
            padding: 15px 20px; display: flex; justify-content: space-between; 
            align-items: center; background: rgba(15, 32, 39, 0.95); 
            backdrop-filter: blur(10px); z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .top-profile-container { display: flex; align-items: center; gap: 10px; background: rgba(255, 255, 255, 0.08); padding: 5px 12px; border-radius: 50px; cursor: pointer; transition: 0.3s; }
        .top-profile-container:active { transform: scale(0.95); background: rgba(255, 255, 255, 0.15); }
        .mini-avatar { width: 32px; height: 32px; background: #00d2ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; color: #000; }

        /* --- CONTENT --- */
        .main-content { padding: 100px 20px 30px; max-width: 600px; margin: 0 auto; text-align: center; }
        
        .balance-card { 
            background: linear-gradient(135deg, #00d2ff, #3a7bd5); 
            padding: 25px; border-radius: 25px; margin-bottom: 25px; text-align: left;
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.2);
        }
        .balance-card h1 { font-size: 32px; margin: 5px 0; font-weight: 600; }
        .btn-refill { 
            display: inline-block; margin-top: 10px; background: rgba(255,255,255,0.2); 
            padding: 6px 15px; border-radius: 10px; font-size: 13px; font-weight: 600;
            text-decoration: none; color: white; transition: 0.3s;
        }
        .btn-refill:active { background: white; color: #3a7bd5; }

        /* --- GRID MENU --- */
        .grid-menu { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .menu-item { 
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.08); 
            padding: 22px 15px; border-radius: 22px; cursor: pointer; text-align: center;
            transition: 0.3s; position: relative; overflow: hidden;
        }
        .menu-item:active { transform: scale(0.95); background: rgba(255, 255, 255, 0.1); }
        .menu-item i { font-size: 30px; display: block; margin-bottom: 10px; font-style: normal; }
        .menu-item span { font-size: 14px; font-weight: 400; opacity: 0.9; }

        /* --- MODAL --- */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(10px); }
        .modal-content { background: #1a2a33; padding: 25px; border-radius: 30px; width: 90%; max-width: 370px; text-align: center; border: 1px solid rgba(255,255,255,0.1); animation: zoomIn 0.3s ease; }
        
        @keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .user-id-badge { background: #ffd700; color: #000; padding: 5px 15px; border-radius: 10px; font-weight: 800; font-size: 14px; display: inline-block; margin-bottom: 12px; }
        .edit-input { width: 100%; padding: 14px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; color: white; margin-bottom: 15px; outline: none; text-align: center; font-size: 15px; }
        
        .btn-main { width: 100%; padding: 15px; background: #00d2ff; border: none; border-radius: 15px; color: #000; font-weight: 600; cursor: pointer; margin-bottom: 10px; transition: 0.3s; }
        .btn-main:active { transform: scale(0.98); opacity: 0.9; }

        /* --- TOAST --- */
        #toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: #ffd700; color: #000; padding: 14px 28px; border-radius: 50px; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 3000; font-weight: 600; box-shadow: 0 5px 15px rgba(0,0,0,0.3); white-space: nowrap; }
        #toast.show { bottom: 40px; }
    </style>
</head>
<body>

    <header class="header">
        <div onclick="showToast('Xabarlar hozircha bo\'sh 📭')" style="cursor:pointer; font-size: 20px;">🔔</div>
        <div class="top-profile-container" onclick="toggleModal(true)">
            <span id="top-name">...</span>
            <div class="mini-avatar" id="top-initials">?</div>
        </div>
    </header>

    <div class="main-content">
        <div class="balance-card">
            <h3>Balansim</h3>
            <h1 id="user-balance">0 so'm</h1>
            <a href="billing.html" class="btn-refill">💳 To'ldirish</a>
        </div>

        <div class="grid-menu">
            <div class="menu-item" onclick="startQuiz('free')"><i>🎁</i><span>Bepul Test</span></div>
            <div class="menu-item" style="border-color: #ffd700;" onclick="startQuiz('premium')"><i style="color: #ffd700;">💎</i><span style="color: #ffd700; font-weight: 600;">Premium (1000)</span></div>
            <div class="menu-item" onclick="navigate('statistics.html', 'Statistika yuklanmoqda...')"><i>📊</i><span>Statistika</span></div>
            <div class="menu-item" onclick="navigate('leaderboard.html', 'Liderlar jadvali...')"><i>🏆</i><span>Liderlar</span></div>
            <div class="menu-item" style="grid-column: span 2; background: rgba(0, 136, 204, 0.1); border-color: rgba(0, 136, 204, 0.3);" onclick="contactSupport()">
                <i style="color: #0088cc; font-size: 24px;">✈️</i>
                <span style="color: #0088cc; font-weight: 600;">Telegram orqali yordam</span>
            </div>
        </div>
    </div>

    <div id="profileModal" class="modal">
        <div class="modal-content">
            <div class="sticker-box"><dotlottie-player src="https://lottie.host/5b47a61d-6161-4608-8e6b-67e324c47841/T88XGOf6m6.json" background="transparent" speed="1" loop autoplay></dotlottie-player></div>
            <div class="user-id-badge" id="user-id-display">ID: ...</div>
            <input type="text" id="input-name" class="edit-input" placeholder="Ismingiz">
            <button class="btn-main" onclick="updateName()">SAQLASH</button>
            <div class="btn-action-row" style="display: flex; gap: 10px; margin-bottom: 10px;">
                <button class="btn-main" style="background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1);" onclick="location.href='results.html'">📜 Tarix</button>
                <button class="btn-main" style="background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1);" onclick="location.href='payments.html'">💸 To'lovlar</button>
            </div>
            <button class="btn-main" style="background: transparent; border: 1px solid #ff4b2b; color: #ff4b2b;" onclick="openLogoutConfirm()">Chiqish</button>
            <p onclick="toggleModal(false)" style="margin-top:10px; cursor:pointer; font-size:12px; opacity:0.5;">Yopish</p>
        </div>
    </div>

    <div id="logoutModal" class="modal">
        <div class="modal-content" style="max-width: 320px;">
            <h3 style="margin-bottom: 20px;">Tizimdan chiqasizmi?</h3>
            <div style="display: flex; gap: 10px;">
                <button class="btn-main" style="background: rgba(255,255,255,0.1); color: white;" onclick="closeLogoutConfirm()">Yo'q</button>
                <button class="btn-main" style="background: #ff4b2b; color: white;" onclick="finalLogout()">Ha, chiqish</button>
            </div>
        </div>
    </div>

    <div id="toast">Xabar!</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
            authDomain: "quiz-app-3692d.firebaseapp.com",
            projectId: "quiz-app-3692d",
            storageBucket: "quiz-app-3692d.firebasestorage.app",
            messagingSenderId: "526836020845",
            appId: "1:526836020845:android:3ea991380c104c75e8b164"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let userBalance = 0;

        function generateID() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            let res = '';
            for (let i = 0; i < 6; i++) res += chars.charAt(Math.floor(Math.random() * chars.length));
            return res;
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userRef = doc(db, "users", user.uid);
                const snap = await getDoc(userRef);
                let data = snap.exists() ? snap.data() : {};
                
                if (!data.studentID) {
                    data.studentID = generateID();
                    await setDoc(userRef, { studentID: data.studentID }, { merge: true });
                }

                userBalance = data.balance || 0;
                const displayName = data.fio || user.displayName || "Foydalanuvchi";
                
                document.getElementById('user-id-display').innerText = "ID: " + data.studentID;
                document.getElementById('top-name').innerText = displayName;
                document.getElementById('top-initials').innerText = displayName[0].toUpperCase();
                document.getElementById('user-balance').innerText = userBalance.toLocaleString() + " so'm";
                document.getElementById('input-name').value = data.fio || "";
            } else {
                window.location.replace("index.html");
            }
        });

        // NAVIGATSIYA FUNKSIYASI
        window.navigate = (url, msg) => {
            showToast(msg);
            setTimeout(() => location.href = url, 800);
        }

        // TELEGRAM YORDAM
        window.contactSupport = () => {
            showToast("Telegramga o'tilmoqda...");
            setTimeout(() => window.open("https://t.me/dr_rahmonov_admin", "_blank"), 800);
        }

        // PREMIUM TEST MANTIQI
        window.startQuiz = (type) => {
            if(type === 'premium') {
                if(userBalance < 1000) {
                    showToast("Balans yetarli emas! (Kamida 1000 so'm)");
                    setTimeout(() => location.href = 'billing.html', 1500);
                } else {
                    showToast("Premium test boshlanmoqda... 💎");
                    setTimeout(() => location.href = 'premium-quiz.html', 1000);
                }
            } else {
                showToast("Bepul test yuklanmoqda...");
                setTimeout(() => location.href = 'quiz.html', 1000);
            }
        };

        window.toggleModal = (s) => document.getElementById('profileModal').style.display = s ? 'flex' : 'none';
        window.openLogoutConfirm = () => { document.getElementById('logoutModal').style.display = 'flex'; toggleModal(false); };
        window.closeLogoutConfirm = () => document.getElementById('logoutModal').style.display = 'none';
        window.finalLogout = () => signOut(auth).then(() => window.location.replace("index.html"));

        window.showToast = (txt) => {
            const t = document.getElementById('toast');
            t.innerText = txt; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        };

        window.updateName = async () => {
            const name = document.getElementById('input-name').value;
            if(!name) return showToast("Ismni kiriting!");
            await updateDoc(doc(db, "users", auth.currentUser.uid), { fio: name });
            showToast("Muvaffaqiyatli saqlandi! ✅");
            setTimeout(() => location.reload(), 1000);
        };
    </script>
</body>
</html>
