<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asosiy Sahifa - Profil</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            height: 100vh; background: linear-gradient(-45deg, #0f2027, #2c5364);
            color: white; overflow: hidden;
        }

        /* Yuqori o'ng burchakdagi profil */
        .top-header {
            position: absolute; top: 20px; right: 20px;
            display: flex; align-items: center; gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 15px; border-radius: 50px;
            cursor: pointer; border: 1px solid rgba(255,255,255,0.2);
            z-index: 10;
        }
        .top-profile-img {
            width: 40px; height: 40px; border-radius: 50%;
            object-fit: cover; border: 2px solid #00d2ff;
        }

        /* Modal */
        .modal {
            display: none; position: fixed; z-index: 100;
            left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
            align-items: center; justify-content: center;
        }
        .modal-content {
            background: #1a2a33; padding: 30px; border-radius: 20px;
            width: 90%; max-width: 400px; text-align: center;
        }
        .edit-avatar-wrapper { position: relative; width: 100px; height: 100px; margin: 0 auto 15px; cursor: pointer; }
        .edit-avatar { width: 100px; height: 100px; border-radius: 50%; border: 3px solid #00d2ff; object-fit: cover; }
        
        input[type="text"], input[type="email"] {
            width: 100%; padding: 12px; margin: 10px 0;
            border-radius: 8px; border: none; outline: none;
            background: #2c3e50; color: white;
        }
        input[type="email"] { background: #121d25; color: #7f8c8d; cursor: not-allowed; }
        
        .save-btn { background: #00d2ff; color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        .logout-btn { background: #ff4b2b; color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="top-header" onclick="openModal()">
        <span id="header-name">Yuklanmoqda...</span>
        <img src="https://via.placeholder.com/150" id="header-img" class="top-profile-img">
    </div>

    <div style="display: flex; height: 100vh; align-items: center; justify-content: center;">
        <h2>Xush kelibsiz!</h2>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3>Profilni tahrirlash</h3>
            <div class="edit-avatar-wrapper" onclick="document.getElementById('file-input').click()">
                <img src="https://via.placeholder.com/150" id="edit-preview" class="edit-avatar">
                <p style="font-size: 10px; color: #00d2ff; margin-top: 5px;">Rasm tanlash</p>
            </div>
            <input type="file" id="file-input" style="display: none;" accept="image/*">
            
            <input type="text" id="edit-name" placeholder="F.I.SH">
            <input type="email" id="edit-email" readonly>
            
            <button class="save-btn" id="btn-save" onclick="saveProfile()">SAQLASH</button>
            <button class="logout-btn" onclick="logoutUser()">CHIQUV</button>
            <p onclick="closeModal()" style="margin-top:15px; cursor:pointer; opacity:0.6;">Yopish</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
            authDomain: "quiz-app-3692d.firebaseapp.com",
            projectId: "quiz-app-3692d",
            storageBucket: "quiz-app-3692d.firebasestorage.app",
            messagingSenderId: "526836020845",
            appId: "1:526836020845:android:3ea991380c104c75e8b164"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;

        // --- PROFILNI FIRESORE'DAN YUKLASH ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                try {
                    const docRef = doc(db, "users", user.uid);
                    const docSnap = await getDoc(docRef);

                    let name = user.displayName || "Foydalanuvchi";
                    let photo = "https://via.placeholder.com/150";

                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        name = data.fio || name;
                        photo = data.photo || photo;
                    }

                    document.getElementById('header-name').innerText = name;
                    document.getElementById('header-img').src = photo;
                    document.getElementById('edit-name').value = name;
                    document.getElementById('edit-email').value = user.email;
                    document.getElementById('edit-preview').src = photo;
                } catch (e) { console.error("Xato:", e); }
            } else {
                window.location.replace("index.html");
            }
        });

        window.openModal = () => document.getElementById('editModal').style.display = 'flex';
        window.closeModal = () => document.getElementById('editModal').style.display = 'none';

        // --- CHIQUV ---
        window.logoutUser = async () => {
            if (confirm("Tizimdan chiqishni xohlaysizmi?")) {
                await signOut(auth);
                localStorage.removeItem("user_logged_in");
                window.location.replace("index.html");
            }
        };

        // --- SAQLASH (FIRESTORE GA) ---
        window.saveProfile = async () => {
            const name = document.getElementById('edit-name').value;
            const photo = document.getElementById('edit-preview').src;
            const btn = document.getElementById('btn-save');

            if (!name) return alert("F.I.SH kiriting!");

            btn.disabled = true;
            btn.innerText = "Saqlanmoqda...";

            try {
                await setDoc(doc(db, "users", currentUser.uid), {
                    fio: name,
                    photo: photo, // Base64 matn ko'rinishida saqlaydi
                    email: currentUser.email
                }, { merge: true });

                alert("Muvaffaqiyatli saqlandi!");
                location.reload();
            } catch (e) {
                alert("Xatolik: " + e.message);
                btn.disabled = false;
                btn.innerText = "SAQLASH";
            }
        };

        // --- TELEFONDAN RASM OLISH (BASE64) ---
        document.getElementById('file-input').onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                if (file.size > 800000) { // Firestore bitta hujjat uchun ~1MB gacha ruxsat beradi
                    alert("Rasm hajmi juda katta!");
                    return;
                }
                const reader = new FileReader();
                reader.onload = () => {
                    document.getElementById('edit-preview').src = reader.result;
                };
                reader.readAsDataURL(file);
            }
        };
    </script>
</body>
</html>
