<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asosiy sahifa - Profil</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            height: 100vh; background: linear-gradient(-45deg, #0f2027, #2c5364);
            color: white; overflow: hidden;
        }

        /* Yuqori o'ng burchakdagi profil */
        .top-header {
            position: absolute; top: 20px; right: 20px;
            display: flex; align-items: center; gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 15px; border-radius: 50px;
            cursor: pointer; border: 1px solid rgba(255,255,255,0.2);
        }
        .top-profile-img {
            width: 40px; height: 40px; border-radius: 50%;
            object-fit: cover; border: 2px solid #00d2ff;
        }

        /* Modal (Tahrirlash oynasi) */
        .modal {
            display: none; position: fixed; z-index: 100;
            left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            align-items: center; justify-content: center;
        }
        .modal-content {
            background: #1a2a33; padding: 30px; border-radius: 20px;
            width: 90%; max-width: 400px; text-align: center;
        }
        .edit-avatar {
            width: 100px; height: 100px; border-radius: 50%;
            margin-bottom: 15px; border: 3px solid #00d2ff; cursor: pointer;
        }
        input[type="text"], input[type="email"] {
            width: 100%; padding: 12px; margin: 10px 0;
            border-radius: 8px; border: none; outline: none;
        }
        input[type="email"] { background: #333; color: #888; } /* Emailni tahrirlab bo'lmaydi */
        
        .save-btn {
            background: #00d2ff; color: white; padding: 10px 20px;
            border: none; border-radius: 8px; cursor: pointer; width: 100%;
        }
    </style>
</head>
<body>

    <div class="top-header" onclick="openModal()">
        <span id="header-name">Yuklanmoqda...</span>
        <img src="https://via.placeholder.com/150" id="header-img" class="top-profile-img">
    </div>

    <div style="display: flex; height: 100vh; align-items: center; justify-content: center;">
        <h2>Markaziy tugmalar yaqinda qo'shiladi...</h2>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3>Profilni tahrirlash</h3>
            <label for="file-input">
                <img src="https://via.placeholder.com/150" id="edit-preview" class="edit-avatar" title="Rasm almashtirish">
            </label>
            <input type="file" id="file-input" style="display: none;" accept="image/*">
            
            <input type="text" id="edit-name" placeholder="F.I.SH">
            <input type="email" id="edit-email" readonly> <button class="save-btn" onclick="saveProfile()">SAQLASH</button>
            <button onclick="closeModal()" style="background:none; color:white; border:none; margin-top:10px; cursor:pointer;">Yopish</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
            authDomain: "quiz-app-3692d.firebaseapp.com",
            projectId: "quiz-app-3692d",
            storageBucket: "quiz-app-3692d.firebasestorage.app",
            messagingSenderId: "526836020845",
            appId: "1:526836020845:android:3ea991380c104c75e8b164"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;

        // Tizimga kirganini tekshirish
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('header-name').innerText = user.displayName || "Foydalanuvchi";
                document.getElementById('header-img').src = user.photoURL || "https://via.placeholder.com/150";
                document.getElementById('edit-name').value = user.displayName || "";
                document.getElementById('edit-email').value = user.email;
                document.getElementById('edit-preview').src = user.photoURL || "https://via.placeholder.com/150";
            } else {
                window.location.href = "auth.html";
            }
        });

        // Modalni ochish/yopish
        window.openModal = () => document.getElementById('editModal').style.display = 'flex';
        window.closeModal = () => document.getElementById('editModal').style.display = 'none';

        // Profilni saqlash
        window.saveProfile = async () => {
            const newName = document.getElementById('edit-name').value;
            const fileInput = document.getElementById('file-input');
            let photoURL = currentUser.photoURL;

            // Rasm yuklash logikasi (Hozircha faqat ismni yangilash)
            try {
                await updateProfile(auth.currentUser, {
                    displayName: newName
                    // photoURL: yangi_link (Storage-ga yuklangandan keyin)
                });
                
                // Firestore-ga ham yozish
                await setDoc(doc(db, "users", currentUser.uid), {
                    fio: newName,
                    email: currentUser.email
                }, { merge: true });

                alert("Ma'lumotlar yangilandi!");
                location.reload();
            } catch (error) {
                alert("Xatolik: " + error.message);
            }
        };

        // Rasm tanlanganda preview qilish
        document.getElementById('file-input').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = () => document.getElementById('edit-preview').src = reader.result;
            reader.readAsDataURL(e.target.files[0]);
        };
    </script>
</body>
</html>
