<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dr. Rahmonov - Crystal Water</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs" type="module"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: linear-gradient(180deg, #005c97 0%, #363795 100%); 
            color: white; 
            overflow-x: hidden; 
            min-height: 100vh;
            position: relative;
        }

        /* --- SUV EFFEKTLARI --- */
        .water-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://www.transparenttextures.com/patterns/cubes.png'); opacity: 0.1; pointer-events: none; z-index: 1; }
        .bubbles { position: fixed; bottom: -20px; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .bubble { position: absolute; bottom: -50px; background: rgba(255, 255, 255, 0.2); border-radius: 50%; animation: rise var(--d) infinite ease-in; }
        @keyframes rise { 0% { transform: translateY(0) scale(1); opacity: 0; } 50% { opacity: 0.5; } 100% { transform: translateY(-110vh) scale(1.5); opacity: 0; } }

        /* --- HEADER --- */
        .header { position: fixed; top: 0; left: 0; width: 100%; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); }
        
        .notification-box { position: relative; cursor: pointer; font-size: 24px; }
        .notif-badge { 
            position: absolute; top: -5px; right: -5px; background: #ff4b2b; 
            color: white; font-size: 10px; font-weight: 800; min-width: 18px; 
            height: 18px; border-radius: 50%; display: none; align-items: center; 
            justify-content: center; border: 2px solid #014371;
        }

        .top-profile-container { display: flex; align-items: center; gap: 10px; background: rgba(255, 255, 255, 0.15); padding: 5px 12px; border-radius: 50px; cursor: pointer; }
        .mini-avatar { width: 32px; height: 32px; background: #00d2ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; color: #fff; }

        /* --- MAIN CONTENT --- */
        .main-content { position: relative; z-index: 10; padding: 100px 20px 30px; max-width: 600px; margin: 0 auto; text-align: center; }
        .balance-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); padding: 30px 25px; border-radius: 30px; margin-bottom: 25px; text-align: left; border: 1px solid rgba(255,255,255,0.2); }
        .btn-refill { display: inline-block; margin-top: 10px; background: #00d2ff; padding: 8px 18px; border-radius: 12px; font-size: 13px; font-weight: 700; text-decoration: none; color: #fff; }

        /* --- MENU --- */
        .grid-menu { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .menu-item { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.1); padding: 25px 15px; border-radius: 25px; cursor: pointer; transition: 0.3s; }
        .menu-item:active { transform: scale(0.95); }
        .menu-item i { font-size: 32px; display: block; margin-bottom: 10px; font-style: normal; }

        .premium-box { background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728) !important; position: relative; overflow: hidden; border: none !important; }
        .premium-box span, .premium-box i { color: #5d4037 !important; font-weight: 800 !important; }

        /* --- MODAL --- */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); align-items: center; justify-content: center; z-index: 2000; }
        .modal.active { display: flex; }
        .modal-content { background: #021d33; padding: 30px; border-radius: 35px; width: 90%; max-width: 380px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        
        .user-id-badge { background: #ffd700; color: #000; padding: 5px 15px; border-radius: 10px; font-weight: 800; display: inline-block; margin-bottom: 20px; }
        .edit-input { width: 100%; padding: 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; color: white; margin-bottom: 15px; text-align: center; outline: none; }
        
        .btn-main { width: 100%; padding: 16px; background: #00d2ff; border: none; border-radius: 15px; color: #fff; font-weight: 800; cursor: pointer; margin-bottom: 10px; }
        
        #toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: #ffd700; color: #000; padding: 15px 30px; border-radius: 50px; transition: 0.5s; z-index: 3000; font-weight: 700; }
        #toast.show { bottom: 40px; }
    </style>
</head>
<body>

    <div class="water-overlay"></div>
    <div class="bubbles" id="bubble-container"></div>

    <header class="header">
        <div class="notification-box" onclick="readNotifications()">
            🔔<div id="notif-badge" class="notif-badge">0</div>
        </div>
        <div class="top-profile-container" onclick="toggleModal(true)">
            <span id="top-name" style="font-weight: 600; font-size: 14px;">...</span>
            <div class="mini-avatar" id="top-initials">?</div>
        </div>
    </header>

    <div class="main-content">
        <div class="balance-card">
            <h3 style="font-size: 12px; opacity: 0.7;">BALANSIM</h3>
            <h1 id="user-balance">0 so'm</h1>
            <a href="billing.html" class="btn-refill">To'ldirish 💳</a>
        </div>

        <div class="grid-menu">
            <div class="menu-item" onclick="startQuiz('free')"><i>🎁</i><span>Bepul Test</span></div>
            <div class="menu-item premium-box" onclick="startQuiz('premium')"><i>💎</i><span>Premium (1000)</span></div>
            <div class="menu-item" onclick="navigate('statistics.html', 'Statistika...')"><i>📊</i><span>Statistika</span></div>
            <div class="menu-item" onclick="navigate('leaderboard.html', 'Liderlar...')"><i>🏆</i><span>Liderlar</span></div>
            <div class="menu-item" style="grid-column: span 2; background: rgba(0, 136, 204, 0.2);" onclick="contactSupport()">
                <i style="color: #00d2ff;">✈️</i><span>Telegram Admin</span>
            </div>
        </div>
    </div>

    <div id="profileModal" class="modal">
        <div class="modal-content">
            <dotlottie-player src="https://lottie.host/5b47a61d-6161-4608-8e6b-67e324c47841/T88XGOf6m6.json" background="transparent" speed="1" style="width: 100px; height: 100px; margin: 0 auto;" loop autoplay></dotlottie-player>
            <div class="user-id-badge" id="user-id-display">ID: ...</div>
            <input type="text" id="input-name" class="edit-input" placeholder="Ismingiz">
            <button class="btn-main" onclick="updateName()">SAQLASH</button>
            <div style="display: flex; gap: 10px;">
                <button class="btn-main" style="background: rgba(255,255,255,0.1);" onclick="location.href='results.html'">📜 Tarix</button>
                <button class="btn-main" style="background: rgba(255,255,255,0.1);" onclick="location.href='payments.html'">💸 To'lovlar</button>
            </div>
            <button class="btn-main" style="background: transparent; border: 1px solid #ff4b2b; color: #ff4b2b;" onclick="signOutUser()">Chiqish</button>
            <p onclick="toggleModal(false)" style="margin-top:15px; cursor:pointer; opacity:0.5; font-size:12px;">Yopish</p>
        </div>
    </div>

    <div id="toast"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
            authDomain: "quiz-app-3692d.firebaseapp.com",
            projectId: "quiz-app-3692d",
            storageBucket: "quiz-app-3692d.firebasestorage.app",
            messagingSenderId: "526836020845",
            appId: "1:526836020845:android:3ea991380c104c75e8b164"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let userBalance = 0;

        // --- SIZ BERGAN ID GENERATOR FUNKSIYASI ---
        function generateID() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            let res = '';
            for (let i = 0; i < 6; i++) res += chars.charAt(Math.floor(Math.random() * chars.length));
            return res;
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                const userRef = doc(db, "users", user.uid);
                onSnapshot(userRef, async (snap) => {
                    if (snap.exists()) {
                        let data = snap.data();
                        
                        // ID generator (agar yo'q bo'lsa yangi funksiyadan foydalanadi)
                        if(!data.studentID) {
                            const newID = generateID();
                            await setDoc(userRef, { studentID: newID }, { merge: true });
                        }

                        // Ma'lumotlarni chiqarish
                        userBalance = data.balance || 0;
                        const fio = data.fio || "Foydalanuvchi";
                        document.getElementById('user-balance').innerText = userBalance.toLocaleString() + " so'm";
                        document.getElementById('top-name').innerText = fio;
                        document.getElementById('top-initials').innerText = fio[0].toUpperCase();
                        document.getElementById('user-id-display').innerText = "ID: " + (data.studentID || "...");
                        document.getElementById('input-name').value = fio;

                        // QO'NG'IROQCHA AVTOMATIKASI
                        const unread = data.unreadNotifications || 0;
                        const badge = document.getElementById('notif-badge');
                        if (unread > 0) {
                            badge.innerText = unread;
                            badge.style.display = 'flex';
                        } else {
                            badge.style.display = 'none';
                        }
                    }
                });
            } else { window.location.replace("index.html"); }
        });

        window.readNotifications = async () => {
            if (auth.currentUser) {
                await updateDoc(doc(db, "users", auth.currentUser.uid), { unreadNotifications: 0 });
            }
            navigate('messages.html', 'Xabarnomalar...');
        };

        window.updateName = async () => {
            const name = document.getElementById('input-name').value;
            if(!name) return showToast("Ismni kiriting!");
            await updateDoc(doc(db, "users", auth.currentUser.uid), { fio: name });
            showToast("Saqlandi! ✅");
            toggleModal(false);
        };

        window.signOutUser = () => signOut(auth).then(() => window.location.replace("index.html"));
        window.startQuiz = (type) => {
            if(type === 'premium' && userBalance < 1000) {
                showToast("Mablag' yetarli emas!");
                setTimeout(() => location.href = 'billing.html', 1200);
            } else {
                navigate(type === 'premium' ? 'premium-quiz.html' : 'quiz.html', 'Yuklanmoqda...');
            }
        };

        window.toggleModal = (s) => s ? document.getElementById('profileModal').classList.add('active') : document.getElementById('profileModal').classList.remove('active');
        window.navigate = (url, msg) => { showToast(msg); setTimeout(() => location.href = url, 800); };
        window.showToast = (txt) => { const t = document.getElementById('toast'); t.innerText = txt; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); };
        window.contactSupport = () => window.open("https://t.me/dr_rahmonov_admin", "_blank");

        // Pufakchalar generatori
        const container = document.getElementById('bubble-container');
        for (let i = 0; i < 15; i++) {
            const b = document.createElement('div');
            b.className = 'bubble';
            const size = Math.random() * 20 + 5 + 'px';
            b.style.width = size; b.style.height = size;
            b.style.left = Math.random() * 100 + '%';
            b.style.setProperty('--d', Math.random() * 5 + 3 + 's');
            b.style.animationDelay = Math.random() * 5 + 's';
            container.appendChild(b);
        }
    </script>
</body>
</html>
