<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dr. Rahmonov - Dengiz Shabadasi</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* --- DENGIZ TO'LQINLI FON --- */
        body { 
            background: #021d33; 
            color: white; 
            overflow-x: hidden; 
            min-height: 100vh;
            position: relative;
        }

        .ocean { 
            height: 5%; width: 100%; position: absolute; bottom: 0; left: 0; background: #01579b; 
            z-index: -1;
        }

        .wave {
            background: url(https://s3-us-west-2.amazonaws.com/s.cdpn.io/85486/wave.svg) repeat-x; 
            position: absolute; top: -198px; width: 6400px; height: 198px;
            animation: wave 7s cubic-bezier( 0.36, 0.45, 0.63, 0.53) infinite;
            transform: translate3d(0, 0, 0);
        }

        .wave:nth-of-type(2) {
            top: -175px;
            animation: wave 7s cubic-bezier( 0.36, 0.45, 0.63, 0.53) -.125s infinite, swell 7s ease -1.25s infinite;
            opacity: 1;
        }

        @keyframes wave {
            0% { margin-left: 0; }
            100% { margin-left: -1600px; }
        }

        @keyframes swell {
            0%, 100% { transform: translate3d(0,-25px,0); }
            50% { transform: translate3d(0,5px,0); }
        }

        /* --- HEADER --- */
        .header {
            position: fixed; top: 0; left: 0; width: 100%; 
            padding: 15px 20px; display: flex; justify-content: space-between; 
            align-items: center; background: rgba(2, 29, 51, 0.9); 
            backdrop-filter: blur(15px); z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .top-profile-container { 
            display: flex; align-items: center; gap: 10px; 
            background: rgba(255, 255, 255, 0.1); padding: 5px 12px; 
            border-radius: 50px; cursor: pointer; transition: 0.3s; 
        }

        .mini-avatar { 
            width: 32px; height: 32px; background: #00d2ff; 
            border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; font-weight: 700; color: #021d33; 
        }

        /* --- CONTENT --- */
        .main-content { padding: 100px 20px 30px; max-width: 600px; margin: 0 auto; text-align: center; }
        
        .balance-card { 
            background: linear-gradient(135deg, #00d2ff, #007bb5); 
            padding: 30px 25px; border-radius: 30px; margin-bottom: 25px; text-align: left;
            box-shadow: 0 15px 35px rgba(0, 210, 255, 0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .balance-card h1 { font-size: 36px; margin: 5px 0; font-weight: 800; }
        
        .btn-refill { 
            display: inline-block; margin-top: 10px; background: #fff; 
            padding: 8px 18px; border-radius: 12px; font-size: 13px; font-weight: 700;
            text-decoration: none; color: #007bb5; transition: 0.3s;
        }

        /* --- GRID MENU --- */
        .grid-menu { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        
        .menu-item { 
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 25px 15px; border-radius: 25px; cursor: pointer; text-align: center;
            transition: 0.3s; backdrop-filter: blur(5px);
        }
        .menu-item:active { transform: scale(0.95); background: rgba(255, 255, 255, 0.1); }
        .menu-item i { font-size: 35px; display: block; margin-bottom: 10px; font-style: normal; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); }
        .menu-item span { font-size: 14px; font-weight: 600; color: #e1f5fe; }

        /* Premium Effect */
        .premium-box { 
            border: 1px solid #ffd700; 
            background: rgba(255, 215, 0, 0.05); 
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255, 215, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0); }
        }

        /* --- MODAL & TOAST --- */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(10px); }
        .modal-content { background: #021d33; padding: 30px; border-radius: 35px; width: 90%; max-width: 380px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .btn-main { width: 100%; padding: 16px; background: #00d2ff; border: none; border-radius: 15px; color: #021d33; font-weight: 800; cursor: pointer; margin-bottom: 10px; }
        
        #toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: #ffd700; color: #000; padding: 15px 30px; border-radius: 50px; transition: 0.5s; z-index: 3000; font-weight: 700; }
        #toast.show { bottom: 40px; }
    </style>
</head>
<body>

    <div class="ocean">
        <div class="wave"></div>
        <div class="wave"></div>
    </div>

    <header class="header">
        <div onclick="location.href='messages.html'" style="cursor:pointer; font-size: 22px;">🔔</div>
        <div class="top-profile-container" onclick="toggleModal(true)">
            <span id="top-name" style="font-weight: 600; font-size: 14px;">...</span>
            <div class="mini-avatar" id="top-initials">?</div>
        </div>
    </header>

    <div class="main-content">
        <div class="balance-card">
            <h3 style="font-size: 12px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.8;">Mening Balansim</h3>
            <h1 id="user-balance">0 so'm</h1>
            <a href="billing.html" class="btn-refill">Hamyonni to'ldirish 💳</a>
        </div>

        <div class="grid-menu">
            <div class="menu-item" onclick="startQuiz('free')"><i>🎁</i><span>Bepul Test</span></div>
            <div class="menu-item premium-box" onclick="startQuiz('premium')"><i style="color: #ffd700;">💎</i><span style="color: #ffd700;">Premium (1000)</span></div>
            <div class="menu-item" onclick="navigate('statistics.html', 'Statistika...')"><i>📊</i><span>Statistika</span></div>
            <div class="menu-item" onclick="navigate('leaderboard.html', 'Liderlar...')"><i>🏆</i><span>Liderlar</span></div>
            
            <div class="menu-item" style="grid-column: span 2; background: rgba(0, 136, 204, 0.1); border-color: #0088cc;" onclick="contactSupport()">
                <i style="color: #0088cc; font-size: 24px;">✈️</i>
                <span style="color: #0088cc;">Telegram yordam markazi</span>
            </div>
        </div>
    </div>

    <div id="profileModal" class="modal">
        <div class="modal-content">
            <div id="user-id-display" style="background: #ffd700; color: #000; padding: 5px 15px; border-radius: 10px; font-weight: 800; display: inline-block; margin-bottom: 20px;">ID: ...</div>
            <input type="text" id="input-name" style="width: 100%; padding: 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; color: white; margin-bottom: 15px; text-align: center; font-weight: 600;" placeholder="Ismingiz">
            <button class="btn-main" onclick="updateName()">SAQLASH</button>
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <button class="btn-main" style="background: rgba(255,255,255,0.1); color: white;" onclick="location.href='results.html'">📜 Tarix</button>
                <button class="btn-main" style="background: rgba(255,255,255,0.1); color: white;" onclick="location.href='payments.html'">💸 To'lovlar</button>
            </div>
            <button class="btn-main" style="background: transparent; border: 1px solid #ff4b2b; color: #ff4b2b;" onclick="signOut(auth).then(()=>location.reload())">Tizimdan chiqish</button>
            <p onclick="toggleModal(false)" style="margin-top:15px; cursor:pointer; font-size:12px; opacity:0.5;">Yopish</p>
        </div>
    </div>

    <div id="toast"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
            authDomain: "quiz-app-3692d.firebaseapp.com",
            projectId: "quiz-app-3692d",
            storageBucket: "quiz-app-3692d.firebasestorage.app",
            messagingSenderId: "526836020845",
            appId: "1:526836020845:android:3ea991380c104c75e8b164"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let userBalance = 0;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                onSnapshot(doc(db, "users", user.uid), (snap) => {
                    const data = snap.data() || {};
                    userBalance = data.balance || 0;
                    document.getElementById('user-balance').innerText = userBalance.toLocaleString() + " so'm";
                    document.getElementById('top-name').innerText = data.fio || "Foydalanuvchi";
                    document.getElementById('top-initials').innerText = (data.fio || "U")[0].toUpperCase();
                    document.getElementById('user-id-display').innerText = "ID: " + (data.studentID || "...");
                    document.getElementById('input-name').value = data.fio || "";
                });
            } else { location.replace("index.html"); }
        });

        window.startQuiz = async (type) => {
            if(type === 'premium') {
                if(userBalance < 1000) {
                    showToast("Balans yetarli emas! 💳");
                    setTimeout(() => location.href = 'billing.html', 1500);
                } else {
                    const userRef = doc(db, "users", auth.currentUser.uid);
                    await updateDoc(userRef, { balance: increment(-1000) });
                    showToast("Premium test boshlandi (-1000 so'm) 💎");
                    setTimeout(() => location.href = 'premium-quiz.html', 1000);
                }
            } else {
                navigate('quiz.html', 'Bepul test yuklanmoqda...');
            }
        };

        window.navigate = (url, msg) => { showToast(msg); setTimeout(() => location.href = url, 800); };
        window.toggleModal = (s) => document.getElementById('profileModal').style.display = s ? 'flex' : 'none';
        window.showToast = (txt) => { const t = document.getElementById('toast'); t.innerText = txt; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); };
        window.contactSupport = () => window.open("https://t.me/dr_rahmonov_admin", "_blank");
        window.updateName = async () => {
            const name = document.getElementById('input-name').value;
            if(!name) return showToast("Ismni kiriting!");
            await updateDoc(doc(db, "users", auth.currentUser.uid), { fio: name });
            showToast("Muvaffaqiyatli saqlandi! ✅");
            toggleModal(false);
        };
    </script>
</body>
</html>
