<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Test - Dr. Rahmonov</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: linear-gradient(180deg, #011d33 0%, #014371 100%); 
            color: white; 
            min-height: 100vh;
            padding: 20px;
        }

        /* --- HEADER --- */
        .quiz-header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 15px 20px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
            max-width: 700px;
            margin: 0 auto 25px auto;
        }

        .subject-title { font-weight: 600; font-size: 16px; color: #00d2ff; }
        .status-badge { background: #107c41; padding: 6px 15px; border-radius: 50px; font-weight: 800; font-size: 12px; text-transform: uppercase; }

        /* --- CONTENT AREA --- */
        .quiz-container {
            max-width: 700px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            min-height: 300px;
        }

        /* Word hujjati kontentini chiroyli ko'rsatish */
        .word-content-render {
            color: #ffffff;
            font-size: 16px;
            line-height: 1.6;
            text-align: left;
        }
        .word-content-render p { margin-bottom: 15px; }
        .word-content-render img { max-width: 100%; height: auto; border-radius: 12px; margin: 10px 0; border: 2px solid rgba(255,255,255,0.2); }

        /* --- FINISH BUTTON --- */
        .submit-container { text-align: center; margin-top: 30px; }
        .btn-finish {
            background: linear-gradient(135deg, #ff4b2b, #ff416c);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(255,75,43,0.4);
            transition: 0.3s;
            width: 100%;
            max-width: 300px;
        }
        .btn-finish:active { transform: scale(0.98); }

        /* --- LOADING SCREEN --- */
        .loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 200px; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: #00d2ff; border-radius: 50%; animation: spin 1s infinite linear; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="quiz-header">
        <div class="subject-title" id="quiz-subject">Yuklanmoqda...</div>
        <div class="status-badge">Aktiv</div>
    </div>

    <div class="quiz-container">
        <div id="loading-area" class="loading-screen">
            <div class="spinner"></div>
            <p style="opacity: 0.7; font-size: 14px;">Test savollari bazadan yuklanmoqda...</p>
        </div>
        
        <div id="quiz-content" class="word-content-render" style="display: none;"></div>
    </div>

    <div class="submit-container" id="action-area" style="display: none;">
        <button class="btn-finish" onclick="exitQuiz()">TESTDAN CHIQISH 🚪</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
            authDomain: "quiz-app-3692d.firebaseapp.com",
            projectId: "quiz-app-3692d",
            storageBucket: "quiz-app-3692d.firebasestorage.app",
            messagingSenderId: "526836020845",
            appId: "1:526836020845:android:3ea991380c104c75e8b164"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Foydalanuvchi avtorizatsiyasini tekshirish
        onAuthStateChanged(auth, (user) => {
            if (user) {
                streamPremiumQuiz();
            } else {
                location.replace("index.html");
            }
        });

        function streamPremiumQuiz() {
            // "premium_admin" -> "settings" hujjatini real vaqt rejimida tinglash
            onSnapshot(doc(db, "premium_admin", "settings"), (snap) => {
                if (snap.exists()) {
                    const data = snap.data();
                    
                    // Fan nomini o'rnatish
                    document.getElementById('quiz-subject').innerText = data.subject || "Premium Test";
                    
                    // Word ichidagi matn va rasmlarni chiqarish
                    if (data.htmlContent) {
                        document.getElementById('quiz-content').innerHTML = data.htmlContent;
                    } else {
                        document.getElementById('quiz-content').innerHTML = "<p style='color: #ff4b2b; text-align:center;'>Xatolik: Word fayl mazmuni bo'sh yoki yuklanmagan!</p>";
                    }

                    // Spinnerni yashirish va testni ochish
                    document.getElementById('loading-area').style.display = 'none';
                    document.getElementById('quiz-content').style.display = 'block';
                    document.getElementById('action-area').style.display = 'block';
                } else {
                    document.getElementById('loading-area').innerHTML = "<p style='color: #ff4b2b;'>Admin tomonidan test hali ochilmagan!</p>";
                }
            }, (error) => {
                alert("Ma'lumot olishda xato yuz berdi: " + error.message);
            });
        }

        // Chiqish tugmasi funksiyasi
        window.exitQuiz = () => {
            if (confirm("Haqiqatan ham test sahifasidan chiqmoqchimisiz?")) {
                location.replace("index.html");
            }
        };
    </script>
</body>
</html>
