<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil - DTM Quiz</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            height: 100vh; background: #0f2027;
            color: white; display: flex; align-items: center; justify-content: center;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px; border-radius: 30px;
            backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center; width: 90%; max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* --- Animatsiyali Profil Aylanasi --- */
        .avatar-circle {
            width: 120px; height: 120px;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            border-radius: 50%; margin: 0 auto 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 40px; font-weight: bold; color: white;
            position: relative;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.5);
            animation: pulse 2s infinite;
        }

        .avatar-circle::before {
            content: ''; position: absolute; top: -5px; left: -5px; right: -5px; bottom: -5px;
            border-radius: 50%; border: 2px solid #00d2ff;
            animation: rotate 4s linear infinite;
        }

        @keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .user-name { font-size: 22px; font-weight: 600; margin-bottom: 5px; color: #fff; }
        .user-email { font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 30px; }

        .edit-input {
            width: 100%; padding: 12px; background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 10px;
            color: white; margin-bottom: 15px; outline: none; text-align: center;
        }

        .btn-save {
            width: 100%; padding: 12px; background: #00d2ff;
            border: none; border-radius: 10px; color: white;
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-save:hover { background: #3a7bd5; transform: translateY(-2px); }

        .logout-link { margin-top: 20px; display: inline-block; color: #ff4b2b; font-size: 14px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="avatar-circle" id="user-initials">?</div>

        <div class="user-name" id="display-name">Yuklanmoqda...</div>
        <div class="user-email" id="display-email">---</div>

        <hr style="opacity: 0.1; margin-bottom: 20px;">

        <input type="text" id="input-name" class="edit-input" placeholder="Yangi F.I.SH kiritish">
        <button class="btn-save" id="save-btn" onclick="updateName()">F.I.SHNI YANGILASH</button>

        <span class="logout-link" onclick="logoutUser()">Tizimdan chiqish</span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
            authDomain: "quiz-app-3692d.firebaseapp.com",
            projectId: "quiz-app-3692d",
            storageBucket: "quiz-app-3692d.firebasestorage.app",
            messagingSenderId: "526836020845",
            appId: "1:526836020845:android:3ea991380c104c75e8b164"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let uid = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                uid = user.uid;
                fetchUserData(user);
            } else {
                window.location.replace("index.html");
            }
        });

        // Ma'lumotlarni Firestore'dan yuklash
        async function fetchUserData(user) {
            try {
                const docRef = doc(db, "users", user.uid);
                const docSnap = await getDoc(docRef);

                let fullName = user.displayName || "Foydalanuvchi";
                
                if (docSnap.exists()) {
                    fullName = docSnap.data().fio || fullName;
                }

                // UI ni yangilash
                document.getElementById('display-name').innerText = fullName;
                document.getElementById('display-email').innerText = user.email;
                document.getElementById('input-name').value = fullName;
                
                // Ism bosh harfini logoga qo'yish
                document.getElementById('user-initials').innerText = fullName.charAt(0).toUpperCase();

            } catch (e) {
                console.error("Yuklashda xato:", e);
                document.getElementById('display-name').innerText = "Xatolik yuz berdi";
            }
        }

        // F.I.SH ni o'zgartirish
        window.updateName = async () => {
            const newName = document.getElementById('input-name').value;
            const btn = document.getElementById('save-btn');

            if (!newName) return alert("Ismni bo'sh qoldirmang!");

            btn.disabled = true;
            btn.innerText = "Saqlanmoqda...";

            try {
                await setDoc(doc(db, "users", uid), {
                    fio: newName,
                    updatedAt: new Date()
                }, { merge: true });

                alert("Ismingiz muvaffaqiyatli o'zgartirildi!");
                location.reload();
            } catch (e) {
                alert("Xatolik: " + e.message);
                btn.disabled = false;
                btn.innerText = "F.I.SHNI YANGILASH";
            }
        };

        // Logout
        window.logoutUser = async () => {
            if(confirm("Chiqmoqchimisiz?")) {
                await signOut(auth);
                localStorage.removeItem("user_logged_in");
                window.location.replace("index.html");
            }
        };
    </script>
</body>
</html>
