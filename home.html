<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dr. Rahmonov - Premium Cabinet</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs" type="module"></script>

    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg: #050a10;
            --card-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); 
            color: white; 
            min-height: 100vh;
            overflow-x: hidden;
            /* Chiroyli orqa fon animatsiyasi */
            background: radial-gradient(circle at 0% 0%, rgba(0, 210, 255, 0.15) 0%, transparent 35%),
                        radial-gradient(circle at 100% 100%, rgba(58, 123, 213, 0.15) 0%, transparent 35%),
                        var(--bg);
        }

        /* --- HEADER --- */
        .header {
            position: fixed; top: 0; left: 0; width: 100%; 
            padding: 20px; display: flex; justify-content: space-between; 
            align-items: center; background: rgba(5, 10, 16, 0.8); 
            backdrop-filter: blur(15px); z-index: 1000; border-bottom: 1px solid var(--glass-border);
        }

        .bell-btn {
            font-size: 22px; cursor: pointer; transition: 0.3s;
            filter: drop-shadow(0 0 8px rgba(0,210,255,0.3));
        }
        .bell-btn:active { transform: scale(0.8) rotate(15deg); }

        .top-profile-container { 
            display: flex; align-items: center; gap: 12px; 
            background: var(--card-bg); padding: 6px 15px; 
            border-radius: 100px; border: 1px solid var(--glass-border);
            cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .top-profile-container:active { transform: scale(0.92); background: rgba(255,255,255,0.12); }

        /* --- ANIMATSION AVATAR --- */
        .mini-avatar { 
            width: 36px; height: 36px; 
            background: linear-gradient(45deg, var(--primary), var(--secondary)); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-weight: 800; color: #000; font-size: 16px;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.5);
            animation: avatarGlow 3s infinite alternate;
        }
        @keyframes avatarGlow {
            from { box-shadow: 0 0 5px rgba(0, 210, 255, 0.4); }
            to { box-shadow: 0 0 20px rgba(0, 210, 255, 0.8); }
        }

        /* --- CONTENT --- */
        .main-content { padding: 110px 20px 40px; max-width: 600px; margin: 0 auto; }
        
        .balance-card { 
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%); 
            padding: 30px; border-radius: 30px; margin-bottom: 30px; 
            position: relative; overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 210, 255, 0.25);
        }
        .balance-card::after {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
        }
        .balance-card h3 { font-size: 14px; opacity: 0.8; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }
        .balance-card h1 { font-size: 38px; font-weight: 800; letter-spacing: -1px; }
        
        .btn-refill { 
            display: inline-block; margin-top: 15px; background: white; 
            padding: 10px 20px; border-radius: 12px; font-size: 14px; font-weight: 700;
            text-decoration: none; color: #3a7bd5; transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* --- GRID MENU --- */
        .grid-menu { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; }
        .menu-item { 
            background: var(--card-bg); border: 1px solid var(--glass-border); 
            padding: 25px 15px; border-radius: 28px; cursor: pointer; text-align: center;
            transition: 0.4s; backdrop-filter: blur(5px);
        }
        .menu-item:active { transform: translateY(-5px); background: rgba(255,255,255,0.1); border-color: var(--primary); }
        .menu-item i { font-size: 36px; display: block; margin-bottom: 12px; }
        .menu-item span { font-size: 15px; font-weight: 600; }

        /* --- MODAL --- */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(12px); }
        .modal-content { background: #0f172a; padding: 30px; border-radius: 35px; width: 90%; max-width: 380px; border: 1px solid var(--glass-border); text-align: center; }

        .user-id-badge { background: #ffd700; color: #000; padding: 6px 18px; border-radius: 12px; font-weight: 800; font-size: 14px; margin-bottom: 20px; display: inline-block; }
        .edit-input { width: 100%; padding: 16px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 18px; color: white; margin-bottom: 20px; text-align: center; font-size: 16px; font-weight: 600; }
        
        .btn-main { width: 100%; padding: 16px; background: var(--primary); border: none; border-radius: 18px; color: #000; font-weight: 800; cursor: pointer; margin-bottom: 12px; }

        #toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: #ffd700; color: #000; padding: 15px 30px; border-radius: 100px; transition: 0.5s; z-index: 3000; font-weight: 700; }
        #toast.show { bottom: 40px; }
    </style>
</head>
<body>

    <header class="header">
        <div class="bell-btn" onclick="location.href='messages.html'">🔔</div>
        <div class="top-profile-container" onclick="toggleModal(true)">
            <span id="top-name" style="font-weight: 600;">...</span>
            <div class="mini-avatar" id="top-initials">?</div>
        </div>
    </header>

    <div class="main-content">
        <div class="balance-card">
            <h3>Asosiy Balans</h3>
            <h1 id="user-balance">0 so'm</h1>
            <a href="billing.html" class="btn-refill">Hozir to'ldirish 💳</a>
        </div>

        <div class="grid-menu">
            <div class="menu-item" onclick="navigate('quiz.html', 'Bepul test yuklanmoqda...')"><i>🎁</i><span>Bepul Test</span></div>
            <div class="menu-item" style="border-color: rgba(255, 215, 0, 0.3);" onclick="startQuiz('premium')"><i>💎</i><span style="color: #ffd700;">Premium (1000)</span></div>
            <div class="menu-item" onclick="navigate('statistics.html', 'Statistika...')"><i>📊</i><span>Statistika</span></div>
            <div class="menu-item" onclick="navigate('leaderboard.html', 'Liderlar...')"><i>🏆</i><span>Liderlar</span></div>
            <div class="menu-item" style="grid-column: span 2; background: rgba(0, 136, 204, 0.1);" onclick="window.open('https://t.me/dr_rahmonov_admin')"><i>✈️</i><span style="color: #0088cc;">Telegram Support</span></div>
        </div>
    </div>

    <div id="profileModal" class="modal">
        <div class="modal-content">
            <div style="height: 120px; margin-bottom: 10px;"><dotlottie-player src="https://lottie.host/5b47a61d-6161-4608-8e6b-67e324c47841/T88XGOf6m6.json" speed="1" loop autoplay></dotlottie-player></div>
            <div class="user-id-badge" id="user-id-display">ID: ...</div>
            <input type="text" id="input-name" class="edit-input" placeholder="Ismingizni kiriting">
            <button class="btn-main" onclick="updateName()">SAQLASH</button>
            <div style="display: flex; gap: 10px;">
                <button class="btn-main" style="background: rgba(255,255,255,0.08); color: white;" onclick="location.href='results.html'">Tarix</button>
                <button class="btn-main" style="background: rgba(255,255,255,0.08); color: white;" onclick="location.href='payments.html'">To'lovlar</button>
            </div>
            <button class="btn-main" style="background: transparent; border: 1px solid #ff4b2b; color: #ff4b2b;" onclick="signOut(auth).then(()=>location.reload())">Chiqish</button>
            <p onclick="toggleModal(false)" style="margin-top:15px; cursor:pointer; opacity:0.5; font-size: 13px;">Yopish</p>
        </div>
    </div>

    <div id="toast">Xabar!</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
            authDomain: "quiz-app-3692d.firebaseapp.com",
            projectId: "quiz-app-3692d",
            storageBucket: "quiz-app-3692d.firebasestorage.app",
            messagingSenderId: "526836020845",
            appId: "1:526836020845:android:3ea991380c104c75e8b164"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let userBalance = 0;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userRef = doc(db, "users", user.uid);
                onSnapshot(userRef, (snap) => {
                    const data = snap.data() || {};
                    userBalance = data.balance || 0;
                    const name = data.fio || "Foydalanuvchi";
                    
                    document.getElementById('user-id-display').innerText = "ID: " + (data.studentID || "...");
                    document.getElementById('top-name').innerText = name;
                    document.getElementById('top-initials').innerText = name[0].toUpperCase();
                    document.getElementById('user-balance').innerText = userBalance.toLocaleString() + " so'm";
                    document.getElementById('input-name').value = data.fio || "";
                });
            } else {
                location.replace("index.html");
            }
        });

        window.navigate = (url, msg) => { showToast(msg); setTimeout(() => location.href = url, 800); };

        window.startQuiz = (type) => {
            if(type === 'premium' && userBalance < 1000) {
                showToast("Mablag' yetarli emas! 💳");
                setTimeout(() => location.href='billing.html', 1200);
            } else {
                const url = type === 'premium' ? 'premium-quiz.html' : 'quiz.html';
                navigate(url, "Tayyorlaning, test boshlanmoqda...");
            }
        };

        window.toggleModal = (s) => document.getElementById('profileModal').style.display = s ? 'flex' : 'none';
        
        window.showToast = (txt) => {
            const t = document.getElementById('toast');
            t.innerText = txt; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        };

        window.updateName = async () => {
            const name = document.getElementById('input-name').value;
            if(!name) return showToast("Ism bo'sh!");
            await updateDoc(doc(db, "users", auth.currentUser.uid), { fio: name });
            showToast("Saqlandi! ✅");
            setTimeout(() => toggleModal(false), 1000);
        };
    </script>
</body>
</html>
