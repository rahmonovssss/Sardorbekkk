<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dr. Rahmonov - Crystal Water</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: linear-gradient(180deg, #005c97 0%, #363795 100%); 
            color: white; 
            overflow-x: hidden; 
            min-height: 100vh;
            position: relative;
        }

        /* --- SUV EFFEKTLARI --- */
        .water-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://www.transparenttextures.com/patterns/cubes.png'); opacity: 0.1; pointer-events: none; z-index: 1; }
        .light-rays { position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.15) 0%, transparent 50%); animation: rays 10s ease-in-out infinite alternate; z-index: 0; pointer-events: none; }
        @keyframes rays { from { transform: rotate(-5deg); } to { transform: rotate(5deg); } }

        .bubbles { position: fixed; bottom: -20px; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .bubble { position: absolute; bottom: -50px; background: rgba(255, 255, 255, 0.2); border-radius: 50%; animation: rise var(--d) infinite ease-in; box-shadow: inset 0 0 5px rgba(255,255,255,0.3); }
        @keyframes rise { 0% { transform: translateY(0) scale(1); opacity: 0; } 50% { opacity: 0.5; } 100% { transform: translateY(-110vh) scale(1.5); opacity: 0; } }

        /* --- HEADER --- */
        .header { position: fixed; top: 0; left: 0; width: 100%; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .bell-btn { font-size: 22px; cursor: pointer; animation: pulse-glow 2s infinite; }
        @keyframes pulse-glow { 0%, 100% { filter: drop-shadow(0 0 2px #ffd700); } 50% { filter: drop-shadow(0 0 10px #ffd700); } }

        .top-profile-container { display: flex; align-items: center; gap: 10px; background: rgba(255, 255, 255, 0.15); padding: 5px 12px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }

        /* --- MAIN CONTENT --- */
        .main-content { position: relative; z-index: 10; padding: 100px 20px 30px; max-width: 600px; margin: 0 auto; text-align: center; }
        .balance-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); padding: 30px 25px; border-radius: 30px; margin-bottom: 25px; text-align: left; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .btn-refill { display: inline-block; margin-top: 10px; background: #00d2ff; padding: 8px 18px; border-radius: 12px; font-size: 13px; font-weight: 700; text-decoration: none; color: #fff; }

        /* --- MENU --- */
        .grid-menu { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .menu-item { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.1); padding: 25px 15px; border-radius: 25px; cursor: pointer; transition: 0.3s; backdrop-filter: blur(5px); }
        .menu-item:active { transform: scale(0.95); }
        .menu-item i { font-size: 32px; display: block; margin-bottom: 10px; font-style: normal; }

        .premium-box { background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728) !important; border: none !important; position: relative; overflow: hidden; box-shadow: 0 5px 20px rgba(184, 134, 11, 0.4) !important; }
        .premium-box span, .premium-box i { color: #5d4037 !important; font-weight: 800 !important; }
        .premium-box::after { content: ''; position: absolute; top: -50%; left: -150%; width: 200%; height: 200%; background: linear-gradient(45deg, transparent, rgba(255,255,255,0.4), transparent); transform: rotate(45deg); animation: shine 3s infinite; }
        @keyframes shine { 0% { left: -150%; } 100% { left: 150%; } }

        /* --- MODAL (PROFIL) --- */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(10px); }
        .modal-content { background: #021d33; padding: 30px; border-radius: 35px; width: 90%; max-width: 380px; text-align: center; border: 1px solid rgba(255,255,255,0.1); position: relative; }
        .btn-main { width: 100%; padding: 16px; background: #00d2ff; border: none; border-radius: 15px; color: #fff; font-weight: 800; cursor: pointer; margin-bottom: 10px; }
        
        #toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: #fff; color: #005c97; padding: 15px 30px; border-radius: 50px; transition: 0.5s; z-index: 3000; font-weight: 700; box-shadow: 0 10px 30px rgba(0,0,0,0.3); text-align: center; width: max-content; max-width: 90%; }
        #toast.show { bottom: 40px; }
    </style>
</head>
<body>

    <div class="light-rays"></div>
    <div class="water-overlay"></div>
    <div class="bubbles" id="bubble-container"></div>

    <header class="header">
        <div class="bell-btn" onclick="navigate('messages.html', 'Xabarnomalar...')">🔔</div>
        <div class="top-profile-container" onclick="toggleModal(true)">
            <span id="top-name" style="font-weight: 600; font-size: 14px;">...</span>
            <div style="width: 32px; height: 32px; background: #00d2ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; color: #fff;" id="top-initials">?</div>
        </div>
    </header>

    <div class="main-content">
        <div class="balance-card">
            <h3 style="font-size: 12px; text-transform: uppercase; opacity: 0.7; letter-spacing: 1px;">Balansim</h3>
            <h1 id="user-balance">0 so'm</h1>
            <a href="billing.html" onclick="showToast('Hamyon bo\'limi yuklanmoqda...')" class="btn-refill">To'ldirish 💳</a>
        </div>

        <div class="grid-menu">
            <div class="menu-item" onclick="startQuiz('free')"><i>🎁</i><span>Bepul Test</span></div>
            <div class="menu-item premium-box" onclick="startQuiz('premium')"><i>💎</i><span>Premium (1000)</span></div>
            <div class="menu-item" onclick="navigate('statistics.html', 'Statistika...')"><i>📊</i><span>Statistika</span></div>
            <div class="menu-item" onclick="navigate('leaderboard.html', 'Liderlar...')"><i>🏆</i><span>Liderlar</span></div>
            <div class="menu-item" style="grid-column: span 2; background: rgba(0, 136, 204, 0.2); border-color: #0088cc;" onclick="contactSupport()">
                <i style="color: #00d2ff;">✈️</i><span>Telegram Admin</span>
            </div>
        </div>
    </div>

    <div id="profileModal" class="modal">
        <div class="modal-content">
            <div id="user-id-display" style="background: #ffd700; color: #000; padding: 5px 15px; border-radius: 10px; font-weight: 800; display: inline-block; margin-bottom: 20px;">ID: yuklanmoqda...</div>
            <input type="text" id="input-name" style="width: 100%; padding: 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; color: white; margin-bottom: 15px; text-align: center; font-weight: 600;" placeholder="Ismingiz">
            <button class="btn-main" onclick="updateName()">SAQLASH</button>
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <button class="btn-main" style="background: rgba(255,255,255,0.1);" onclick="navigate('results.html', 'Tarix yuklanmoqda...')">📜 Tarix</button>
                <button class="btn-main" style="background: rgba(255,255,255,0.1);" onclick="navigate('payments.html', 'To\'lovlar yuklanmoqda...')">💸 To'lovlar</button>
            </div>
            <button class="btn-main" style="background: transparent; border: 1px solid #ff4b2b; color: #ff4b2b;" id="logout-btn">Tizimdan chiqish</button>
            <p onclick="toggleModal(false)" style="margin-top:15px; cursor:pointer; font-size:12px; opacity:0.5;">Yopish</p>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        const container = document.getElementById('bubble-container');
        for (let i = 0; i < 15; i++) {
            const b = document.createElement('div');
            b.className = 'bubble';
            const size = Math.random() * 20 + 5 + 'px';
            b.style.width = size; b.style.height = size;
            b.style.left = Math.random() * 100 + '%';
            b.style.setProperty('--d', Math.random() * 5 + 3 + 's');
            b.style.animationDelay = Math.random() * 5 + 's';
            container.appendChild(b);
        }
        window.toggleModal = (s) => {
            document.getElementById('profileModal').style.display = s ? 'flex' : 'none';
        };
        window.showToast = (txt) => { 
            const t = document.getElementById('toast'); 
            t.innerText = txt; 
            t.classList.add('show'); 
            setTimeout(() => t.classList.remove('show'), 2500); 
        };
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
            authDomain: "quiz-app-3692d.firebaseapp.com",
            projectId: "quiz-app-3692d",
            storageBucket: "quiz-app-3692d.firebasestorage.app",
            messagingSenderId: "526836020845",
            appId: "1:526836020845:android:3ea991380c104c75e8b164"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let userBalance = 0;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                onSnapshot(doc(db, "users", user.uid), (snap) => {
                    const data = snap.data() || {};
                    userBalance = data.balance || 0;
                    document.getElementById('user-balance').innerText = userBalance.toLocaleString() + " so'm";
                    document.getElementById('top-name').innerText = data.fio || "Foydalanuvchi";
                    document.getElementById('top-initials').innerText = (data.fio || "U")[0].toUpperCase();
                    
                    // ID ishlamayotgan edi, mana shu qismda ID ni studentID dan oladi
                    document.getElementById('user-id-display').innerText = "ID: " + (data.studentID || "Mavjud emas");
                    document.getElementById('input-name').value = data.fio || "";
                }, (error) => {
                    showToast("Ma'lumot olishda xatolik! ⚠️");
                });
            } else { 
                location.replace("index.html"); 
            }
        });

        window.updateName = async () => {
            const name = document.getElementById('input-name').value;
            if(!name) return showToast("Ismni kiriting! ✍️");
            try {
                await updateDoc(doc(db, "users", auth.currentUser.uid), { fio: name });
                showToast("Muvaffaqiyatli saqlandi! ✅");
                toggleModal(false);
            } catch (e) {
                showToast("Saqlashda xatolik yuz berdi!");
            }
        };

        document.getElementById('logout-btn').onclick = () => {
            if(confirm("Tizimdan chiqmoqchimisiz? 🚪")) {
                showToast("Xayr, sog' bo'ling! 👋");
                setTimeout(() => signOut(auth), 1000);
            }
        };

        window.startQuiz = async (type) => {
            if(type === 'premium') {
                if(userBalance < 1000) {
                    showToast("Mablag' yetarli emas! 💳");
                    setTimeout(() => location.href = 'billing.html', 1500);
                } else {
                    try {
                        await updateDoc(doc(db, "users", auth.currentUser.uid), { balance: increment(-1000) });
                        showToast("Premium test boshlandi! (-1000 so'm) 💎");
                        setTimeout(() => location.href = 'premium-quiz.html', 1200);
                    } catch (e) {
                        showToast("Xatolik: Balansni kamaytirib bo'lmadi.");
                    }
                }
            } else { 
                showToast("Bepul test yuklanmoqda... 🎁");
                setTimeout(() => location.href = 'quiz.html', 800); 
            }
        };

        window.navigate = (url, msg) => { 
            showToast(msg); 
            setTimeout(() => location.href = url, 800); 
        };

        window.contactSupport = () => {
            showToast("Telegram admin bilan bog'lanish... ✈️");
            setTimeout(() => window.open("https://t.me/dr_rahmonov_admin", "_blank"), 500);
        };
    </script>
</body>
</html>
