<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr. Rahmonov</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}
body{background:#0f2027;color:#fff}

/* HEADER */
.header{
position:fixed;top:0;width:100%;
display:flex;justify-content:space-between;
padding:15px;background:#0f2027;z-index:1000;
}

.top-profile-container{
display:flex;gap:10px;background:#ffffff10;
padding:5px 12px;border-radius:50px;cursor:pointer;
}

.mini-avatar{
width:32px;height:32px;background:#00d2ff;
border-radius:50%;display:flex;align-items:center;justify-content:center;
}

/* CONTENT */
.main-content{padding:90px 20px}

.balance-card{
background:linear-gradient(135deg,#00d2ff,#3a7bd5);
padding:20px;border-radius:20px;margin-bottom:20px;
}

.grid-menu{
display:grid;grid-template-columns:1fr 1fr;gap:15px;
}

.menu-item{
background:#ffffff10;padding:20px;border-radius:20px;
text-align:center;cursor:pointer;
}

.menu-item:active{transform:scale(0.95)}

/* MODAL */
.modal{
display:none;position:fixed;top:0;left:0;width:100%;height:100%;
background:#000000cc;justify-content:center;align-items:center;
}

.modal-content{
background:#1a2a33;padding:20px;border-radius:20px;width:90%;
text-align:center;
}

.edit-input{
width:100%;padding:10px;margin:10px 0;background:#ffffff10;
border:none;color:white;border-radius:10px;
}

.btn{
width:100%;padding:10px;margin-top:10px;border:none;
border-radius:10px;cursor:pointer;
}

.blue{background:#00d2ff;color:white}
.red{background:#ff4b2b;color:white}
.gray{background:#333;color:white}

/* ANIMATION */
@keyframes bounce{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

/* TOAST */
#toast{
position:fixed;bottom:-100px;left:50%;
transform:translateX(-50%);
background:#ffd700;color:#000;
padding:10px 20px;border-radius:50px;
transition:0.5s;
}
#toast.show{bottom:40px}
</style>
</head>

<body>

<!-- HEADER -->
<header class="header">
<div onclick="location.href='messages.html'">🔔</div>

<div class="top-profile-container" onclick="toggleModal(true)">
<span id="top-name">...</span>
<div class="mini-avatar" id="top-initials">?</div>
</div>
</header>

<!-- CONTENT -->
<div class="main-content">

<div class="balance-card">
<h3>Balans</h3>
<h1 id="user-balance">0 so'm</h1>
</div>

<div class="grid-menu">
<div class="menu-item" onclick="startQuiz('free')" id="A1b2C3">🎁 Bepul</div>
<div class="menu-item" onclick="startQuiz('paid')" id="D4e5F6">💎 Premium</div>
<div class="menu-item" onclick="location.href='messages.html'" id="G7h8I9">✉️ Xabarlar</div>
<div class="menu-item" onclick="openStats()" id="J1k2L3">📊 Statistika</div>
</div>

</div>

<!-- TOAST -->
<div id="toast">Xabar</div>

<!-- PROFILE -->
<div id="profileModal" class="modal">
<div class="modal-content">

<div style="font-size:50px;animation:bounce 1.5s infinite;">👨‍⚕️</div>

<h3>Profil</h3>
<p id="user-email" style="opacity:0.6;font-size:13px;"></p>

<input id="input-name" class="edit-input" placeholder="Ism">

<button class="btn blue" onclick="updateName()" id="P7q8R9">Saqlash</button>

<button class="btn blue" onclick="openPayments()" id="S1t2U3">💳 To‘lovlar</button>

<button class="btn blue" onclick="openResults()" id="V4w5X6">📈 Natijalar</button>

<button class="btn red" onclick="logout()" id="Y7z8A9">Chiqish</button>

<button class="btn gray" onclick="toggleModal(false)">Yopish</button>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth,onAuthStateChanged,signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getFirestore,doc,getDoc,updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSy...",
authDomain:"quiz-app-3692d.firebaseapp.com",
projectId:"quiz-app-3692d"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

let currentUser=null;

onAuthStateChanged(auth,async(user)=>{
if(user){
currentUser=user;

document.getElementById("user-email").innerText=user.email;

const snap=await getDoc(doc(db,"users",user.uid));

if(snap.exists()){
const d=snap.data();

topName.innerText=d.fio||"User";
topInitials.innerText=(d.fio||"U")[0];
userBalance.innerText=(d.balance||0)+" so'm";
inputName.value=d.fio||"";
}
}else{
location.href="index.html";
}
});

window.toggleModal=(s)=>{
profileModal.style.display=s?"flex":"none";
}

window.showToast=(t)=>{
toast.innerText=t;
toast.classList.add("show");
setTimeout(()=>toast.classList.remove("show"),3000);
}

window.startQuiz=(t)=>{
if(t==="free"){
location.href="quiz.html";
}else{
showToast("Premium tez orada");
}
}

window.openStats=()=>{
showToast("Statistika...");
}

window.openPayments=()=>{
showToast("To‘lovlar...");
}

window.openResults=()=>{
showToast("Natijalar...");
}

window.updateName=async()=>{
const name=inputName.value;
if(!name)return;

await updateDoc(doc(db,"users",currentUser.uid),{fio:name});
showToast("Saqlandi");
setTimeout(()=>location.reload(),1000);
}

window.logout=async()=>{
await signOut(auth);
location.href="index.html";
}
</script>

</body>
    </html>
