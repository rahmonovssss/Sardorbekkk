<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Liderlar - Dr. Rahmonov</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #09111e; color: #f1f5f9; padding: 20px; min-height: 100vh; }

        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; padding-top: 10px; }
        .back-btn { text-decoration: none; font-size: 20px; color: #f1f5f9; background: #1e293b; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 1px solid rgba(255,255,255,0.05); }
        .header h2 { font-size: 20px; font-weight: 600; flex-grow: 1; text-align: center; margin-right: 42px; }

        .podium { display: flex; justify-content: center; align-items: flex-end; gap: 10px; margin: 30px 0 20px 0; }
        .podium-user { display: flex; flex-direction: column; align-items: center; width: 30%; position: relative; }
        .podium-avatar { width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; position: relative; box-shadow: 0 8px 20px rgba(0,0,0,0.4); font-size: 20px; }
        .podium-name { font-size: 11px; font-weight: 600; margin-top: 8px; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: center; }
        .podium-pts { font-size: 11px; font-weight: 700; color: #38bdf8; }

        .leader-list { background: #1e293b; border-radius: 24px; padding: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .leader-row { display: flex; align-items: center; padding: 14px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .rank { width: 35px; font-weight: 700; font-size: 15px; }
        .user-info { flex-grow: 1; }
        .user-info .name { font-size: 14px; font-weight: 600; color: #fff; display: block; }
        .user-info .id-badge { font-size: 11px; color: #64748b; }
        .pts { font-weight: 700; font-size: 14px; color: #38bdf8; }

        /* Ranglar */
        .rank-1-3 { color: #f1f5f9; }
        .rank-4-10 { color: #34d399 !important; } /* Yashil */
        .rank-11-20 { color: #fbbf24 !important; } /* Sariq */
    </style>
</head>
<body>

    <div class="header">
        <a href="home.html" class="back-btn">⬅️</a> 
        <h2>TOP 20</h2>
    </div>

    <div class="podium" id="podium-container"></div>
    <div class="leader-list" id="leader-board"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
            authDomain: "quiz-app-3692d.firebaseapp.com",
            projectId: "quiz-app-3692d",
            storageBucket: "quiz-app-3692d.firebasestorage.app",
            messagingSenderId: "526836020845",
            appId: "1:526836020845:android:3ea991380c104c75e8b164"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        onSnapshot(collection(db, "users"), (snapshot) => {
            let users = [];
            snapshot.forEach((doc) => {
                const data = doc.data();
                let totalScore = 0;
                
                // Rasmga ko'ra 'subjects' map ichidagi 'score'larni yig'amiz
                if (data.subjects) {
                    for (let key in data.subjects) {
                        totalScore += Number(data.subjects[key].score || 0);
                    }
                }
                
                users.push({
                    name: data.studentName || "Nomsiz",
                    id: data.studentID || "ID yo'q",
                    points: totalScore
                });
            });

            // Ball bo'yicha saralash
            users.sort((a, b) => b.points - a.points);
            const top20 = users.slice(0, 20);

            const podium = document.getElementById('podium-container');
            const list = document.getElementById('leader-board');
            podium.innerHTML = "";
            list.innerHTML = "";

            top20.forEach((user, index) => {
                const rank = index + 1;
                const pointsFormatted = user.points.toFixed(1);

                if (rank <= 3) {
                    const colors = ['#f59e0b', '#94a3b8', '#b45309'];
                    podium.innerHTML += `
                        <div class="podium-user">
                            <div class="podium-avatar" style="background:${colors[rank-1]}">${user.name.charAt(0)}</div>
                            <span class="podium-name">${user.name}</span>
                            <span class="podium-pts">${pointsFormatted} ball</span>
                        </div>`;
                } else {
                    // 4-10 yashil, 11-20 sariq rangda
                    const rankClass = rank <= 10 ? 'rank-4-10' : 'rank-11-20';
                    list.innerHTML += `
                        <div class="leader-row">
                            <div class="rank ${rankClass}">#${rank}</div>
                            <div class="user-info">
                                <span class="name">${user.name}</span>
                                <span class="id-badge">ID: ${user.id}</span>
                            </div>
                            <div class="pts">${pointsFormatted} ball</div>
                        </div>`;
                }
            });
        });
    </script>
</body>
</html>
