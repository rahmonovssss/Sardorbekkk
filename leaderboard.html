<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Liderlar - Dr. Rahmonov</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #09111e; color: #f1f5f9; padding: 20px; min-height: 100vh; }

        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; padding-top: 10px; }
        .back-btn { text-decoration: none; font-size: 20px; color: #f1f5f9; background: #1e293b; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 1px solid rgba(255,255,255,0.05); }
        .header h2 { font-size: 20px; font-weight: 600; flex-grow: 1; text-align: center; margin-right: 42px; }

        .podium { display: flex; justify-content: center; align-items: flex-end; gap: 8px; margin: 40px 0 30px 0; }
        .podium-user { display: flex; flex-direction: column; align-items: center; width: 32%; position: relative; }
        .crown { font-size: 20px; margin-bottom: 5px; }
        .podium-avatar { width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; position: relative; box-shadow: 0 8px 20px rgba(0,0,0,0.4); font-size: 24px; margin-bottom: 10px; }
        .podium-name { font-size: 12px; font-weight: 600; text-align: center; line-height: 1.3; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .podium-id { font-size: 10px; color: #64748b; margin-top: 5px; }
        .podium-pts { font-size: 11px; font-weight: 700; color: #38bdf8; margin-top: 2px; }

        .leader-list { background: #1e293b; border-radius: 24px; padding: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .leader-row { display: flex; align-items: center; padding: 15px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .rank { width: 40px; font-weight: 700; font-size: 16px; color: #94a3b8; }
        .user-info { flex-grow: 1; }
        .user-info .name { font-size: 14px; font-weight: 600; color: #fff; display: block; }
        .user-info .id-badge { font-size: 11px; color: #64748b; }
        .pts { font-weight: 700; font-size: 14px; color: #38bdf8; }
    </style>
</head>
<body>

    <div class="header">
        <a href="home.html" class="back-btn">⬅️</a> 
        <h2>TOP 20</h2>
    </div>

    <div class="podium" id="podium-container"></div>
    <div class="leader-list" id="leader-board"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
            authDomain: "quiz-app-3692d.firebaseapp.com",
            projectId: "quiz-app-3692d",
            storageBucket: "quiz-app-3692d.firebasestorage.app",
            messagingSenderId: "526836020845",
            appId: "1:526836020845:android:3ea991380c104c75e8b164"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        onSnapshot(collection(db, "premium_results"), (resSnapshot) => {
            onSnapshot(collection(db, "users"), (userSnapshot) => {
                
                let usersMap = {};
                userSnapshot.forEach(doc => {
                    usersMap[doc.id] = doc.data();
                });

                const uniqueResults = {};
                resSnapshot.forEach((doc) => {
                    const res = doc.data();
                    if (!uniqueResults[res.studentID] || uniqueResults[res.studentID].totalScore < res.totalScore) {
                        uniqueResults[res.studentID] = res;
                    }
                });

                const top20 = Object.values(uniqueResults)
                    .sort((a, b) => b.totalScore - a.totalScore)
                    .slice(0, 20);

                const podium = document.getElementById('podium-container');
                const list = document.getElementById('leader-board');
                podium.innerHTML = "";
                list.innerHTML = "";

                top20.forEach((user, index) => {
                    const rank = index + 1;
                    const pointsFormatted = Number(user.totalScore || 0).toFixed(1);
                    
                    const userData = usersMap[user.studentID] || {};
                    // 'fio' maydonini ishlatamiz
                    const currentName = userData.fio || user.studentName;
                    const currentID = userData.studentID || "---";
                    
                    const nameParts = currentName.split(' ').map(part => `<span>${part}</span>`).join('');

                    if (rank <= 3) {
                        const crowns = ['👑', '🥈', '🥉'];
                        const colors = ['#f59e0b', '#a1a1aa', '#b45309'];
                        podium.innerHTML += `
                            <div class="podium-user">
                                <div class="crown">${crowns[rank-1]}</div>
                                <div class="podium-avatar" style="background:${colors[rank-1]}">${rank}</div>
                                <div class="podium-name">${nameParts}</div>
                                <div class="podium-id">ID: ${currentID}</div>
                                <div class="podium-pts">${pointsFormatted} ball</div>
                            </div>`;
                    } else {
                        list.innerHTML += `
                            <div class="leader-row">
                                <div class="rank">${rank}</div>
                                <div class="user-info">
                                    <span class="name">${currentName}</span>
                                    <span class="id-badge">ID: ${currentID}</span>
                                </div>
                                <div class="pts">${pointsFormatted} ball</div>
                            </div>`;
                    }
                });
            });
        });
    </script>
</body>
</html>
