<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dr. Rahmonov - Pul Yechish</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: linear-gradient(180deg, #005c97 0%, #363795 100%); 
            color: white; 
            overflow-x: hidden; 
            min-height: 100vh;
            position: relative;
        }

        .water-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://www.transparenttextures.com/patterns/cubes.png'); opacity: 0.1; pointer-events: none; z-index: 1; }
        .light-rays { position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.15) 0%, transparent 50%); z-index: 0; pointer-events: none; }

        .header { position: fixed; top: 0; left: 0; width: 100%; padding: 15px 20px; display: flex; align-items: center; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .btn-back { background: rgba(255,255,255,0.15); border: none; padding: 8px 15px; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; text-decoration: none; font-size: 14px; transition: 0.2s; }

        .main-content { position: relative; z-index: 10; padding: 100px 20px 30px; max-width: 600px; margin: 0 auto; text-align: center; }
        .withdraw-card { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(15px); padding: 30px 25px; border-radius: 30px; margin-bottom: 20px; text-align: left; border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
        
        .balance-display { font-size: 24px; font-weight: 800; color: #00d2ff; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
        
        .input-group { margin-bottom: 18px; }
        .input-group label { display: block; font-size: 11px; text-transform: uppercase; opacity: 0.8; margin-bottom: 6px; font-weight: 700; color: #00d2ff; }
        .input-group input, .input-group select { width: 100%; padding: 15px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; color: white; font-weight: 600; outline: none; font-size: 16px; }
        
        .input-error { border-color: #ff416c !important; color: #ff416c !important; }

        .btn-submit { width: 100%; padding: 16px; background: linear-gradient(135deg, #ff4b2b 0%, #ff416c 100%); border: none; border-radius: 16px; color: #fff; font-weight: 800; cursor: pointer; font-size: 15px; box-shadow: 0 5px 20px rgba(255,75,43,0.4); }

        .channel-card { background: linear-gradient(135deg, rgba(0,136,204,0.15) 0%, rgba(0,210,255,0.05) 100%); border: 1px solid rgba(0,136,204,0.3); padding: 20px; border-radius: 25px; text-align: center; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 10px; }
        
        #toast { visibility: hidden; min-width: 250px; background-color: #fff; color: #005c97; text-align: center; border-radius: 50px; padding: 16px; position: fixed; z-index: 3000; left: 50%; bottom: 30px; transform: translateX(-50%); font-weight: 700; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 40px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 40px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>

    <div class="light-rays"></div>
    <div class="water-overlay"></div>

    <header class="header">
        <a href="javascript:history.back()" class="btn-back">⬅️ Orqaga</a>
        <h2 style="font-size: 16px; margin-left: 15px; font-weight: 600;">Pul yechish</h2>
    </header>

    <div class="main-content">
        <div class="withdraw-card">
            <div class="balance-display">
                <span style="font-size: 13px; font-weight: 400; color: rgba(255,255,255,0.7); display: block; margin-bottom: 2px;">Sizning balansingiz:</span>
                <span id="current-balance">yuklanmoqda...</span>
            </div>

            <div class="input-group">
                <label>Karta turi</label>
                <select id="card-type" onchange="handleCardTypeChange()">
                    <option value="Uzcard">Uzcard 💳</option>
                    <option value="Humo">Humo 💳</option>
                </select>
            </div>

            <div class="input-group">
                <label>Karta raqami</label>
                <input type="text" id="card-number" placeholder="8600 ...." maxlength="19">
            </div>

            <div class="input-group">
                <label>Karta egasining ismi</label>
                <input type="text" id="card-holder" placeholder="F.I.O" oninput="validateName(this)">
            </div>

            <div class="input-group">
                <label>Yechish summasi (so'm)</label>
                <input type="text" id="withdraw-amount" placeholder="Minimal 10,000" oninput="validateAmount(this)">
            </div>

            <button class="btn-submit" id="btn-withdraw-submit">SO'ROV YUBORISH 💸</button>
        </div>

        <div class="channel-card" onclick="window.location.href='https://telegram.me/KimyoBiologiya_007'">
            <i>📢</i><span>TO'LOVLAR KANALI (ISBOTLAR)</span>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        const cardInput = document.getElementById('card-number');
        const cardSelect = document.getElementById('card-type');
        const toast = document.getElementById('toast');

        function showToast(txt) {
            toast.innerText = txt;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function validateName(el) {
            el.value = el.value.replace(/[^A-Za-zА-Яа-яЁёЎўҚқҒғҲҳ \s]/g, '').replace(/\s+/g, ' ');
            const parts = el.value.trim().split(' ');
            if (parts.length > 3) el.value = parts.slice(0, 3).join(' ');
        }

        function validateAmount(el) {
            el.value = el.value.replace(/[^0-9]/g, '');
            el.classList.toggle('input-error', el.value !== "" && parseInt(el.value) < 10000);
        }

        function handleCardTypeChange() {
            const prefix = (cardSelect.value === 'Uzcard') ? '8600' : '9860';
            const remaining = cardInput.value.replace(/\s/g, '').substring(4);
            cardInput.value = prefix + (remaining ? ' ' + remaining : '');
            cardInput.focus();
        }

        cardInput.addEventListener('keydown', (e) => {
            if ((e.key === 'Backspace' || e.key === 'Delete') && cardInput.selectionStart <= 5) e.preventDefault();
        });

        cardInput.addEventListener('input', (e) => {
            let val = e.target.value.replace(/\s/g, '');
            const prefix = (cardSelect.value === 'Uzcard') ? '8600' : '9860';
            if (!val.startsWith(prefix)) val = prefix + val.substring(4);
            if (val.length > 16) val = val.substring(0, 16);
            let fmt = '';
            for (let i = 0; i < val.length; i++) {
                if (i > 0 && i % 4 === 0) fmt += ' ';
                fmt += val[i];
            }
            cardInput.value = fmt;
            cardInput.classList.toggle('input-error', val.length !== 16);
        });

        window.addEventListener('DOMContentLoaded', () => { cardInput.value = '8600 '; });
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, updateDoc, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
            authDomain: "quiz-app-3692d.firebaseapp.com",
            projectId: "quiz-app-3692d",
            storageBucket: "quiz-app-3692d.firebasestorage.app",
            messagingSenderId: "526836020845",
            appId: "1:526836020845:android:3ea991380c104c75e8b164"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let profileData = {};

        auth.onAuthStateChanged((user) => {
            if (!user) return window.location.replace("index.html");
            const userRef = doc(db, "users", user.uid);
            onSnapshot(userRef, (snap) => {
                if (snap.exists()) {
                    profileData = snap.data();
                    document.getElementById('current-balance').innerText = Number(profileData.balance || 0).toLocaleString() + " so'm";
                }
            });

            document.getElementById('btn-withdraw-submit').onclick = async () => {
                const cardNum = document.getElementById('card-number').value.replace(/\s/g, '');
                const holder = document.getElementById('card-holder').value.trim();
                const amt = parseInt(document.getElementById('withdraw-amount').value);
                const cardType = document.getElementById('card-type').value;

                if (!cardNum || cardNum.length !== 16 || !holder || !amt || amt < 10000 || amt > (profileData.balance || 0)) {
                    showToast("Barcha ma'lumotlarni to'liq kiritganingizga ishonch hosil qiling!");
                    return;
                }

                try {
                    document.getElementById('btn-withdraw-submit').disabled = true;
                    const hozir = new Date();
                    await updateDoc(userRef, { balance: Number(profileData.balance) - amt });
                    
                    const requestData = {
                        uid: user.uid,
                        userFio: profileData.fio || "N/A",
                        studentID: profileData.studentID || "N/A",
                        cardType: cardType,
                        cardNumber: document.getElementById('card-number').value,
                        cardHolder: holder,
                        amount: amt,
                        status: "Kutilmoqda",
                        sana: hozir.toLocaleDateString('uz-UZ'),
                        vaqt: hozir.toLocaleTimeString('uz-UZ'),
                        createdAt: serverTimestamp()
                    };

                    await addDoc(collection(db, "withdraw_requests"), requestData);

                    const caption = `💰 YECHISH: ${amt.toLocaleString()} so'm\n👤 Ism: ${requestData.userFio}\n🆔 ID: ${requestData.studentID}\n💳 Karta: ${cardType} (${requestData.cardNumber})\n👤 Ega: ${holder}\n📅 ${requestData.sana} | ${requestData.vaqt}`;
                    await fetch(`https://api.telegram.org/bot5714791266:AAEpc1YGClxn0e5u9BReEsiWrr66APqSYbk/sendMessage?chat_id=5769394153&text=${encodeURIComponent(caption)}`);

                    showToast("So'rov yuborildi!");
                    setTimeout(() => window.location.href = 'payments.html', 2000);
                } catch (e) {
                    showToast("Xatolik yuz berdi!");
                    document.getElementById('btn-withdraw-submit').disabled = false;
                }
            };
        });
    </script>
</body>
</html>
