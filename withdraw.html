<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dr. Rahmonov - Pul Yechish</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: linear-gradient(180deg, #005c97 0%, #363795 100%); 
            color: white; 
            overflow-x: hidden; 
            min-height: 100vh;
            position: relative;
        }

        /* --- SUV EFFEKTLARI --- */
        .water-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://www.transparenttextures.com/patterns/cubes.png'); opacity: 0.1; pointer-events: none; z-index: 1; }
        .light-rays { position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.15) 0%, transparent 50%); z-index: 0; pointer-events: none; }

        /* --- HEADER --- */
        .header { position: fixed; top: 0; left: 0; width: 100%; padding: 15px 20px; display: flex; align-items: center; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .btn-back { background: rgba(255,255,255,0.15); border: none; padding: 8px 15px; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; text-decoration: none; font-size: 14px; transition: 0.2s; }
        .btn-back:active { background: rgba(255,255,255,0.3); }

        /* --- MAIN CONTENT --- */
        .main-content { position: relative; z-index: 10; padding: 100px 20px 30px; max-width: 600px; margin: 0 auto; text-align: center; }
        .withdraw-card { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(15px); padding: 30px 25px; border-radius: 30px; margin-bottom: 20px; text-align: left; border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
        
        .balance-display { font-size: 24px; font-weight: 800; color: #00d2ff; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; text-shadow: 0 0 10px rgba(0,210,255,0.3); }
        
        .input-group { margin-bottom: 18px; }
        .input-group label { display: block; font-size: 11px; text-transform: uppercase; opacity: 0.8; margin-bottom: 6px; font-weight: 700; letter-spacing: 1px; color: #00d2ff; }
        .input-group input, .input-group select { width: 100%; padding: 15px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; color: white; font-weight: 600; outline: none; font-size: 16px; transition: 0.3s; }
        .input-group input:focus, .input-group select:focus { border-color: #00d2ff; background: rgba(255,255,255,0.1); box-shadow: 0 0 10px rgba(0,210,255,0.2); }
        .input-group input::placeholder { color: rgba(255,255,255,0.35); }
        .input-group select option { background: #021d33; color: white; }

        /* --- TUGMALAR --- */
        .btn-submit { width: 100%; padding: 16px; background: linear-gradient(135deg, #ff4b2b 0%, #ff416c 100%); border: none; border-radius: 16px; color: #fff; font-weight: 800; cursor: pointer; font-size: 15px; letter-spacing: 0.5px; box-shadow: 0 5px 20px rgba(255,75,43,0.4); transition: 0.3s; }
        .btn-submit:active { transform: scale(0.97); filter: brightness(0.9); }

        .channel-card { background: linear-gradient(135deg, rgba(0,136,204,0.15) 0%, rgba(0,210,255,0.05) 100%); border: 1px solid rgba(0,136,204,0.3); padding: 20px; border-radius: 25px; text-align: center; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .channel-card:active { transform: scale(0.97); background: rgba(0,136,204,0.25); }
        .channel-card i { font-size: 26px; font-style: normal; }
        .channel-card span { font-weight: 700; font-size: 14px; letter-spacing: 0.5px; }

        #toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: #fff; color: #005c97; padding: 15px 30px; border-radius: 50px; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 3000; font-weight: 700; box-shadow: 0 10px 30px rgba(0,0,0,0.3); text-align: center; width: max-content; max-width: 90%; }
        #toast.show { bottom: 40px; }
    </style>
</head>
<body>

    <div class="light-rays"></div>
    <div class="water-overlay"></div>

    <header class="header">
        <a href="javascript:history.back()" class="btn-back">⬅️ Orqaga</a>
        <h2 style="font-size: 16px; margin-left: 15px; font-weight: 600; letter-spacing: 0.5px;">Pul yechish</h2>
    </header>

    <div class="main-content">
        <div class="withdraw-card">
            <div class="balance-display">
                <span style="font-size: 13px; font-weight: 400; color: rgba(255,255,255,0.7); display: block; margin-bottom: 2px;">Sizning balansingiz:</span>
                <span id="current-balance">yuklanmoqda...</span>
            </div>

            <div class="input-group">
                <label>Karta turi</label>
                <select id="card-type" onchange="handleCardTypeChange()">
                    <option value="Uzcard">Uzcard (8600)</option>
                    <option value="Humo">Humo (9860)</option>
                </select>
            </div>

            <div class="input-group">
                <label>Karta raqami</label>
                <input type="text" id="card-number" placeholder="8600 ...." maxlength="19">
            </div>

            <div class="input-group">
                <label>Karta egasining ismi</label>
                <input type="text" id="card-holder" placeholder="F.I.O (Kattalarda)">
            </div>

            <div class="input-group">
                <label>Yechish summasi (so'm)</label>
                <input type="text" id="withdraw-amount" placeholder="Minimal 10,000" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
            </div>

            <button class="btn-submit" id="btn-withdraw-submit">SO'ROV YUBORISH 💸</button>
        </div>

        <!-- TELEGRAM TO'LOVLAR KANALI TUGMASI -->
        <div class="channel-card" onclick="openPaymentChannel()">
            <i>📢</i>
            <span>TO'LOVLAR KANALI (ISBOTLAR)</span>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        const cardInput = document.getElementById('card-number');
        const cardSelect = document.getElementById('card-type');

        // Karta turi o'zgarganda avtomatik prefiks qo'yish
        function handleCardTypeChange() {
            if (cardSelect.value === 'Uzcard') {
                cardInput.value = '8600 ';
            } else if (cardSelect.value === 'Humo') {
                cardInput.value = '9860 ';
            }
            cardInput.focus();
        }

        // Dastlabki yuklanganda Uzcard prefiksini o'rnatish
        window.addEventListener('DOMContentLoaded', () => {
            cardInput.value = '8600 ';
        });

        // Karta raqamini har 4 ta sondan keyin chiroyli formatlash
        cardInput.addEventListener('input', (e) => {
            let target = e.target;
            let position = target.selectionEnd;
            let length = target.value.length;
            
            let value = target.value.replace(/[^0-9]/g, '');
            let formatted = '';
            
            for (let i = 0; i < value.length; i++) {
                if (i > 0 && i % 4 === 0) {
                    formatted += ' ';
                }
                formatted += value[i];
            }
            
            target.value = formatted;
            
            // Kursorni joyini to'g'irlash
            if (position !== length) {
                target.setSelectionRange(position, position);
            }
        });

        // Telegram kanalga o'tish funksiyasi
        function openPaymentChannel() {
            const t = document.getElementById('toast'); 
            t.innerText = "To'lovlar kanaliga o'tilmoqda..."; 
            t.classList.add('show'); 
            setTimeout(() => {
                t.classList.remove('show');
                window.open("https://t.me/dr_rahmonov_payments", "_blank"); // Kanal silkangizni shu yerga yozasiz
            }, 600);
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, updateDoc, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
            authDomain: "quiz-app-3692d.firebaseapp.com",
            projectId: "quiz-app-3692d",
            storageBucket: "quiz-app-3692d.firebasestorage.app",
            messagingSenderId: "526836020845",
            appId: "1:526836020845:android:3ea991380c104c75e8b164"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentBalance = 0;
        let userFio = "";
        let studentID = "";

        const toastElement = document.getElementById('toast');
        function showToast(txt) { 
            toastElement.innerText = txt; 
            toastElement.classList.add('show'); 
            setTimeout(() => toastElement.classList.remove('show'), 2500); 
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                const userRef = doc(db, "users", user.uid);
                
                onSnapshot(userRef, (snap) => {
                    if (snap.exists()) {
                        const data = snap.data();
                        currentBalance = Number(data.balance || 0);
                        userFio = data.fio || "Foydalanuvchi";
                        studentID = data.studentID || "Yo'q";
                        
                        document.getElementById('current-balance').innerText = currentBalance.toLocaleString() + " so'm";
                    }
                });

                document.getElementById('btn-withdraw-submit').onclick = async () => {
                    const cardType = document.getElementById('card-type').value;
                    // Joy tashlangan chiziqlarni tozalab faqat raqamni tekshiramiz
                    const rawCardNumber = cardInput.value.replace(/\s/g, '');
                    const cardHolder = document.getElementById('card-holder').value.trim();
                    const amountInput = document.getElementById('withdraw-amount').value;
                    const amount = parseInt(amountInput);

                    if (!rawCardNumber || rawCardNumber.length !== 16) {
                        return showToast("Karta raqamini to'liq kiriting (16 ta raqam)! 💳");
                    }
                    if (!cardHolder) {
                        return showToast("Karta egasining ismini kiriting! ✍️");
                    }
                    if (!amount || amount < 10000) {
                        return showToast("Minimal yechish summasi 10,000 so'm! 💰");
                    }
                    if (amount > currentBalance) {
                        return showToast("Balansingizda mablag' yetarli emas! ❌");
                    }

                    try {
                        document.getElementById('btn-withdraw-submit').disabled = true;
                        document.getElementById('btn-withdraw-submit').innerText = "YUBORILMOQDA...";

                        const newBalance = currentBalance - amount;
                        await updateDoc(userRef, { balance: newBalance });

                        await addDoc(collection(db, "withdraw_requests"), {
                            uid: user.uid,
                            studentID: studentID,
                            userFio: userFio,
                            cardType: cardType,
                            cardNumber: cardInput.value, // Formatlangan holda saqlaydi
                            cardHolder: cardHolder,
                            amount: amount,
                            status: "Kutilmoqda",
                            createdAt: serverTimestamp()
                        });

                        showToast("So'rov muvaffaqiyatli yuborildi! Admin tez orada tasdiqlaydi. ✅");
                        
                        document.getElementById('card-holder').value = "";
                        document.getElementById('withdraw-amount').value = "";
                        handleCardTypeChange(); // Prefiksni joyiga qaytaradi

                        setTimeout(() => {
                            window.location.href = 'main.html'; // Yoki sizning asosiy sahifa nomingiz
                        }, 2000);

                    } catch (error) {
                        console.error("Xatolik:", error);
                        showToast("Tizimda xatolik yuz berdi. Qayta urinib ko'ring! ⚠️");
                    } finally {
                        document.getElementById('btn-withdraw-submit').disabled = false;
                        document.getElementById('btn-withdraw-submit').innerText = "SO'ROV YUBORISH 💸";
                    }
                };

            } else {
                window.location.replace("index.html");
            }
        });
    </script>
</body>
</html>
