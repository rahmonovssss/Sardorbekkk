<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asosiy Sahifa - Profil (Bepul talqin)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            height: 100vh; background: linear-gradient(-45deg, #0f2027, #2c5364);
            color: white; overflow: hidden;
        }

        /* Yuqori o'ng burchakdagi profil */
        .top-header {
            position: absolute; top: 20px; right: 20px;
            display: flex; align-items: center; gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 15px; border-radius: 50px;
            cursor: pointer; border: 1px solid rgba(255,255,255,0.2);
        }
        .top-profile-img {
            width: 40px; height: 40px; border-radius: 50%;
            object-fit: cover; border: 2px solid #00d2ff;
        }

        /* Modal (Tahrirlash oynasi) */
        .modal {
            display: none; position: fixed; z-index: 100;
            left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            align-items: center; justify-content: center;
        }
        .modal-content {
            background: #1a2a33; padding: 30px; border-radius: 20px;
            width: 90%; max-width: 400px; text-align: center;
        }
        .edit-avatar {
            width: 100px; height: 100px; border-radius: 50%;
            margin-bottom: 15px; border: 3px solid #00d2ff; cursor: pointer;
            object-fit: cover;
        }
        input[type="text"], input[type="email"] {
            width: 100%; padding: 12px; margin: 10px 0;
            border-radius: 8px; border: none; outline: none;
        }
        input[type="email"] { background: #333; color: #888; } /* Emailni tahrirlab bo'lmaydi */
        
        .save-btn {
            background: #00d2ff; color: white; padding: 10px 20px;
            border: none; border-radius: 8px; cursor: pointer; width: 100%;
        }
    </style>
</head>
<body>

    <div class="top-header" onclick="openModal()">
        <span id="header-name">Yuklanmoqda...</span>
        <img src="https://via.placeholder.com/150" id="header-img" class="top-profile-img">
    </div>

    <div style="display: flex; height: 100vh; align-items: center; justify-content: center;">
        <h2>Xush kelibsiz!</h2>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3>Profilni tahrirlash</h3>
            <label for="file-input">
                <img src="https://via.placeholder.com/150" id="edit-preview" class="edit-avatar" title="Rasm almashtirish">
            </label>
            <input type="file" id="file-input" style="display: none;" accept="image/*">
            
            <input type="text" id="edit-name" placeholder="F.I.SH">
            <input type="email" id="edit-email" readonly>
            
            <button class="save-btn" id="btn-save" onclick="saveProfile()">SAQLASH</button>
            <button onclick="closeModal()" style="background:none; color:white; border:none; margin-top:10px; cursor:pointer;">Yopish</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase sozlamalari
        const firebaseConfig = {
            apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
            authDomain: "quiz-app-3692d.firebaseapp.com",
            projectId: "quiz-app-3692d",
            storageBucket: "quiz-app-3692d.firebasestorage.app",
            messagingSenderId: "526836020845",
            appId: "1:526836020845:android:3ea991380c104c75e8b164"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app); // Firestore bazasi

        let currentUser = null;

        // Tizimga kirganini tekshirish
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                
                // Firestore'dan ma'lumotlarni olish (Rasm kodini olish uchun)
                const docSnap = await getDoc(doc(db, "users", user.uid));
                let photoData = user.photoURL || "https://via.placeholder.com/150";
                let nameData = user.displayName || "Foydalanuvchi";

                if (docSnap.exists()) {
                    photoData = docSnap.data().photo || photoData;
                    nameData = docSnap.data().fio || nameData;
                }

                // Ma'lumotlarni sahifaga qo'yish
                document.getElementById('header-name').innerText = nameData;
                document.getElementById('header-img').src = photoData;
                document.getElementById('edit-name').value = nameData;
                document.getElementById('edit-email').value = user.email;
                document.getElementById('edit-preview').src = photoData;
            } else {
                window.location.href = "auth.html"; // Kirilmagan bo'lsa auth'ga yuboradi
            }
        });

        // Modalni ochish/yopish
        window.openModal = () => document.getElementById('editModal').style.display = 'flex';
        window.closeModal = () => document.getElementById('editModal').style.display = 'none';

        // Profilni saqlash funksiyasi (Rasmni kodga aylantirib)
        window.saveProfile = async () => {
            const newName = document.getElementById('edit-name').value;
            const fileInput = document.getElementById('file-input');
            const file = fileInput.files[0];
            const btn = document.getElementById('btn-save');

            btn.disabled = true;
            btn.innerText = "Saqlanmoqda...";

            try {
                let base64Image = document.getElementById('edit-preview').src;

                // 1. Agar yangi rasm tanlangan bo'lsa, uni kodga (Base64) o'tkazamiz
                if (file) {
                    base64Image = await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = (e) => resolve(e.target.result);
                        reader.onerror = reject;
                        reader.readAsDataURL(file);
                    });
                }

                // 2. Auth profilini yangilash (Faqat ism, rasm Auth profiliga sig'maydi)
                await updateProfile(auth.currentUser, {
                    displayName: newName
                });
                
                // 3. Firestore bazasiga saqlash (Mutlaqo bepul va sig'im katta)
                await setDoc(doc(db, "users", currentUser.uid), {
                    fio: newName,
                    photo: base64Image, // Rasm kodini saqlaymiz
                    email: currentUser.email,
                    updatedAt: new Date()
                }, { merge: true });

                alert("Profil muvaffaqiyatli saqlandi!");
                location.reload(); // Sahifani yangilaymiz
            } catch (error) {
                alert("Xatolik yuz berdi: " + error.message);
                console.error(error);
                btn.disabled = false;
                btn.innerText = "SAQLASH";
            }
        };

        // Rasm tanlanganda preview qilish
        document.getElementById('file-input').onchange = (e) => {
            if (e.target.files && e.target.files[0]) {
                const reader = new FileReader();
                reader.onload = () => document.getElementById('edit-preview').src = reader.result;
                reader.readAsDataURL(e.target.files[0]);
            }
        };
    </script>
</body>
</html>
