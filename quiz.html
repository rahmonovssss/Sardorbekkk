<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bepul Imtihon - Dr. Rahmonov</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #0f2027; color: white; padding: 15px; min-height: 100vh; overflow-x: hidden; user-select: none; }

        /* --- TEPADAGI PANEL --- */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(26, 42, 51, 0.95); padding: 12px 18px; border-radius: 18px;
            position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(15px);
            border-bottom: 2px solid #00d2ff; margin-bottom: 25px;
        }
        .exit-btn { background: rgba(255, 75, 43, 0.15); color: #ff4b2b; border: 1px solid #ff4b2b; padding: 8px 16px; border-radius: 10px; cursor: pointer; font-weight: 600; }
        .timer { color: #00d2ff; font-size: 18px; font-weight: 700; }

        .container { width: 100%; max-width: 600px; margin: 0 auto; }

        /* --- MODAL --- */
        #custom-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center;
        }
        .modal-content {
            background: #1a2a33; padding: 30px; border-radius: 25px; text-align: center;
            width: 85%; max-width: 380px; border: 1px solid #00d2ff;
        }
        .modal-btns { display: flex; gap: 10px; margin-top: 25px; }
        .btn-confirm { flex: 1; padding: 12px; background: #ff4b2b; border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; }
        .btn-cancel { flex: 1; padding: 12px; background: #333; border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; }

        /* --- BOXES --- */
        #selection-box, #quiz-box { background: #1a2a33; padding: 25px; border-radius: 25px; border: 1px solid rgba(0, 210, 255, 0.1); }
        .subject-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin: 20px 0; }
        .sub-card { 
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); 
            padding: 15px; border-radius: 15px; cursor: pointer; text-align: center; font-size: 13px; transition: 0.3s;
        }
        .sub-card.selected { border-color: #00d2ff; background: rgba(0, 210, 255, 0.1); color: #00d2ff; }
        
        /* --- OPTIONS --- */
        .option { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 15px; border-radius: 15px; cursor: pointer; margin-bottom: 12px; }
        .option.selected { background: #00d2ff; color: #000; border-color: #00d2ff; font-weight: bold; }
        
        .btn-main { width: 100%; padding: 18px; border-radius: 15px; border: none; background: #00d2ff; color: #000; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .btn-main:disabled { opacity: 0.3; }

        #toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: #00d2ff; color: #000; padding: 12px 25px; border-radius: 50px; transition: 0.5s; z-index: 10000; font-weight: bold; }
        #toast.show { bottom: 30px; }
    </style>
</head>
<body>

    <div id="custom-modal">
        <div class="modal-content">
            <h3 style="color:#00d2ff">Testni to'xtatish?</h3>
            <p style="margin-top:10px; font-size:14px; opacity:0.8;">Chiqib ketsangiz natijangiz saqlanmaydi.</p>
            <div class="modal-btns">
                <button class="btn-confirm" onclick="window.location.replace('home.html')">Chiqish</button>
                <button class="btn-cancel" onclick="closeModal()">Qolish</button>
            </div>
        </div>
    </div>

    <div class="top-bar">
        <button class="exit-btn" onclick="openModal()">✖ Chiqish</button>
        <div class="timer" id="timer-display">90:00</div>
    </div>

    <div class="container">
        <div id="selection-box">
            <h2 style="color:#00d2ff; margin-bottom: 5px;">Blokli Test</h2>
            <p style="font-size: 12px; opacity: 0.7;">Fanlarni tanlang (2 ta):</p>
            <div class="subject-grid" id="main-subjects"></div>
            <button class="btn-main" id="start-btn" onclick="prepareFreeQuiz()" disabled>IMTIHONNI BOSHLASH</button>
        </div>

        <div id="quiz-box" style="display:none;">
            <div id="display-subject" style="color:#00d2ff; font-size:12px; margin-bottom:10px; font-weight:bold; text-transform: uppercase;">FAN</div>
            <div class="question" id="q-text" style="font-size:18px; min-height:80px; margin-bottom: 20px;">Savol yuklanmoqda...</div>
            <div id="options-container"></div>
            <button class="btn-main" id="next-btn" onclick="processNext()" disabled>KEYINGI SAVOL</button>
        </div>
    </div>

    <div id="toast">Xabar!</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
            authDomain: "quiz-app-3692d.firebaseapp.com",
            projectId: "quiz-app-3692d",
            storageBucket: "quiz-app-3692d.firebasestorage.app",
            messagingSenderId: "526836020845",
            appId: "1:526836020845:android:3ea991380c104c75e8b164"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allQuestions = [];
        let currentIndex = 0;
        let selectedMainSubjects = [];
        let timeLeft = 90 * 60;
        let userAnswers = [];

        window.openModal = () => document.getElementById('custom-modal').style.display = 'flex';
        window.closeModal = () => document.getElementById('custom-modal').style.display = 'none';

        const subjectsList = ["Matematika", "Ona tili", "Tarix", "Kimyo", "Biologiya", "Ingiliz tili", "Huquq", "Geografiya", "Fizika"];
        const grid = document.getElementById('main-subjects');
        
        subjectsList.forEach(s => {
            const d = document.createElement('div');
            d.className = 'sub-card';
            d.innerText = s;
            d.onclick = () => {
                if(selectedMainSubjects.includes(s)) {
                    selectedMainSubjects = selectedMainSubjects.filter(i => i !== s);
                    d.classList.remove('selected');
                } else if(selectedMainSubjects.length < 2) {
                    selectedMainSubjects.push(s);
                    d.classList.add('selected');
                }
                document.getElementById('start-btn').disabled = (selectedMainSubjects.length !== 2);
            };
            grid.appendChild(d);
        });

        window.prepareFreeQuiz = async () => {
            const btn = document.getElementById('start-btn');
            btn.innerText = "YUKLANMOQDA...";
            btn.disabled = true;

            const mandatory = ["Matematika", "Ona tili", "Tarix"];
            allQuestions = [];
            
            try {
                // Bepul testlar turi uchun filtr
                for(let f of mandatory) await fetchQuestions(f, 10, 1.1);
                await fetchQuestions(selectedMainSubjects[0], 30, 3.1);
                await fetchQuestions(selectedMainSubjects[1], 30, 2.1);
                
                if(allQuestions.length > 0) {
                    document.getElementById('selection-box').style.display = 'none';
                    document.getElementById('quiz-box').style.display = 'block';
                    startTimer();
                    showQuestion();
                } else {
                    showToast("Bepul savollar topilmadi!");
                    setTimeout(() => location.reload(), 2000);
                }
            } catch (e) {
                showToast("Internet xatosi!");
                btn.disabled = false;
                btn.innerText = "QAYTA BOSHLASH";
            }
        };

        async function fetchQuestions(subject, count, ball) {
            // Admin panelda "free" yoki "Bepul Test" deb saqlanganini tekshirish
            const q = query(
                collection(db, "quizzes"), 
                where("subject", "==", subject), 
                where("type", "in", ["free", "Bepul Test"]), // Har ikkala holatni ham tekshiradi
                limit(count)
            );
            const snap = await getDocs(q);
            snap.forEach(doc => {
                allQuestions.push({...doc.data(), ball: ball, id: doc.id});
            });
        }

        function showQuestion() {
            const q = allQuestions[currentIndex];
            document.getElementById('display-subject').innerText = `${q.subject} | ${currentIndex + 1}/90`;
            document.getElementById('q-text').innerText = q.question;
            
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            document.getElementById('next-btn').disabled = true;

            ["A", "B", "C", "D"].forEach(key => {
                if(q.options && q.options[key]) {
                    const div = document.createElement('div');
                    div.className = "option";
                    div.innerText = `${key}) ${q.options[key]}`;
                    div.onclick = () => {
                        document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
                        div.classList.add('selected');
                        window.currentChoice = key;
                        document.getElementById('next-btn').disabled = false;
                    };
                    container.appendChild(div);
                }
            });
        }

        window.processNext = () => {
            const q = allQuestions[currentIndex];
            userAnswers.push({
                subject: q.subject,
                isCorrect: window.currentChoice === q.correctAnswer,
                ball: window.currentChoice === q.correctAnswer ? q.ball : 0
            });

            currentIndex++;
            if(currentIndex < allQuestions.length) {
                showQuestion();
            } else {
                localStorage.setItem('freeResult', JSON.stringify(userAnswers));
                window.location.replace('result.html');
            }
        };

        function startTimer() {
            const display = document.getElementById('timer-display');
            const timer = setInterval(() => {
                let m = Math.floor(timeLeft / 60);
                let s = timeLeft % 60;
                display.innerText = `${m}:${s < 10 ? '0'+s : s}`;
                if (timeLeft-- <= 0) {
                    clearInterval(timer);
                    window.location.replace('result.html');
                }
            }, 1000);
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
