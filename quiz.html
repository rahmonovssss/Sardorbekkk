<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Test Yechish - Dr. Rahmonov</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #0f2027; color: white; padding: 20px; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        
        .container { width: 100%; max-width: 500px; }
        
        /* --- FAN TANLASH QISMI --- */
        #selection-box { background: #1a2a33; padding: 30px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); text-align: center; }
        .selection-title { color: #ffd700; margin-bottom: 25px; font-size: 20px; font-weight: 600; }
        
        .subject-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 25px; }
        .sub-card {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 18px; border-radius: 18px; cursor: pointer; transition: 0.3s; font-size: 14px;
        }
        .sub-card:active { transform: scale(0.95); }
        .sub-card.active { border-color: #ffd700; background: rgba(255, 215, 0, 0.15); color: #ffd700; font-weight: 600; }

        .btn-start { 
            width: 100%; padding: 15px; border-radius: 15px; border: none; 
            background: #ffd700; color: #000; font-weight: 600; font-size: 16px; cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
        }

        /* --- TEST YECHISH QISMI (YASHIRIN) --- */
        #quiz-box { 
            background: #1a2a33; padding: 30px; border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); display: none; 
        }
        .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: #ffd700; width: 0%; transition: 0.4s; }
        
        .progress-text { font-size: 12px; opacity: 0.6; margin-bottom: 10px; display: block; }
        .question { font-size: 18px; font-weight: 600; margin-bottom: 25px; line-height: 1.5; color: #fff; }
        
        .options-list { display: flex; flex-direction: column; gap: 12px; }
        .option {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px; border-radius: 16px; cursor: pointer; transition: 0.2s; font-size: 15px;
        }
        .option:active { background: rgba(0, 210, 255, 0.1); }
        .option.selected { background: #00d2ff; color: white; border-color: #00d2ff; font-weight: 600; }
        
        .nav-btns { margin-top: 30px; }
        .btn-next { width: 100%; background: #ffd700; color: #000; padding: 15px; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; }
        .btn-next:disabled { opacity: 0.4; cursor: not-allowed; }

        /* NATIJA */
        .result-card { text-align: center; }
        .result-score { font-size: 48px; color: #ffd700; margin: 20px 0; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div id="selection-box">
            <h2 class="selection-title">Fanni tanlang</h2>
            <div class="subject-grid" id="subject-list">
                </div>
            <button class="btn-start" onclick="startQuiz()">TESTNI BOSHLASH</button>
        </div>

        <div id="quiz-box">
            <div class="progress-bar"><div class="progress-fill" id="p-fill"></div></div>
            <span class="progress-text" id="progress-text">Savol: 1/10</span>
            <div class="question" id="q-text">Savol yuklanmoqda...</div>
            
            <div class="options-list" id="options-container"></div>

            <div class="nav-btns">
                <button class="btn-next" id="next-btn" onclick="nextQuestion()" disabled>KEYINGISI</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
            authDomain: "quiz-app-3692d.firebaseapp.com",
            projectId: "quiz-app-3692d",
            storageBucket: "quiz-app-3692d.firebasestorage.app",
            messagingSenderId: "526836020845",
            appId: "1:526836020845:android:3ea991380c104c75e8b164"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let questions = [];
        let currentIndex = 0;
        let score = 0;
        let selectedSubject = 'Matematika';

        const fanlar = ["Matematika", "Ona tili", "Tarix", "Kimyo", "Biologiya", "Ingiliz tili", "Huquq", "Geografiya"];

        // Fanlarni chizish
        const subList = document.getElementById('subject-list');
        fanlar.forEach(f => {
            const div = document.createElement('div');
            div.className = `sub-card ${f === 'Matematika' ? 'active' : ''}`;
            div.innerText = f;
            div.id = `sub-${f}`;
            div.onclick = () => {
                selectedSubject = f;
                document.querySelectorAll('.sub-card').forEach(c => c.classList.remove('active'));
                div.classList.add('active');
            };
            subList.appendChild(div);
        });

        // Testni boshlash funksiyasi
        window.startQuiz = async () => {
            document.getElementById('selection-box').style.display = 'none';
            document.getElementById('quiz-box').style.display = 'block';

            // Firebase'dan faqat tanlangan fanni va faqat "free" turini olish
            const q = query(
                collection(db, "quizzes"), 
                where("subject", "==", selectedSubject),
                where("type", "==", "free"), // FAQAT BEPUL TESTLAR
                limit(10)
            );

            const qSnap = await getDocs(q);
            qSnap.forEach(doc => questions.push({ id: doc.id, ...doc.data() }));
            
            if(questions.length > 0) showQuestion();
            else document.getElementById('q-text').innerText = "Bu fanda hali bepul testlar yo'q.";
        };

        function showQuestion() {
            const q = questions[currentIndex];
            const total = questions.length;
            
            document.getElementById('progress-text').innerText = `Savol: ${currentIndex + 1} / ${total}`;
            document.getElementById('p-fill').style.width = `${((currentIndex + 1) / total) * 100}%`;
            document.getElementById('q-text').innerText = q.question;
            
            const container = document.getElementById('options-container');
            container.innerHTML = "";

            ["A", "B", "C", "D"].forEach(key => {
                if(q.options && q.options[key]) {
                    const div = document.createElement('div');
                    div.className = "option";
                    div.innerText = `${key}) ${q.options[key]}`;
                    div.onclick = () => selectOption(div, key);
                    container.appendChild(div);
                }
            });
            document.getElementById('next-btn').disabled = true;
        }

        let currentChoice = null;
        window.selectOption = (el, key) => {
            document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
            el.classList.add('selected');
            currentChoice = key;
            document.getElementById('next-btn').disabled = false;
        };

        window.nextQuestion = () => {
            if(currentChoice === questions[currentIndex].correctAnswer) score++;
            
            currentIndex++;
            if(currentIndex < questions.length) {
                showQuestion();
                currentChoice = null;
            } else {
                finishQuiz();
            }
        };

        function finishQuiz() {
            document.getElementById('quiz-box').innerHTML = `
                <div class="result-card">
                    <h2 style="color:#ffd700">Test Yakunlandi!</h2>
                    <p style="margin-top:10px; opacity:0.8;">Sizning natijangiz:</p>
                    <div class="result-score">${score} / ${questions.length}</div>
                    <button class="btn-start" onclick="location.reload()">QAYTA TOPSHIRISH</button>
                    <button class="btn-next" style="margin-top:15px; background:rgba(255,255,255,0.1); color:white;" onclick="location.href='home.html'">ASOSIY SAHIFA</button>
                </div>
            `;
        }
    </script>
</body>
</html>
