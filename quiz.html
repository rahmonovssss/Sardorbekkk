<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Imtihon - Dr. Rahmonov</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #0f2027; color: white; padding: 15px; min-height: 100vh; overflow: hidden; }

        /* --- TEPADAGI PANEL --- */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(26, 42, 51, 0.95); padding: 12px 18px; border-radius: 18px;
            position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(15px);
            border-bottom: 2px solid #ffd700; margin-bottom: 25px;
        }
        .exit-btn { background: rgba(255, 75, 43, 0.2); color: #ff4b2b; border: 1px solid #ff4b2b; padding: 8px 16px; border-radius: 10px; cursor: pointer; font-weight: 600; }
        .timer { color: #ffd700; font-size: 18px; font-weight: 700; }

        .container { width: 100%; max-width: 600px; margin: 0 auto; }

        /* --- SHAXSIY MODAL (CUSTOM ALERT) --- */
        #custom-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 9999; align-items: center; justify-content: center;
        }
        .modal-content {
            background: #1a2a33; padding: 30px; border-radius: 25px; text-align: center;
            width: 85%; max-width: 400px; border: 1px solid #ffd700;
        }
        .modal-btns { display: flex; gap: 10px; margin-top: 25px; }
        .btn-confirm { flex: 1; padding: 12px; background: #ff4b2b; border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; }
        .btn-cancel { flex: 1; padding: 12px; background: #333; border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; }

        /* --- SELECTION & QUIZ BOX (Sizdagi dizayn) --- */
        #selection-box, #quiz-box { background: #1a2a33; padding: 25px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.05); }
        #quiz-box { display: none; }
        .subject-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin: 20px 0; }
        .sub-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); padding: 15px; border-radius: 15px; cursor: pointer; text-align: center; font-size: 13px; }
        .sub-card.selected { border-color: #ffd700; background: rgba(255, 215, 0, 0.1); color: #ffd700; }
        
        .option { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 15px; border-radius: 15px; cursor: pointer; margin-bottom: 10px; }
        .option.selected { background: #00d2ff; color: #000; border-color: #00d2ff; font-weight: bold; }
        
        .btn-main { width: 100%; padding: 18px; border-radius: 15px; border: none; background: #ffd700; color: #000; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .btn-main:disabled { opacity: 0.3; }
    </style>
</head>
<body>

    <div id="custom-modal">
        <div class="modal-content">
            <h3 style="color:#ffd700">Chiqishni xohlaysizmi?</h3>
            <p style="margin-top:10px; font-size:14px; opacity:0.8;">Testni to'xtatganingizda natijalar saqlanmaydi.</p>
            <div class="modal-btns">
                <button class="btn-confirm" onclick="finalExit()">Chiqish</button>
                <button class="btn-cancel" onclick="closeModal()">Bekor qilish</button>
            </div>
        </div>
    </div>

    <div class="top-bar">
        <button class="exit-btn" onclick="openModal()">✖ Chiqish</button>
        <div class="timer" id="timer-display">90:00</div>
    </div>

    <div class="container">
        <div id="selection-box">
            <h2 style="color:#ffd700">Blokli Test</h2>
            <div class="subject-grid" id="main-subjects"></div>
            <button class="btn-main" id="start-btn" onclick="prepareQuiz()" disabled>BOSHLASH</button>
        </div>

        <div id="quiz-box">
            <div id="display-subject" style="color:#ffd700; font-size:12px; margin-bottom:10px;">FAN</div>
            <div class="question" id="q-text" style="font-size:18px; min-height:80px;">Savol yuklanmoqda...</div>
            <div id="options-container"></div>
            <button class="btn-main" id="next-btn" onclick="processNext()" disabled>KEYINGISI</button>
        </div>
    </div>

    <script type="module">
        // Firebase importlari bir xil qoladi...
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
            authDomain: "quiz-app-3692d.firebaseapp.com",
            projectId: "quiz-app-3692d",
            storageBucket: "quiz-app-3692d.firebasestorage.app",
            messagingSenderId: "526836020845",
            appId: "1:526836020845:android:3ea991380c104c75e8b164"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allQuestions = [];
        let currentIndex = 0;
        let selectedMainSubjects = [];
        let timeLeft = 90 * 60;

        // MODAL FUNKSIYALARI (Manzil chiqishini yo'qotadi)
        window.openModal = () => document.getElementById('custom-modal').style.display = 'flex';
        window.closeModal = () => document.getElementById('custom-modal').style.display = 'none';
        window.finalExit = () => window.location.replace('home.html');

        // Fanlarni chizish
        const subjectsList = ["Matematika", "Ona tili", "Tarix", "Kimyo", "Biologiya", "Ingiliz tili", "Huquq", "Geografiya", "Fizika"];
        const grid = document.getElementById('main-subjects');
        subjectsList.forEach(s => {
            const d = document.createElement('div');
            d.className = 'sub-card';
            d.innerText = s;
            d.onclick = () => {
                if(selectedMainSubjects.includes(s)) {
                    selectedMainSubjects = selectedMainSubjects.filter(i => i !== s);
                    d.classList.remove('selected');
                } else if(selectedMainSubjects.length < 2) {
                    selectedMainSubjects.push(s);
                    d.classList.add('selected');
                }
                document.getElementById('start-btn').disabled = (selectedMainSubjects.length !== 2);
            };
            grid.appendChild(d);
        });

        // Testni yuklash va boshlash (FetchSet funksiyasi bir xil qoladi)
        window.prepareQuiz = async () => {
            document.getElementById('start-btn').innerText = "YUKLANMOQDA...";
            const mandatory = ["Matematika", "Ona tili", "Tarix"];
            for(let f of mandatory) await fetchSet(f, 10, 1.1);
            await fetchSet(selectedMainSubjects[0], 30, 3.1);
            await fetchSet(selectedMainSubjects[1], 30, 2.1);
            
            document.getElementById('selection-box').style.display = 'none';
            document.getElementById('quiz-box').style.display = 'block';
            startTimer();
            showQuestion();
        };

        async function fetchSet(subject, count, ball) {
            const q = query(collection(db, "quizzes"), where("subject", "==", subject), limit(count));
            const snap = await getDocs(q);
            snap.forEach(doc => allQuestions.push({...doc.data(), ball: ball}));
        }

        function showQuestion() {
            const q = allQuestions[currentIndex];
            document.getElementById('display-subject').innerText = `${q.subject} (${currentIndex + 1}/90)`;
            document.getElementById('q-text').innerText = q.question;
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            ["A", "B", "C", "D"].forEach(key => {
                const div = document.createElement('div');
                div.className = "option";
                div.innerText = `${key}) ${q.options[key]}`;
                div.onclick = () => {
                    document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
                    div.classList.add('selected');
                    window.currentChoice = key;
                    document.getElementById('next-btn').disabled = false;
                };
                container.appendChild(div);
            });
        }

        window.processNext = () => {
            currentIndex++;
            if(currentIndex < allQuestions.length) showQuestion();
            else window.location.replace('result.html');
        };

        function startTimer() {
            setInterval(() => {
                let m = Math.floor(timeLeft / 60);
                let s = timeLeft % 60;
                document.getElementById('timer-display').innerText = `${m}:${s < 10 ? '0'+s : s}`;
                if(timeLeft-- <= 0) window.location.replace('result.html');
            }, 1000);
        }
    </script>
</body>
</html>
