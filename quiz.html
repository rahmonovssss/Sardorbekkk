<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Imtihon - Dr. Rahmonov</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #0f2027; color: white; padding: 15px; min-height: 100vh; overflow-x: hidden; }

        /* --- TEPADAGI PANEL --- */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(26, 42, 51, 0.95); padding: 12px 18px; border-radius: 18px;
            position: sticky; top: 10px; z-index: 1000; backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 215, 0, 0.3); margin-bottom: 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .exit-btn { 
            background: rgba(255, 75, 43, 0.1); color: #ff4b2b; border: 1px solid #ff4b2b; 
            padding: 8px 16px; border-radius: 10px; cursor: pointer; font-weight: 600; 
            transition: 0.3s;
        }
        .exit-btn:hover { background: #ff4b2b; color: white; }
        .timer { color: #ffd700; font-size: 18px; font-weight: 700; letter-spacing: 1px; }

        .container { width: 100%; max-width: 600px; margin: 0 auto; }

        /* --- SELECTION BOX --- */
        #selection-box { background: #1a2a33; padding: 25px; border-radius: 25px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .subject-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin: 20px 0; }
        .sub-card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 18px; border-radius: 15px; cursor: pointer; font-size: 13px; transition: 0.3s;
        }
        .sub-card.selected { border-color: #ffd700; background: rgba(255, 215, 0, 0.1); color: #ffd700; transform: translateY(-3px); }

        /* --- QUIZ BOX --- */
        #quiz-box { display: none; background: #1a2a33; padding: 25px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.05); }
        .q-header-info { display: flex; justify-content: space-between; font-size: 12px; color: #ffd700; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        .question { font-size: 18px; margin-bottom: 25px; line-height: 1.6; font-weight: 400; }
        
        .option {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px; border-radius: 15px; cursor: pointer; transition: 0.2s; margin-bottom: 12px;
            display: flex; align-items: center;
        }
        .option.selected { background: #00d2ff; color: #000; border-color: #00d2ff; font-weight: 600; }

        .btn-main {
            width: 100%; padding: 18px; border-radius: 15px; border: none;
            background: #ffd700; color: #000; font-weight: 700; cursor: pointer; margin-top: 20px;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.2); transition: 0.3s;
        }
        .btn-main:disabled { opacity: 0.3; transform: scale(1); }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="exit-btn" onclick="safeExit()">✖ Chiqish</button>
        <div class="timer" id="timer-display">90:00</div>
    </div>

    <div class="container">
        <div id="selection-box">
            <h2 style="color:#ffd700; margin-bottom: 10px;">Blokli Test</h2>
            <p style="font-size:12px; opacity:0.6;">Majburiy 3ta fan (30ta savol) + Asosiy 2ta fan (60ta savol)</p>
            
            <div class="section-title" style="margin-top:25px; font-size:14px; color:#ffd700;">Yo'nalishingizni tanlang (2ta fan):</div>
            <div class="subject-grid" id="main-subjects"></div>
            
            <button class="btn-main" id="start-btn" onclick="prepareQuiz()" disabled>IMTIHONNI BOSHLASH</button>
        </div>

        <div id="quiz-box">
            <div class="q-header-info">
                <span id="display-subject">FAN</span>
                <span id="display-count">SAVOL: 1/90</span>
            </div>
            <div class="question" id="q-text">Yuklanmoqda...</div>
            <div class="options-list" id="options-container"></div>
            <button class="btn-main" id="next-btn" onclick="processNext()" disabled>KEYINGISI</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
            authDomain: "quiz-app-3692d.firebaseapp.com",
            projectId: "quiz-app-3692d",
            storageBucket: "quiz-app-3692d.firebasestorage.app",
            messagingSenderId: "526836020845",
            appId: "1:526836020845:android:3ea991380c104c75e8b164"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allQuestions = [];
        let currentIndex = 0;
        let scoreData = { correct: 0, totalBall: 0, startTime: Date.now() };
        let selectedMainSubjects = [];
        let timeLeft = 90 * 60;

        // Endi barcha fanlar tanlovda bor
        const subjectsList = ["Matematika", "Ona tili", "Tarix", "Kimyo", "Biologiya", "Ingiliz tili", "Huquq", "Geografiya", "Fizika"];

        const grid = document.getElementById('main-subjects');
        subjectsList.forEach(s => {
            const d = document.createElement('div');
            d.className = 'sub-card';
            d.innerText = s;
            d.onclick = () => {
                if(selectedMainSubjects.includes(s)) {
                    selectedMainSubjects = selectedMainSubjects.filter(i => i !== s);
                    d.classList.remove('selected');
                } else if(selectedMainSubjects.length < 2) {
                    selectedMainSubjects.push(s);
                    d.classList.add('selected');
                }
                document.getElementById('start-btn').disabled = (selectedMainSubjects.length !== 2);
            };
            grid.appendChild(d);
        });

        window.prepareQuiz = async () => {
            document.getElementById('start-btn').innerText = "SAVOLLAR YUKLANMOQDA...";
            document.getElementById('start-btn').disabled = true;

            try {
                // 1. Majburiy fanlar (10 tadan)
                const mandatory = ["Matematika", "Ona tili", "Tarix"];
                for(let f of mandatory) await fetchSet(f, 10, 1.1);

                // 2. Asosiy fanlar (30 tadan)
                await fetchSet(selectedMainSubjects[0], 30, 3.1);
                await fetchSet(selectedMainSubjects[1], 30, 2.1);

                if(allQuestions.length > 0) {
                    document.getElementById('selection-box').style.display = 'none';
                    document.getElementById('quiz-box').style.display = 'block';
                    startTimer();
                    showQuestion();
                } else {
                    alert("Savollar topilmadi. Admin panelni tekshiring.");
                    location.reload();
                }
            } catch(e) { alert("Xatolik yuz berdi."); }
        };

        async function fetchSet(subject, count, ball) {
            const q = query(collection(db, "quizzes"), where("subject", "==", subject), limit(count));
            const snap = await getDocs(q);
            snap.forEach(doc => {
                allQuestions.push({...doc.data(), ball: ball});
            });
        }

        function showQuestion() {
            const q = allQuestions[currentIndex];
            document.getElementById('display-subject').innerText = q.subject;
            document.getElementById('display-count').innerText = `SAVOL: ${currentIndex + 1}/90`;
            document.getElementById('q-text').innerText = q.question;
            
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            window.currentChoice = null;

            ["A", "B", "C", "D"].forEach(key => {
                const div = document.createElement('div');
                div.className = "option";
                div.innerText = `${key}) ${q.options[key]}`;
                div.onclick = () => {
                    document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
                    div.classList.add('selected');
                    window.currentChoice = key;
                    document.getElementById('next-btn').disabled = false;
                };
                container.appendChild(div);
            });
            document.getElementById('next-btn').disabled = true;
        }

        window.processNext = () => {
            const q = allQuestions[currentIndex];
            if(window.currentChoice === q.correctAnswer) {
                scoreData.correct++;
                scoreData.totalBall += q.ball;
            }

            currentIndex++;
            if(currentIndex < allQuestions.length) {
                showQuestion();
            } else { finish(); }
        };

        function startTimer() {
            const timerEl = document.getElementById('timer-display');
            const interval = setInterval(() => {
                let m = Math.floor(timeLeft / 60);
                let s = timeLeft % 60;
                timerEl.innerText = `${m}:${s < 10 ? '0'+s : s}`;
                if(timeLeft <= 0) { clearInterval(interval); finish(); }
                timeLeft--;
            }, 1000);
        }

        function finish() {
            sessionStorage.setItem('lastResult', JSON.stringify(scoreData));
            // URL manzili ko'rinmasligi va orqaga qaytolmasligi uchun
            window.location.replace('result.html');
        }

        window.safeExit = () => {
            if(confirm("Testni to'xtatasizmi? Natijalar saqlanmaydi.")) {
                window.location.replace('home.html');
            }
        };

        // Brauzer "Back" tugmasini bloklash (URL ko'rinmasligi uchun)
        history.pushState(null, null, location.href);
        window.onpopstate = () => history.go(1);

    </script>
</body>
</html>
