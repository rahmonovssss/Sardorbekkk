<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blokli Test - Dr. Rahmonov</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #0f2027; color: white; padding: 15px; min-height: 100vh; }

        /* --- TEPADAGI PANEL (EXIT & TIMER) --- */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(26, 42, 51, 0.9); padding: 15px; border-radius: 15px;
            position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px);
            border-bottom: 2px solid #ffd700; margin-bottom: 20px;
        }
        .exit-btn { background: #ff4b2b; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .timer { color: #ffd700; font-size: 18px; font-weight: bold; border: 1px solid #ffd700; padding: 5px 12px; border-radius: 10px; }

        .container { width: 100%; max-width: 600px; margin: 0 auto; }

        /* --- FAN TANLASH --- */
        #selection-box { background: #1a2a33; padding: 25px; border-radius: 20px; text-align: center; }
        .subject-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 20px 0; }
        .sub-card {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px; border-radius: 12px; cursor: pointer; font-size: 13px;
        }
        .sub-card.selected { border-color: #ffd700; background: rgba(255, 215, 0, 0.1); color: #ffd700; }
        .mandatory-info { font-size: 12px; color: #aaa; margin-bottom: 10px; }

        /* --- TEST OYNASI --- */
        #quiz-box { display: none; background: #1a2a33; padding: 25px; border-radius: 20px; }
        .q-info { font-size: 14px; color: #ffd700; margin-bottom: 10px; font-weight: 600; }
        .question { font-size: 17px; margin-bottom: 20px; line-height: 1.5; }
        .options-list { display: flex; flex-direction: column; gap: 10px; }
        .option {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px; border-radius: 12px; cursor: pointer; transition: 0.2s;
        }
        .option.selected { background: #00d2ff; color: white; border-color: #00d2ff; }

        .btn-main {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            background: #ffd700; color: #000; font-weight: bold; cursor: pointer; margin-top: 20px;
        }
        .btn-main:disabled { opacity: 0.3; }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="exit-btn" onclick="confirmExit()">✖ Chiqish</button>
        <div class="timer" id="timer-display">90:00</div>
    </div>

    <div class="container">
        <div id="selection-box">
            <h2 style="color:#ffd700">Blokni tanlang</h2>
            <p class="mandatory-info">Majburiy fanlar: Ona tili, Matematika, Tarix (Avtomatik)</p>
            <div class="section-title" style="margin-top:20px; font-size:14px; opacity:0.8;">Asosiy 2 ta fanni tanlang:</div>
            <div class="subject-grid" id="main-subjects">
                </div>
            <button class="btn-main" id="start-btn" onclick="prepareQuiz()" disabled>TESTNI BOSHLASH</button>
        </div>

        <div id="quiz-box">
            <div id="q-header" class="q-info">Fan: Matematika | Savol: 1/90</div>
            <div class="question" id="q-text">Savol yuklanmoqda...</div>
            <div class="options-list" id="options-container"></div>
            <button class="btn-main" id="next-btn" onclick="processNext()" disabled>KEYINGISI</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
            authDomain: "quiz-app-3692d.firebaseapp.com",
            projectId: "quiz-app-3692d",
            storageBucket: "quiz-app-3692d.firebasestorage.app",
            messagingSenderId: "526836020845",
            appId: "1:526836020845:android:3ea991380c104c75e8b164"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allQuestions = [];
        let currentIndex = 0;
        let userResults = { correct: 0, totalBall: 0, details: [] };
        let selectedMainSubjects = [];
        let timeLeft = 90 * 60; // 90 minut

        const subjects = ["Kimyo", "Biologiya", "Ingiliz tili", "Huquq", "Geografiya", "Fizika"];

        // Asosiy fanlarni chizish
        const grid = document.getElementById('main-subjects');
        subjects.forEach(s => {
            const d = document.createElement('div');
            d.className = 'sub-card';
            d.innerText = s;
            d.onclick = () => toggleSubject(d, s);
            grid.appendChild(d);
        });

        function toggleSubject(el, s) {
            if (selectedMainSubjects.includes(s)) {
                selectedMainSubjects = selectedMainSubjects.filter(i => i !== s);
                el.classList.remove('selected');
            } else if (selectedMainSubjects.length < 2) {
                selectedMainSubjects.push(s);
                el.classList.add('selected');
            }
            document.getElementById('start-btn').disabled = (selectedMainSubjects.length !== 2);
        }

        window.prepareQuiz = async () => {
            const btn = document.getElementById('start-btn');
            btn.innerText = "YUKLANMOQDA...";
            btn.disabled = true;

            const mandatory = ["Matematika", "Ona tili", "Tarix"];
            
            // 1. Majburiy fanlarni yuklash (10 tadan)
            for(let f of mandatory) {
                await fetchSet(f, 10, 1.1);
            }
            // 2. Asosiy fanlarni yuklash (30 tadan)
            await fetchSet(selectedMainSubjects[0], 30, 3.1);
            await fetchSet(selectedMainSubjects[1], 30, 2.1);

            if(allQuestions.length > 0) {
                document.getElementById('selection-box').style.display = 'none';
                document.getElementById('quiz-box').style.display = 'block';
                startTimer();
                showQuestion();
            }
        };

        async function fetchSet(subject, count, ball) {
            const q = query(collection(db, "quizzes"), where("subject", "==", subject), limit(count));
            const snap = await getDocs(q);
            snap.forEach(doc => {
                allQuestions.push({...doc.data(), ball: ball});
            });
        }

        function showQuestion() {
            const q = allQuestions[currentIndex];
            document.getElementById('q-header').innerText = `Fan: ${q.subject} | Savol: ${currentIndex + 1}/90 | Ball: ${q.ball}`;
            document.getElementById('q-text').innerText = q.question;
            
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            ["A", "B", "C", "D"].forEach(key => {
                const div = document.createElement('div');
                div.className = "option";
                div.innerText = `${key}) ${q.options[key]}`;
                div.onclick = () => {
                    document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
                    div.classList.add('selected');
                    window.currentChoice = key;
                    document.getElementById('next-btn').disabled = false;
                };
                container.appendChild(div);
            });
            document.getElementById('next-btn').disabled = true;
        }

        window.processNext = () => {
            const q = allQuestions[currentIndex];
            if(window.currentChoice === q.correctAnswer) {
                userResults.correct++;
                userResults.totalBall += q.ball;
            }

            currentIndex++;
            if(currentIndex < allQuestions.length) {
                showQuestion();
            } else {
                finish();
            }
        };

        function startTimer() {
            const timerEl = document.getElementById('timer-display');
            const interval = setInterval(() => {
                let m = Math.floor(timeLeft / 60);
                let s = timeLeft % 60;
                timerEl.innerText = `${m}:${s < 10 ? '0'+s : s}`;
                if(timeLeft <= 0) { clearInterval(interval); finish(); }
                timeLeft--;
            }, 1000);
        }

        function finish() {
            // Natijani sessionStorage orqali yuboramiz
            sessionStorage.setItem('quizResult', JSON.stringify(userResults));
            window.location.href = 'result.html';
        }

        window.confirmExit = () => {
            if(confirm("Testni to'xtatib asosiy sahifaga qaytasizmi? Natija saqlanmaydi!")) {
                window.location.href = 'home.html';
            }
        }
    </script>
</body>
</html>
