<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Yechish - Dr. Rahmonov</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #0f2027; color: white; padding: 20px; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        
        .quiz-container { background: #1a2a33; padding: 30px; border-radius: 25px; width: 100%; max-width: 500px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .progress { font-size: 12px; opacity: 0.6; margin-bottom: 10px; display: block; }
        .question { font-size: 18px; font-weight: 600; margin-bottom: 25px; line-height: 1.5; }
        
        .options-list { display: flex; flex-direction: column; gap: 12px; }
        .option {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px; border-radius: 15px; cursor: pointer; transition: 0.3s;
        }
        .option:hover { background: rgba(0, 210, 255, 0.1); border-color: #00d2ff; }
        .option.selected { background: #00d2ff; color: white; border-color: #00d2ff; }
        
        .nav-btns { display: flex; justify-content: space-between; margin-top: 30px; }
        .btn-next { background: #ffd700; color: #000; padding: 12px 30px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .btn-next:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="quiz-container" id="quiz-box">
        <span class="progress" id="progress-text">Yuklanmoqda...</span>
        <div class="question" id="q-text">Savollar tayyorlanmoqda...</div>
        
        <div class="options-list" id="options-container">
            </div>

        <div class="nav-btns">
            <button class="btn-next" id="next-btn" onclick="nextQuestion()" disabled>KEYINGISI</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
            authDomain: "quiz-app-3692d.firebaseapp.com",
            projectId: "quiz-app-3692d",
            storageBucket: "quiz-app-3692d.firebasestorage.app",
            messagingSenderId: "526836020845",
            appId: "1:526836020845:android:3ea991380c104c75e8b164"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let questions = [];
        let currentIndex = 0;
        let score = 0;

        // URL dan test turini olish (?type=free)
        const urlParams = new URLSearchParams(window.location.search);
        const testType = urlParams.get('type');

        async function fetchQuestions() {
            const qSnap = await getDocs(query(collection(db, "quizzes"), limit(10)));
            qSnap.forEach(doc => questions.push({ id: doc.id, ...doc.data() }));
            
            if(questions.length > 0) showQuestion();
            else document.getElementById('q-text').innerText = "Hozircha testlar yo'q.";
        }

        function showQuestion() {
            const q = questions[currentIndex];
            document.getElementById('progress-text').innerText = `${currentIndex + 1} / ${questions.length}`;
            document.getElementById('q-text').innerText = q.question;
            
            const container = document.getElementById('options-container');
            container.innerHTML = "";

            ["A", "B", "C", "D"].forEach(key => {
                if(q.options[key]) {
                    const div = document.createElement('div');
                    div.className = "option";
                    div.innerText = `${key}) ${q.options[key]}`;
                    div.onclick = () => selectOption(div, key);
                    container.appendChild(div);
                }
            });
            document.getElementById('next-btn').disabled = true;
        }

        let selectedKey = null;
        window.selectOption = (el, key) => {
            document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
            el.classList.add('selected');
            selectedKey = key;
            document.getElementById('next-btn').disabled = false;
        };

        window.nextQuestion = () => {
            if(selectedKey === questions[currentIndex].correctAnswer) score++;
            
            currentIndex++;
            if(currentIndex < questions.length) {
                showQuestion();
            } else {
                finishQuiz();
            }
        };

        function finishQuiz() {
            document.getElementById('quiz-box').innerHTML = `
                <h2 style="color:#ffd700">Natija!</h2>
                <p style="margin:20px 0; font-size:24px;">${score} ta to'g'ri javob</p>
                <button class="btn-next" onclick="location.href='home.html'">ASOSIYGA QAYTISH</button>
            `;
        }

        fetchQuestions();
    </script>
</body>
</html>
